body:
  text: 緯略卷十一宋髙似孫撰儲胥漢書曰武帝因秦林光宫元封二年增通天迎風儲胥露寒長楊賦曰木雍搶纍以為儲胥顔師古曰儲峙也胥須也以木雍搶及纍繩連結以為儲胥言有儲蓄以待所須也宋景文公傷孟昭圖詩密疏叩儲胥又侍宴詩秋色遍儲胥又思歸老詩至今三籍在儲胥答朱彭州詩九蕃宫樹老儲胥又續春詞蒼龍驅暖入儲胥其實儲胥乃宫宇之名露寒是名儲胥何為不是名豕苓莊子曰藥也其實堇也桔梗也雞壅也豕苓也是時為帝者也郭注曰當其所須則無賤非其時則無貴故此數種若當其時而用之則為主故曰是時為帝者也孫真人方所謂五苓散凡五味木豬苓為主故曰五苓其法蓋與莊子之言合周祇月賦謝莊月賦曰日以陽德月以隂靈唐沈明賦曰日有朝靈月有宵德蓋出於此良佳擅扶光於東沼嗣若英於西溟宋周祇月賦曰二氣理化精者能鏡陽得一以朗旦月待終而夕映其狀也氣融結而照逺質明潤而真虛弱不廢照清不激汙意氣之髙不在謝莊下也鮚醬漢書曰漢律會稽獻鮚醬二升鮚蚌蜃之屬今大蛤音姞也梁劉孝綽詩晉安王賚蝦醬啓曰龍醬傳甘退誠可陋蚔醢稱貴追覺失言吳録地理志曰鱟子如麻取以為醬甚美又如所謂鱟醬蝦鮓天暖未能多致凡醢醬之屬雖甚么微未有不出於古人之法也五色雁赤雁漢書郊祀志曰宣帝于河西築世宗廟告祀有五色雁集殿前唐書曰貞元十年同州獻五色雁昔武帝行幸東海獲赤雁作朱雁之歌故班固曰白麟赤雁芝房寶鼎之歌薦於郊廟禮樂志曰赤雁集六紛員殊翁雜五采文孟康曰翁雁頸也言其文采殊異也即是五色雁矣許敬宗詩塞門朱雁入郊藪紫麟遊元稹詩池築呈朱雁壇場得白麟東南一尉周庾信慶平鄴表曰泰山梁甫以來即有七十二代龍圖龜書之後又已三千餘年雖復制法樹司禮樂殊異至于文離武落剡木弦弧席卷天下之心包吞八荒之志其揆一焉政須東南一尉立於北景之南西北一候置於交河之北東南一尉西北一候揚雄之言也此用得妙漢制郡置尉事體深重始馮翊之髙陵扶風之郿迄交趾之麓冷合浦之珠崖郡國一百三為都尉治者九十有四班固志中並不及此可謂闕典之大者其他如關都尉農都尉屬國都尉胸奴渾懷都尉玉門陽關都尉有官制所名者有因事創置者如王孫一作新為右輔尉梅福為南昌尉趙廣漢為京輔尉尹翁歸為𢎞農尉毋將為沛郡尉錦瑟唐李義山錦瑟詩錦瑟無端五十絃一絃一柱思華年莊生曉夢迷蝴蝶望帝春心托杜鵑滄海月明珠有淚藍田日暖玉生煙此情何待成追憶只是當時已惘然山谷道人讀此詩殊不曉其意後以問東坡坡云此出古今樂志云錦瑟之為器也其絃五十其聲感怨清和按李詩莊生曉夢迷蝴蝶感也望帝春心托杜鵑怨也滄海月明珠有淚清也藍田日暖玉生煙和也一篇之中曲盡其意史稱其瑰邁奇古信然劉貢父詩話以謂錦瑟乃當時貴人愛姬之名義山因以寓意非也新舊火隋書王劭傳曰劭以古有鑽燧改火之義近代廢絶於是上表請變火曰臣謹按周官四時變火以救時疾火不數變時疾必興聖人作法豈徒然也今溫酒及炙肉用石炭柴火竹火草火麻荄火氣味各不同以此推之新火舊火理應有異金像銘北齊邢子才金像銘曰妙形難像至理希詮形之所及理亦在焉神儀內瑩寶相外宣應靈肹蠁感發大千圓光照耀映被無邊托銘斯在曠劫方傳此數句佳作也比年得一金銅菩薩像真所謂神儀內瑩寶相外宣者唐李嶠有金銅瑞像記蓋屑金銀珠玉七寶以範之此菩薩像縱非六朝亦是唐舊物近代未嘗作此也靈芝宫王安國直宿崇文院夢有邀至海上宫殿甚盛笙簫大作題曰靈芝宫有一人隔水止之曰時未至且令去恍然夢覺禁鐘已鳴矣平甫為詩曰萬頃波濤木葉飛笙簫宫殿號靈芝揮毫不似人間世長樂鐘聲夢覺時後四年卒曾鞏夢與平甫會因弔之平甫笑不止傍一人曰平甫已列仙官矣樂非塵世比也魏泰雜記如馬周為素雪宫仙官李賀作白瑶宫記陶𢎞景為蓬萊都水監固有此事也平甫女名茂者有刻石曰曾子固舊有夢記以述其事子固之文不復見矣東坡曰余在潁川夢至一官居人物與俗無異而山川清逺有足樂者顧視堂上榜曰仇池覺而念之仇池武都氐故地楊難當所保余何為居之明日以問客客有趙令畤德麟者曰何為問之此乃福地之小有洞天之附庸也杜子美蓋云萬古仇池穴潛通小有天神魚人不見福地語相傳近接西南境長懷十九泉何時一苑屋送老白雲邊他日工部侍郎王欽臣仲至謂余曰吾嘗奉使歸過仇池有九九泉萬山環之可以避世如桃源也唐書志成州同谷縣有仇池與秦州接壤又東坡送范景仁遊洛中詩蘚書標洞府松蓋偃天壇注歐陽永叔嘗遊嵩山日暮於絶壁上見苔蘚成文云神清之洞明日復尋不見又六一居士集有戲答唐山隱者詩我昔曾為洛陽客偶向巖前坐盤石四字丹書萬仞崖神清之洞鎖樓臺蓋紀此事余謂二公神仙中人宜所夢所見之異也括異志慶厯中有朝士將曉赴朝見美女三十餘人靚粧麗服兩兩並馬而行丁度觀文按轡于其後朝士驚曰丁素儉約何姬之衆耶有一人最後行朝士問曰觀文將宅眷何往曰非也諸女御迎芙容館主俄聞丁卒歐陽仲淳父曰嘗夢上帝命我為長白山主明年卒東坡有詩死為長白主名字書絳闕按松漠紀聞長白山在今山東南白衣觀音所居其山禽獸皆白人或穢之必致蛇虺之害也泰節二卦真宗召大理評事馮元説周易泰卦元敷述卦體以謂地天為泰言天氣下降地氣上騰然後交泰猶君下接于臣則臣上承于君然後君臣道通若天以髙亢位上則地無由得交于天天地不相交何由得泰君以尊大自恃臣無由得接于君君臣不接何由得泰石介三朝聖政録皇祐中待制王安國邇英閣講周易至節卦有慎言語節飲食仁宗問賈魏公曰慎何言語節何飲食公曰在君子言之則出口之言皆慎入口之食皆節在王者言之則命令為言語燕樂為飲食君天下當慎命令節飲食燕樂上大喜文火顧况茶論曰煎以文火細煙小鼎長泉皮日休茶詩山謡縱上下火候還文武王季友詩鍊丹文武火未成賣藥販山不販名如周賀詩屋雪凌髙樹山茶稱逺泉頗類所謂長泉矣長泉二字尤佳姚合詩酒用林花釀泉將野水煎張喬詩簟冷窗中月茶香竹裏泉皆不及姚合詩所謂酒用林花釀以花釀酒當是酴醿酒之類景龍文館記曰賜近臣酒乃用酴醿二字也松煙石墨鼂氏墨經曰古用松煙石墨二種石墨自晉魏以後無聞松煙之闕自漢貴扶風隃糜終南山之松蔡質漢官儀曰尚書令僕丞郎月賜隃糜大墨一枚晉貴九江廬山之松衛夫人筆陳圖曰取廬山松煙唐貴易州潞州之松上黨松心尤先見貴後唐則宣州黃山松歙縣黟山松羅山松李氏以宣歙之松類易水之松沈存中延州石液墨詩二郎山下雪紛紛旋卓穹廬學塞人化盡素衣今未老石煙多似洛陽塵如存中詩所云則北方固自有所謂石墨矣三代鼎器名商鼎文王鼎周公鼎周薑鼎虢薑鼎鄭伯姬鼎伯姬鼎晉薑鼎孔文公鼎魯公鼎宋公鼎單冏鼎宋君鼎宋君夫人鼎東宫方鼎得鼎庚鼎乙鼎大鼎始鼎欒鼎趠鼎辛鼎癸鼎龍鼎陀鼎東宫鼎盤鼎公緘鼎子斯鼎子吳鼎師鼎父乙鼎叔夜鼎季婦鼎父癸鼎父甲鼎父丁鼎蟬文鼎龍生鼎召夫鼎師毁敦師毛敦師敦周薑敦周虞敦應侯敦屈生敦仲駒敦孟金敦剌公敦叔榴敦虢薑敦散季敦仲酉敦冀師敦龍敦敦始敦何敦尹敦牧敦􅭻敦周敦敦內史彞周公彞召公彞魯侯彞彞伯宗彞楚公彞沈子彞鬳伯彞司空彞欱姬彞仲舉彞單從彞品伯彞單冏彞交父彞楚王盞彞祖戊彞商癸彞季婦彞父癸彞祖乙彞父乙彞父丁彞父己彞父辛彞母乙彞師艅彞仲父彞商彞五彞伯彞欱彞甗彞形彞尹彞應彞亞彞伊彞仲父彞小子師彞庚父鬲髙薑鬲書鬲父子鬲父己鬲毛乙鬲乃子鬲母鬲虢叔鬲莫敖鬲寶德鬲聿逺鬲伯鬲許子鍾鍾商鍾元子鍾走鍾遲父鍾南和鍾分寧鍾許子小鍾盂和鍾召公尊朝事尊韋子尊魚尊叔寶尊虎尊父戊尊祖戊尊祖辛尊中尊太甲尊父丁尊商從尊父癸尊父辛尊太甲尊庚爵父庚尊丁青爵商爵父戊爵祖己尊父己爵己舉爵己爵舉爵篆帶爵父乙爵祖乙爵伯爵飲爵爵父甲爵主人舉癸舉父辛爵寅簋左父舉叔髙簋師冥簋師奕簋張仲􅔆劉公􅔆太公􅔆子斯􅔆史黎􅔆姬􅔆姬豆單疑豆仲虔洗仲虞洗田季匜寒戊匜叔匜杞公匜義母匜張伯匜季姬匜季亳匜祖戊匜齊侯匜卭仲盤伯盞盤壽盤史孫盤卭仲盫伯盞盫應婦甗周陽侯甗仲信甗䣄甗孟嬭甗父己甗庚甗飲甗伯溫甗冀舟師師淮卣周卣冀卣商卣兄癸卣母辛卣母乙卣父甲卣祖癸卣父己卣祖戊卣王伯齍趠齍諸友盉伯玉盉沈子盉季亳盉父丁盉兹女觚象觚父庚觚甲子觚平周缸窖磬丁舉甌伯索盂熙之筏同武安釡軹家釡右三代鼎器名見於圖書者會粹於此將有考焉房中樂詩曰君子陽陽左執簧右招我由房謂路寢之房人君有房中之樂后夫人亦有房中之樂周南召南則人君房中之樂詩譜曰路寢之常樂國風之正經也天子歌周南諸侯歌召南后夫人亦用之王肅曰關雎至芣苡后妃房中之樂然則夫人房中之樂當用鵲巢采蘩矣周房中樂秦始皇三十六年改曰禱人所謂房中樂者婦人禱祠于房中者也唯宫中用之漢房中祠樂本髙祖唐山夫人所作唐山姓也髙祖好楚聲故房中樂亦楚聲孝惠二年詔樂府令夏侯寬備其簫管更名曰安世樂宋書樂志曰魏文帝黃初二年議者以房中歌后妃之德所以風天下正夫婦乃改為正始之樂明帝太和初繆襲奏魏國初建王粲所作登歌安世詩専以思詠神靈及説神靈鑒享之意後省讀漢安世詩無有二南風化天下之言又改曰享神歌隋髙祖龍潛時頗好音樂常倚琵琶作歌二首名曰天髙地厚述以夫婦之義因即取之為皇后房內曲命婦人登歌上夀並用之珊瑚筆格錢思公珊瑚筆格詩藴粹滄波逺搜奇鐵網勞柔條鑽火樹麗景奪星旄叢倚棲油几枝疏薦兔毫寶跗光互映翠匣價相髙鈎謾標祥諜人須詠楚騷休將鐵如意碎擊為爭豪北朝徐陵以珊瑚閣筆羅隱詩徐陵閣筆珊瑚架絶勝賓朋玳瑁簮用珊瑚架三字甚新錢思公酷愛珊瑚筆格嘗為子姪輩竊去公徐徐出錢許得之者自言即與之錢如此者歲不下數次公欣然容之思公詩體謹嚴如以蜀紙端硯寄仙芝詩膩繭裁卭部蒼崖映越溪展時雲冉冉呵久露凄凄平滑逾鵝素精鋼類裊蹄輕于漢宫縠碧似夏王圭鈿軸聊間卷銀鈎且醉題即時封密詔别有武都泥此詩與前詩一律荀况雲賦楚荀况雲賦曰有物於此居則同靜致下動則綦髙以巨圓者中規方者中矩大參天地德厚堯禹精微於毫毛充盈于天宇冬日作寒夏日作暑此數語奇甚荀况文章少見故録之曹植吹雲贊曰天地變化是生神物吹雲吐潤浮氣蓊鬱上二句亦奇虹蔡雍月令章句曰虹螮蝀也隂陽交接之氣著于形色者也雄曰虹雌曰霓虹常依隂雲而晝見於日衝無雲不見太隂亦不見率以日西見于東方故詩云螮蝀在東霓常見于旁四時常有之江淹赤虹賦曰赤霓電出蚴虬神驤曖昧以變依稀不常此正所謂霓也唯雄虹見藏有月釋名曰虹陽氣之動虹攻也純陽攻隂氣也故莊子曰陽炙隂為虹詩用六經字司馬相如詩鳳兮鳳兮從我棲得託孳尾永為好庾信詩鷸毛新鵠子盤根古樹低此書中好字用者絶少又如簡文詩螢飛夜灼灼蟲思夕喓喓鮑溶詩列樹闕六字下睢沈約詩蝶逢花搖漾燕值羽差池王維詩設罝守毚兔垂釣伺遊鱗錢起詩露濃蕙花落月冷莎雞飛白居易詩烏頭因感白魚尾為勞頳詩注曰魚勞則尾頳用詩中字尤奇又用月令中字如賀朝清詩流鶯拂繡羽二月上林期張協詩鷹飛日夜分雷動寒暑離胡致隆詩細雨來時麋角解春風歸日馬蹄香宋之問詩祭魚常見獺飲水畏驚猿宋元憲詩花寒隂鶴警霜早腐螢疏錢起詩謾把樽中物無人啄蟹匡此又用禮中字一經采化便覺神明全與用史傳中字不侔也辟雍詩曰於論鼓鍾於樂辟雍注曰文王立靈臺作靈囿靈沼合樂以落之又曰鎬京辟雍自西自東自南自北無思不服注曰武王于鎬京行辟雍之禮四方來觀者皆感化其德心無不歸服王制曰天子曰辟雍諸侯曰泮宫此周之制也禮記外傳曰虞曰庠亦曰米廩藏躬耕之穀於學中以供祭祀尚孝也夏曰序商曰瞽宗周曰辟雍亦曰太學東膠其言四代之學尤明今詩有辟雍之詩又有泮宫之詩而周禮獨不載辟雍之禮但曰成均之法成均唯周禮有之他書亦不載也靈臺詩曰經始靈臺經之營之箋曰天子有靈臺所以望氛祲察妖祥詩紀厯樞曰靈臺候天意也孝經援神契曰靈臺所以宣德察微緯學二説皆極其至鄭箋不能闕四字曰文王既出羑里召周公旦築為靈臺此蓋思所以闕三字意宣德察微矣劉向新序曰文王作靈臺池沼掘得人骨文王曰更葬之天下聞之皆曰西伯賢矣澤及枯骨而况於人乎三輔黃圖曰周靈臺在長安西五十五里公羊莊公三十一年注曰天子有靈臺以候天地諸侯有時臺以候四時然雜候上林漢制曰清臺日至書雲魯則曰觀臺耳八桂孫綽天台賦曰八桂挺森以凌霜五芝含秀而晨敷李善注引山海經曰桂林八樹在賁隅東所謂賁隅東者招搖之山也五芝在天台固自有之不應八桂逺取招搖之山按臨海記曰白石之山望之如雪山有湖傳云金鵝之所集八桂之所植又地理記曰天台山有八桂嶺此尤曉然梁禇禋詩誰謂重三珠終焉競八桂張九齡詩分庭八桂樹肅客兩童子盧綸詩玉壇標八桂金井識雙桐皆用八桂事也黃庭圖黃庭經極修煉吐納之妙有務成子注有梁丘子注有尹真人注有白履忠注有李子乘注有蔣慎修注有超遙子注又有五家注其要而易明者莫如圖有黃庭五藏圖黃庭內視圖黃庭內景五藏六府圖補瀉圖唐元一作女子胡愔撰黃庭外景圖五藏導引圖黃庭圖證訣可謂盡其妙矣東坡書黃庭內景贈葆光道師蹇序辰龍眠居士復為作經相其前畫二人像其後筆勢雋妙遂為希世之寶嗟嘆不足故復贊之曰太上虛皇出靈篇黃庭圖闕三字仙髯耆兩卿相後先闕妙夾侍清且妍十有二神闕二字堅巍巍堂堂人中天問我何修果此緣是心朝空夕了然恐非其人世莫傳殿以二士蒼鵠騫南隨道師厯山淵山人迎笑喜我旋問誰遺化老龍眠山谷次韻子瞻書黃庭尾付蹇道師琅函絳簡蕊珠篇寸田尺宅可蘄仙髙真接手玉宸前女丁來謁粲六妍金鑰閉欲形完堅萬物蕩盡正秋天使形如是何塵緣蘇李筆墨妙自然萬虛拱手書已傳傳非其人恐飛騫當付驪龍藏九淵蹇侯奉告請周旋緯蕭探手我不眠二公之言施於經相尚爾而况圖訣之益乎成公綏敘乾文晉成公綏天地賦曰懸象成文列宿有章三辰燭耀五緯重光衆星回而環極招搖運而指方白虎時據于參旗青龍垂尾于氐房玄龜匿首于女虛朱鳥奮翼于星張帝皇正坐于紫宫輔臣列位于文昌垣屏絡繹而珠連三台參差而雁行軒轅華布而曲列攝提鼎峙而相望敘事之妙如此漂史記曰韓信從下鄉城下釣有漂母見信飢飯信竟數十日越絶書曰伍子胥至溧陽見一女子擊絮于瀨水中子胥曰豈可得飱乎女曰諾即發其簞飯清其壺漿而與之子胥謂女子毋令露之子胥行五步還顧女子自投瀨水之中吳越春秋同莊子曰宋人有善為不龜手之藥者世世以洴澼絖為事郭象注曰其藥能令手不拘坼故常漂絮于水中漂絮擊絮也宋景文公詩藥有不龜方擊絮管無闕新宫銘良常西麓源澤東泄新宫宏宏崇軒䡾䡾雕珉盤礎鏤檀竦楶碧瓦鱗差瑶階肪截閣凝瑞霧樓橫祥霓騶虞巡徼昌明捧闑珠樹規連玉泉矩泄靈飊遐集聖日俯晰太上遊儲無極便闕百神守護諸真班列仙翁鵠立道師氷潔飲玉成漿饌瓊為屑桂旗不動蘭幄互設妙樂競奏流鈴間發天籟虛徐風簫冷徹鳳歌諧律鶴舞會節三變玄雲九成絳雪易遷徒語童初浪説如毁乾坤自有日月清寧二百三十一年四月十二日建東坡遊羅浮作詩示叔黨其末云負書從我盍歸去羣仙正草新宫銘汝應奴𨽻蔡少霞我亦季孟山玄卿坡自注曰唐有夢書新宫銘者云紫陽真人山玄卿撰其略曰良常西麓源澤東泄新宫宏宏崇軒䡾䡾又有蔡少霞者夢人遣書碑銘曰公昔乘魚車今履瑞雲躅空仰塗綺輅輪囷其末云五雲閣吏蔡少霞書余按唐小説薛用弱集異記載蔡少霞夢人召去令書碑題云蒼龍溪新宫銘紫陽真人山玄卿撰其詞三十八句不聞有五雲閣史之説魚車瑞雲之語乃逸叟所載陳幼霞事云蒼龍溪主歐陽某撰蓋坡公誤以幼霞為少霞耳玄卿之文麗整髙妙非神仙中人嵇叔夜李太白之流不能作今記於此以證坡注之誤也集異記曰蔡少霞夢褐衣鹿幘人召去石碑之側謂曰召君書此二青衣僮至一捧牙箱內有紫絹文書一齎筆研令少霞法此而寫少霞援筆頃刻而成因覽讀之乃蒼龍溪新宫銘遂寤急命紙筆紀録或往視之筆迹宛有書石之態窮奇山海經曰封山有獸狀如牛而蝟毛名曰窮奇食人或云窮奇聞人鬭乃助不直者文王出獵所獲張揖注上林賦曰窮奇其音如狗嘷食人神異記曰西北有獸狀如彪有翼名窮奇東方朔神異經曰崑崙西有獸其狀如犬有兩目而不見有兩耳而不聞有腹而無五臟有腸而徑過人有德行而往抵􅠅音觸之人有凶德而往舐迎之天使其然名曰渾沌一名無耳一名無心所居無常咋人回轉向天而笑神異經曰西方荒中有獸焉狀如彪而身大毛長尺許張華注此獸毛皆如毫豬毛也人面彪足口有豬牙尾長一丈八尺名曰檮杌此獸食人又曰叨餮身如羊人面目在腋下食人左氏所載不才子曰窮奇曰渾沌曰檮杌曰叨餮皆獸名也今録於此承明廬范雲詩伊昔霑嘉惠出入承明宫盧象詩召入承明宫聖人借顔色此言承明殿也應璩詩問我何功德三入承明廬劉孝綽詩步出金華省逺望承明廬此言殿中直廬耳西都賦曰又有承明金馬著作之庭亦藏書之所大雅之林也嚴助為會稽太守帝賜璽書曰君厭承明之廬張晏曰承明廬在石渠門外揚雄傳晉灼曰黃圖有太玉堂小玉堂殿李尋待詔黃門得預入直而曰久汙玉堂之直者言直廬在玉堂外亦猶承明之有廬也翼奉曰孝文時未央宫無髙門麒麟殿獨有前殿曲臺溫室承明耳霍光傳曰太后車駕幸未央宫承明殿盛服坐武帳期門武士陛戟陳列殿下罪狀昌邑王是豈太后所御之地是必諸帝常所臨御也方諸物類相感志曰方諸巨蚌也向月以器承之得三二合水亦如朝露淮南子曰方諸見月津而為水注曰方諸大蛤也隂燧之具摩拭令熱向月則有水生故周禮司烜氏以鑒取明水于月謂之方諸明水陳饌以為玄酒唐闕四字禪取明水用之李敬真曾入九月中取蚌蛤一尺二寸者依法拭之至夜半得水四五斗楊文公詩九天青女霜添味五夜方諸月溜津潮繫日月抱朴子曰日之兩潮一日一夕各入地中故一日一夕而有兩潮也海潮賦曰夫潮之生因乎日也其盈其虛繫乎月也及晦而絶過朔則隆月弦則小贏月望則大至又曰日激水而潮小月離日而潮大海潮志曰詳其潮水之起若釡鼎之沸沸則煎沫而溢出究其本祇平于鼎釡若沸溢則加倍之也嘗聞南海洲採珠人説每一入海必以繩繫身岸人持之潮來必動繩岸人共挽之助身而上又説或潮上海底山穴間必暗黑雷鳴水孛然而漲上及登岸則潮漲入浦溆矣是隂陽二氣交作而變日月為二氣之母潮隨二曜蓋不虛耳封禪河圖真紀鉤曰王者封泰山禪梁父者七十二君史記封禪書曰齊威公既霸而欲封禪管仲曰古者封泰山禪梁父七十二家而夷吾所記者十有二焉無懷氏封泰山禪云云宓羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云顓帝封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪云云湯封泰山禪云云周成王封泰山禪社首應劭曰在博縣晉灼曰在巨平南三里太史公曰雖有受命之君而功有不洽是以中間逺者千有餘歲近者數百載其儀不可得記桓談新論曰泰山之上有八百餘處而可識知者七十有二白虎通云升泰山觀易姓而王可得而數者七十二君張華封禪儀曰登封泰山者七十有四家其諡號可知者十有四洛水無冰春秋説題辭曰洛之為言繹也水繹繹光耀也述征記曰水底有礬石故上無冰凍也易乾鑿度曰帝盛德之應洛水先溫先儒言洛居天地之中其氣晏溫故曰溫洛蘇味道牛鳳及有和受圖溫洛詩亦言溫洛唐驪山溫泉亦以其下皆生礬石故溫也李賀詩華清源中礬石湯徘徊百鳳隨君王八紘八極淮南子曰九州之大純方千里九州之外乃有八殥音胤也亦方千里自東北方曰大澤曰無通東方曰大渚曰少海東南方曰具區曰穴澤南方曰大夢曰浩澤西南方曰資渚曰丹澤西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大冥曰寒澤凡八殥八澤之雲是雨九州八殥之外而有八紘亦方千里自東北方曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰衆安南方曰都廣曰反户西南方曰焦僥曰炎土西方曰金邱曰沃野西北方曰一目曰沙所北方曰積水曰委羽凡八紘之氣是出寒暑以合八正必以風雨八紘之外乃有八極鄒子曰中國者天下八十分之一有海環之如此者九又有大瀛海環之總曰八極也自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八殥八澤之雲以雨九州而和中土注曰中土冀州也接花山谷接花詩雍也本犂子仲由元鄙人升堂與入室只在一揮斤接花之法唯見劉禹錫詩分畦十字水接樹兩般花鹽田鹽田在河東鹽澤其中産鹽引水沃之則自成號曰鹽田取亦無盡不沃則無之張液池百步其鹽多少隨月增減也又有鹽井者蜀都臨卭縣二井一是火井一是鹽井若取鹽井以火井煮之斛水得鹽四五斗若非火井煮之不過一二斗矣又有青池鹽其鹽正方廣半寸其狀扶疏似石人耕池旁地取池沃種之歲月久即生此鹽又有草鹽者襄沔記曰龍巢山旁有鹽池水色白上生紫菱四邊青泥十一月中池左右十餘里地草上如霜彌日不釋嘗之乃鹽味世謂之鹽花山又有鹽根者亦名太隂玄精石出河中解縣鹽池中本鹽根也往往池邊近水采之則得其色理如玉質形狀如龜甲黑者不佳黃白明淨者上潑生麵太平記曰大夫蚤來已食一碗潑生麵矣太平記唐人所作竇平曰潑生麵疑是今之略生麵也如冷淘則杜詩槐葉冷淘之外無所見也今之食麵俱曰湯餅按後漢梁冀傳進鴆加煮餅世説載何平叔面白魏明帝食以熱湯餅汗出以衣自拭色轉皎然吳均稱餅德曰湯餅為最宗懍荆楚歲時記曰六月作湯餅庾闡賦曰當用輕羽拂取輕麵輕軟適中然後水引細如委綖白如秋練此謂之湯餅齊髙帝所嗜引水麵者此也束晳餅賦曰仲春之月天子食麥而朝事之籩煮麥為麵又曰三冬冽寒充虛解戰湯餅為最又曰振掌握搦拊摶麵彌離於指端手縈回而交錯蓋用手為之也今北人謂之冬餫飩春餺飥李正文刋誤曰舊未就刀䬯皆掌托為之刀䬯既具乃云不托俗乃用餺飥二字也方言曰餅謂之餛或謂之飩餛飩之名見於此范侍讀沖元長言其父元祐間為東平府直講謂每日供膳所食湯餅異常因造外厨訊諸庖者見釡上有金錢數十審其安用對曰凡麵入湯之後每遇一沸必下一錢錢盡而後已故其説曰硬作熟溲湯深煮久緯略卷十一
