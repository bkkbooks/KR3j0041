body:
  text: 緯略卷八宋髙似孫撰通爾雅漢武帝得䑕終軍知之曰厥號曰鼮其文如豹詔何以知之對曰名見爾雅帝嘉之賜帛爾雅之業遂盛郭璞爾雅注何承天纂文世祖大會靈臺得䑕熒熒光澤帝異之問羣臣莫知對竇攸對曰鼠名鼨詔何以知之對曰名出爾雅詔秘書審計如其言上喜賜帛諸侯子弟從之受爾雅三輔決録漢侍中劉秀表曰宣帝時使人發盤石于上郡石室中有反縛一人時臣秀父向為諫議大夫謂此貳負臣也詔問何以知之對曰出山海經其曰貳負之臣曰危與貳負殺窫窳帝乃梏之疏屬之山桎其右足反縛其手上大驚一時多奇之又孝武帝時有獻異鳥者不知何以食之東方朔見之能言其名又言所當食問朔何以知之曰山海經所出也此與通爾雅者如合一揆矣水事淮南子曰九疑之南山事少而水事多水事二字妙甚郄昂蚌鷸相持賦曰水濱父老以漁弋為事此句全學南史所云㳂潮居民以鵝鴨為業也晁無咎䟦王右丞捕魚圖有曰晩道吳江如此漁者業亷而事佚用事字更好皮日休詩序曰各補茶事十數條林和靖詩亦曾用茶事二字茶事尤精絶孔硯唐王嵩㠋孔子石硯賦曰旁積垂露中含偃波八字奇特常人筆力不可到李賀青花紫石硯歌圓毫促㸃聲清新孔硯寛頑何足云迺以為寛頑何也劉禹錫硯詩闕里廟中空舊物開方竈下豈天然亦不以為然也宋景文公摘粹曰河東舜廟中有大硯一方尋尺刻文曰帝鴻氏之硯魯廟中有孔聖修六經硯方一尺三寸中心已穿穴蜀犍為人得揚雄草𤣥硯如今制去其圭角汾水王通廟中有通隋時續六經所磨硯伍緝之從征記曰魯國孔廟中石硯一枚甚古朴孔子平生時物也庾肩吾謝銅筆格啓曰煙磨青石已踐孔子之壇當是青石也笏王子充笏賦曰殊相逸發奇文秀起此八字全如晉人傳及世説中言句蔣防鎮圭賦曰雲虹發色氷雪成姿上一句甚佳下一句恐玉非氷雪之潔耳然尸子曰玉者色不如雪澤不如雨東方朔有相笏經袁天綱又有相笏經郭先相笏經陳混掌相笏經古相手板經六卷熬波出素張融作海賦文詞詭激獨與衆異以示鎮東將軍顧愷之愷之曰卿此賦實髙𤣥虚但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路晉書此十六字直可在𤣥虚之表王誕字茂世晉孝武帝崩從叔尚書令珣為哀冊出本示誕誕曰猶少叙節物一句誕便擥筆接其秋冬代變云霜䌓廣除風迴髙殿珣嘆美而用之古人服善有如此者今世無此矣然融賦出於自筆珣䇿乃誕益之尤為可服東坡詩栁絮才髙不道鹽直用融語三字也管子周禮注曰煮水世本曰宿沙作煮鹽廣志亦曰煮鹽鹽鐵論曰煮海魯連子曰煮沙益州記嶺表録異皆用煎字融賦直曰熬波出人意表宋景文詩濯錦萬梭催貢篚熬鹽千井算牢盆乃用熬字景文雪詩鹽波熬巨浸縞頃界中田用鹽波甚新春秋列國文章讀左氏傳甚愛鄭楚文章自典謨誓命以下無有而戰國䇿楚漢春秋太史公取以約史者未可及也因悟為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之其重複精詳至再至三如此文章安得不好文筆遲速武帝春秋二十九得皇太子枚皋與司馬相如作皇太子生賦皋為文疾受詔輙成相如善為文而遲故所作少見漢書顔延年與謝靈運俱以詞采齊名而遲速懸絶文帝嘗敕各撰樂府北征篇延年受詔輙成靈運久之乃就宋書葛稚川以為長卿製作雖遲而首尾温麗枚皋雖敏而時有累句故知急行無善迹矣揚子雲又謂軍旅之際戎馬之間飛書走檄必用枚皋廊廟之下朝廷之中髙文典䇿非相如不可太𤣥法言桓譚新論曰子雲新造法言太𤣥也人貴所聞賤所見故輕易之若遇上好事必以太𤣥次五經也王充論衡曰揚子雲作太𤣥法言張伯松不肯一觀以與並肩若生于周世則為金匱也二子之論如一葛稚川曰充所著論衡北方未有得之者蔡伯喈嘗到江東得之嘆其文髙度越諸子嗚呼世安得復見伯喈者乎稚川又曰盧生問云蔡伯喈張平子才足著書正恐年逺㫖深世人不解故不著也余曰若如來言子雲亦不應作太𤣥經也然穎容春秋例曰著作之事前有司馬遷揚雄後有鄭衆班固近即馬融鄭𤣥遷史記不識畢公為文王之子而言與周同姓揚雄法言不識六十四卦而云所從來逺矣嗚呼難哉幼文言班固九歳作頌賦東觀漢記曹植十歳屬文文選人名録阮籍八歳庾闡九歳屬文魏氏春秋劉孝綽七歳屬文南史丘遲八歳屬文庾肩吾何遜八歳賦詩陸從典八歳作文梁書葛洪論史記西京雜記曰司馬遷發憤作史記一百三十篇先達稱為良史之才其以伯夷居列傳之首以為善而無報也次為項羽本紀以據髙位者非闗有徳也及其叙屈原賈誼辭㫖抑揚悲而不傷亦一代之偉才然觀太史公之言曰夫詩書隠約者欲遂其志之思故述往事思來者嗟乎知遷之志洪其庶幾乎玉蟾蜍廣川王發晉靈公塜甚瓌壯器物皆朽不可别唯玉蟾蜍一枚大如拳腹空容五合如新王取以盛水滴硯常衮詩綴簾金翡翠賜硯玉蟾蜍劉禹錫詩玉蠩吐水霞光浄綵翰揺風絳錦鮮胡文恭詩㸃筆乍驚蟾滴漬闕文五字漿寒夏英公詩玉蟾分滴漬圓池宋景文公詩獨憶王筠齋壁詠玉蠩飛溜入霞箋盖用此吳融硯賦曰玉蟾一滳松煙四上上句四字妙甚用玉滴佳蘭賦仲子陵幽蘭賦曰芬華外揚真正内積和氣所資精英自得此十六字超出筆墨蹊徑吳筠竹賦曰契道合靈表貞示節用道字貞字亦不在蘭賦下錬石補天往古之時四極廢九州裂天不兼覆地不周載於是女媧氏錬五色石以補蒼天斷鼇足以立四極出淮南子蒼天西北小闕庖犧見之惡不悦冶鑄五色石合為一乃以補之出異苑歸美山山石紅丹赫若采繪峩峩秀上切霄隣景名曰女媧石大風雨後天澄氣静聞絃管聲王韶之南康記劉孝威曲水詩序曰女媧補石重華棄金唐人錬石補天賦曰天何言哉有闕則補持五石而是用俾四時而能取成乎圓象故資可轉之功定彼乾儀盖俟至堅之主所以裨覆幬仰周普磨礱入鍜成功豈濫于宋人緝綴為勞至徳何慙于山甫司空圖詩女媧只解補青天不解煎膠黏日月崔桐詩補天留粉石縮地入青山韓愈詩玉盌不磨著泥土青山孔出白石補李賀詩女媧錬石補天處石破天驚逗秋雨屏風隔坐鄭𢎞為太尉時舉第五倫為司空班次在下每正朔朝見𢎞曲躬自卑上問知其故遂聽置雲母屏風分隔其間漢書景帝時紀陟父亮為尚書令陟為中書令每朝會詔以御屏風分隔其座張勃呉録唐人試進士嘗以隔座雲母屏風為題梁劉孝威謝敕賚畫屏風啓曰紀亮所隔唯珍雲母武秋所顧止貴琉璃豈若寫帝臺之基拂崑山之碧畫巧吳筆素踰魏賜馮商莫能賦李尤誰敢銘此乃用紀氏故事也十種琉璃大秦國出青白黑黄赤緑紺縹紅紫十種琉璃魏略又有五色玻璃紅色者最貴𤣥中記程氏繁露引魏書有天竺國人至京自言能鑄石為五色琉璃於是採石鑄之所謂琉璃者謂其如玉也若以石鑄之曾何足珍按廣雅曰琉璃珠也韻集曰琉璃火齊珠也則知琉璃為玉物也晉潘尼琉璃碗賦曰濟流沙之絶險越䓤嶺之峻危於是逰西極望大蒙厯鍾山闚燭龍覲王母訪仙童取琉璃之攸華詔曠世之良工纂𤣥儀以取象准三辰以定容光映日曜圓盛月盈纎瑕罔麗飛塵靡停灼爍旁燭表裏相形凝霜不足方其潔澄水不能喻其清剛過金石勁勵瓊玉磨之不磷湼之不濁如潘尼所賦的非以石鑄之者矣碧古人賦中最好用碧字張衡南都賦曰緑碧紫英青雘丹縹左思吳都賦曰紫貝流黄縹碧素玉又蜀都賦曰青珠黄環碧砮芒消李邕石賦曰苔蘚剥落雨露淋漓氷碧藻曜繪畫紛披用氷碧二字尤佳廣志曰碧有縹碧有緑碧出越巂説文曰碧石之美者矯世論曰碧似玉唯猗頓能别之木難曹植樂府詩曰明珠交玉體珊瑚間木難廣志曰木難珠黄色生東夷南越志曰木難金翅鳥口結沫所成碧色珠也大秦土人珍之崔豹古今注以木難為莫難水仙賦余二十年前作水仙賦自恨筆力欠奇偉五年前楊仲囦自蕭山致水仙花一二百本極盛乃以兩古銅洗藝之學洛神賦體再作後水仙花賦頗愜人意近讀金樓子云劉子𤣥好學有文才為水仙花賦時人以為不減洛神賦余固不敢望知幾萬分一亦知名人製作自有意會古人也楊仲囦今名囦道畫二踈晉王彪之詩序曰余求致仕詔累不聽因扇上有二踈畫作詩一首以述其美王彪之詩不可見東坡有二踈圖賛則二踈故事後人每以為圖然隋朝畫品有髙貴鄉公所畫祖二踈圖今當不復有此矣舊讀顧况詩有云踈家父子錯挂冠梁鴻夫妻虚適越殊不可曉當有激云爾順下風齊孔稚圭𤣥館碑曰赤松家石室之下神農行弟子之敬廣成居崆峒之上軒帝稟順風之禮葢用莊子黄帝聞廣成子在崆峒之山故徃見之廣成子南首而卧黄帝順下風膝行而進再拜稽首而問焉稚圭下語瓌壯如此越王請于范子稱曰寡人用夫子之計幸得成矣寡人聞夫子之于隂陽進退之理預知未形來聽下風越絶書聽下風聽於下風也不喜俗人嵇康與山巨源絶交書曰不喜俗人而嘗與之共事或賓客盈坐鳴聲聒耳囂塵臭處千變百技在人目前阮修性簡不修人事絶不喜見俗人誤相報遇輙便捨去臧榮緒晉書晉人風尚髙曠往往如此不止嵇阮而已削藁漢孔光典樞機十餘年時有所言輙削草藁周就素重慎周密上封事輙削去草藁後漢樊𢎞謙柔畏慎所上便宜及陳得失輙手自寫毁草藁皇甫嵩畏慎前後上表陳其補益者百餘事皆手書毁藁魏陳羣前後密諫得失每上封輙削草魏任嘏每納忠諫輙手書壊本北齊封隆文首參經略奇謀異算密以啓聞上書削草藁宋謝𢎞微每有獻朁及論時事必手書焚草罰酒梁孝王逰忘憂之館集諸逰士使各為賦枚乗為栁賦路喬如為鶴賦公孫詭為文鹿賦鄒陽為酒賦公孫乗為月賦羊勝作屏風賦韓安國作風賦不成鄒陽代之罰酒三升餘各賜絹五匹出西京雜記帝幸辟雍會命羣臣賦詩侍中和逌尚書陳騫等作詩稽留有司奏免官誥曰吾以闇昧愛好文雅廣延詩賦以知得失而乃爾紛紜良用反側其和逌等各罰酒魏志石崇元康六年從京出為征虜將軍有别廬在南縣界澗谷中時征西大將軍王詡當還長安與衆賢共送往澗中晝夜逰宴遂各賦詩不能者罰酒邑令潘豹散騎常侍劉邃南郡太守石嶲各罰酒三勝金谷園詩序觀此三事則蘭亭修褉賦詩不成者罰酒非止此也楷書晉中經簿曰有緗素書白縑楷書黄紙楷書白絹行書二尺竹牒楷書白練絹楷書廣内置楷書吏自晉始唐𤣥宗始以𨽻楷書易古文尚書今儒不識古文自唐開元始宋景文公嘗言蘇頲撰朝覲壇頌曰有乩虞氏館閣校讐官于乩字之右㸃曰疑不知有楊備者得古文尚書釋文知乩字為古稽字此開元以𨽻楷書易古文之失也孔子因史作春秋阮籍孔子誄曰養徒三千升堂七十潜神演思因史作書因史作書四字甚佳􅪛璧楚明光者楚王大夫也昭王得􅪛氏璧欲以貢于趙王于是遣明光奉璧之趙􅪛古和字琴操今善琴者傳卞和操有其聲而亡其辭惟存一句可認云卞和三獻人不識以余觀之非當時操也蔡邕記卞和楚野人嘗居山耕種因得玉璞以獻于懐王王以為欺謾斬其足和作操曰悠悠沂水經荆山兮精氣鬱決谷巖巖兮中有神寶灼灼明兮穴山採玉難為功兮雲夢尚書曰雲夢土作又本朝太宗得古本尚書作雲土夢作乂詔改禹貢從古本按孔安國注云雲夢之澤在江南是不然也左傳曰吳入郢楚子渉睢濟江入于雲中王寢盗攻之以戈撃王王奔鄖楚子自郢西走渉睢則當出於江南其後渉江入于雲中遂奔鄖鄖今之安州渉江而後至雲入雲然後至鄖則雲在江北也又曰鄭伯如楚子産相楚子享之既享子産乃具田備王以田江南之夢杜預注曰楚之雲夢跨江南北曰江南之夢則雲在江北明矣元豐中有郭思者能言漢沔間地理亦以為江南為夢江北為雲予以左傳騐之思之説信然江南即今之公安石首建寧等縣江北則玉沙監利景陵等縣迺水之所委其地最下江南二浙水出稍髙方土而夢已作乂矣此古本之為允也以上皆筆談所記余按寰宇記曰雲夢澤半在江南半在江北其水中平土立半出寰宇記本樂史所撰史太宗時人則沈郭未嘗見寰宇記也然沈辨未得其詳且周禮荆州云其澤藪曰雲夢鄭康成注曰雲夢在華容禹貢云雲土夢作乂昭三年左傳楚子與鄭伯田于江南之夢又定四年楚子渉睢濟江入于雲中杜預云南郡枝江縣西一作南有雲夢城江夏安陸縣東南亦有夢城或曰南郡華容縣東南有巴丘湖江南之夢也雲夢一澤而每處有名者司馬相如子虚賦云雲夢者方九百里則此澤跨江南北亦可獨稱雲稱夢耶酈道元水經謂自江陵東界為雲夢北界為雲夢之藪亦不明指一處不可専以夢在江南雲在江北𤣥圖張衡𤣥圖曰𤣥者包含道徳搆掩乾坤槖籥元氣稟受無原又曰𤣥者無形之類自然之根作于太始莫之與先其言冥眇契理如此殊少傳斯圖也太素易乾鑿度曰太素質之始也雄含物魂號曰太素雌雄俱行故能含物魂而生物也獨言雄主于陽故也帝王世紀曰形變有質謂之太素太素之前幽清寂寞不可為象惟虚惟無盖道之根自道既建由無生有太素始萌萌而未兆謂之龎洪盖道之幹既育萬物成體于是剛柔始分清濁始位天成于外而體陽故圓以動盖道之質禮斗威儀曰二十九萬一千八百六十歳而反太素冥莖乃道之根也張衡靈憲注曰太素之前幽清𤣥静寂寞冥黙不可為象厥中惟靈如是永久焉斯為㝠莖揚雄覈靈賦曰太易之始太初之先馮馮沈沈不可奮摶與此同意由無生有太素始萌萌而未兆并體同色坤屯不分坤屯音渾沌陳思王髑髏説曰昔太素氏不仁勞我以體苦我以生今也幸變而之死是反吾之真也阮籍通老論曰焉得松喬頥神太素逍遥區外登我年祚陸機詩澄神𤣥漠流棲心太素域弭節欣髙視俟我大夢覺顧公直答陸機曰恢恢太素物物初基在昔哲人觀衆濟時天圓地方内景外景單居離問曾子曰天圓而地方誠有之乎曾子曰天之所生上首地之所生下首上首之謂圓下首之謂方如識天圓而地方則是四角之不揜也參嘗聞之夫子曰天道曰圓地道曰方方曰幽圓曰明明者吐氣是故外景幽者含氣是故内景廣雅曰天圓廣南北二億三萬三千五百里七十五歩東西短減四歩周六億十萬七百里二十五歩從地至天一億一萬六千七百八十一里半下地至厚與天髙等天九野吕氏春秋曰天有九野何謂九野中央曰鈞天東方曰蒼天尚書考靈曜曰舉天廣雅曰上天東北方曰變天北方曰𤣥天西北方曰幽天西方曰顥天尚書考靈曜廣雅皆曰成天西南方曰朱天南方曰炎天尚書考靈曜曰赤天東南方曰陽天淮南子亦曰天有九野春秋内事曰天有十二分次日月之所纏也所謂十二分次者即分野也前人多與分野並言少言天分翟楚賢碧落賦曰五石難補九野環舒星辰麗之而照曜日月憑之而居諸盖用九野事也天宇梁元帝纂要曰天地四方曰六合四方上下謂之宇往古來今謂之宙顔延年詩太微凝帝宇瑶光正神縣用此宇字劉允濟天賦曰粲黄道以開域闢紫宫而為宇徐彦伯南郊賦曰告紫宙之成功定皇天之寶位王勃七夕賦曰霜凝碧宙水瑩丹霄用字皆新奇渾天記賀道養渾天記曰昔記天體者有三渾儀莫知其始書曰璇璣玉衡以齊七政盖渾儀體也二曰宣夜夏殷之法也三曰周髀周髀所造非周家術也近世復有四術一曰方天興于王充二曰軒天起于姚信三曰穹天由於虞喜皆以臆斷浮説不足觀也惟渾天之事徴驗不疑此論精確漢渾儀土圭義熙起居注曰十四年相國表曰間者平長安獲張衡所作渾儀土圭厯代寶器謹遣奉送歸之天府宋顔延之請立渾天儀表曰張衡創物蔡邕造論戎夏相襲世重其術臣昔奉使入闗值大軍旋斾渾儀在路肆觀奇秘絶代異寶旋及王府考諸前志誠應夙聞尚書璇璣玉衡以齊七政崔瑗所謂數術窮天地制作侔造化經志所云圖憲所本故體度不渝精測尚矣則七晷運變無匪康時九代真觀不絶司厯臣夙懐末意懼于非任今忝惟職統敢昧死以聞月節范子計然曰月行疾二十九日三十日間一與日合取日之度以為月節月節二字他書未之見也天雞𤣥中記曰東南有桃都山上有大樹名曰桃都枝相去三千里上有天雞日初出照此木天雞即鳴天下雞皆随之物類相感志曰大荒東極至鬼府山臂焦山脚巨洋海中昇載海日盖扶桑山有玉雞玉雞鳴則金雞鳴金雞鳴則石鷄鳴石雞鳴則天下之雞鳴潮水應之温庭筠詩漏轉霞髙滄海低頗梨枕上聞天雞用天雞也陳陶詩朝天半夜聞玉雞星斗離離礙龍翼用玉雞也李白詩半壁見海日空中聞天雞雲占左氏傳曰哀公六年有雲如衆赤鳥夾日以飛楚子使問太史太史曰其當王身乎若禜之可移於令尹司馬也王曰除心腹之疾而置諸股肱何益終不禜京房易飛候曰黑雲如羣羊奔如飛鳥五日必雨兵書曰有雲如丹蛇随星後大戰殺將又曰雲如雌雉或如雄雞臨城其城必降吳範占候秘訣曰有青雲如雉兎臨城營軍敗走地鏡圖曰齊氣之見為牛雲氣占曰趙雲如牛北夷之氣如牛蔡邕獨斷曰夏至日南方有赤雲如馬者離氣也春秋元命苞曰堯母索扶升髙丘有雲如彪感已生皋陶以上所言鳥獸之形皆所以占雲也按兵書又曰韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如輪秦雲如美人魏雲如䑕齊雲如絳衣越雲如龍頭蜀雲如囷吕氏春秋則曰水雲如魚鱗山雲如草莽旱雲如煙雨雲如波魏子曰北夷之氣象羣羊南夷之氣象船山海之氣象樓臺宫闕都邑之氣象林木正此之謂天賦混成發粹劉允濟天賦養空栖無翟楚賢碧落賦名也者純陽之精形也者太無之精天行健賦陽乃天之徳隂乃地之符剛乃天之義柔乃地之樞陸肱乾坤為天地賦天之道也存乎至輕范榮三無私賦以上數語皆極其妙裁成風雨劉允濟天賦曰驅馭隂陽裁成風雨用裁成於風雨之上方册中無此文章也相雨黄子發相雨書曰四方有濯魚雲疾者立雨濯魚雲遲者少雨難至江漢雲疾者即日雨黄子發相雨書又曰常以戊申日候日欲入時日上有冠雲不問大小視四方黑者大雨青者小雨候日始出日正中有雲覆日而四方有雲黒者大雨青者小雨四方有雲如羊如猪雨立至四方北斗中有雲後五日大雨四方北斗中無雲惟河中有雲三枚相連狀如浴猪狶三日大雨以丙丁之辰四方無雲唯漢中有者六十日風雨有常以六甲之日平旦清明東向望日始出時日上雲大小貫日中青者以甲乙雨赤者丙丁雨白者庚辛雨黒者壬癸雨黄者戊己雨六甲日四方雲皆合者即雨以天方雨時視雲有五色黒赤並見者即雹黄白雜見風多雨少青黒雜者雨随之必滂沛流潦京房易飛候曰凡候雨以朔弦望雲漢四塞者皆當雨東風此日當雨有黒雲氣如覆船于日下當雨有黒雲氣如羊彘當暴雨有異雲如水牛不出三日大雨有黒雲如羣羊奔如飛鳥五日必雨有雲如浮船皆為雨北斗獨有雲不出五日大雨四望見青白雲名曰天塞之雲雨徴也有蒼黒雲細如杼軸蔽日月五日必雨雲如兩人提鼓持桴皆為暴雨夫占雨之法盡録於此雲扶日洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黄帝起黄雲扶日白帝起白雲扶日權徳輿詩更有觀臺稱賀處黄雲扶日瑞昇平宋景文公詩雲路舊扶黄道日霞觴深映六符天用此事又有所謂黄人捧日出道書晏元獻公詩青帝囘風初習習黄人捧日故遲遲陽闗三疊陽闗三疊今歌者每句再疊而已若通一首又是四疊皆非是每句三唱以應三疊則叢然無復節奏有文勛者得古本陽闗每句皆再唱而第一句不疊迺知唐本三疊如此樂天詩相逢且莫推辭醉聽唱陽闗第四聲自注云勸君更進一杯酒以此驗之若一句再疊則此句為第五聲今為第四則第一句不疊審矣樂石嶧山碑曰刻此樂石人多不曉顔師古謂以泗濱磬石作碑者也封氏聞見記爾雅曰魯國鄒縣有嶧山純石相積連屬成山史記曰始皇二十八年上鄒嶧山立石刻秦功徳鄒山記曰山東西二十里南北十三里髙秀獨出積石相臨殆無壤土石間多孔穴洞達相通俗謂之嶧孔太平廣記其石玲瓏秀潤宜于孤桐可中琴瑟疑嶧山之石自可磬音不但泗濱之石也此碑後魏太武帝登山使人排倒之邑人疲于供命聚薪其下焚之由是殘缺不堪模搨緯略卷八
