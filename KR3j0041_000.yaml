body:
  text: 緯略雜家類二雜考之屬提要臣等謹案緯略十二卷宋髙似孫撰似孫字續古餘姚人淳熙十一年進士厯官校書郎守處州似孫嘗輯經略史略子略集略騷略及此書今惟子略騷略與此書存陳振孫書録解題論其讀書以隱僻為博其作文以怪澀為竒然考證之學正不嫌其博而是編所引亦皆四庫所著録非馮贄之流詭辭炫俗者比固不得以隱僻譏也明沈士龍又稱其愍騷招隱八風圍棊氍禡牙之類全録藝文初學北堂御覽諸書無所增輯知宋世篇集不復具存適用類書誇示宏肆是誠在所不免周嬰巵林譏其悮引金樓子以劉休元水仙賦為唐劉子元踈舛亦不能無然其言篤實終出楊慎丹鉛諸録之上亦考古者所必資矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1a082a9e51ebd6c98c0c8bce878470ce8d000d2362afc780451d83db1319368a
