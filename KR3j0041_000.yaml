body:
  text: 緯畧雜家類二雜考之屬提要臣等謹案緯畧十二卷宋髙似孫撰似孫字續古餘姚人淳熈十一年進士厯官校書郎守處州似孫嘗輯經畧史畧子畧集畧騷畧及此書今惟子畧騷畧與此書存陳振孫書錄觧題論其讀書以隠僻為博其作文以怪澀為竒然考證之學正不嫌其博而是編所引亦皆四庫所著錄非馮贄之流詭辭炫俗者比固不得以隠僻譏也明沈士龍又稱其愍騷招隠八風圍棊氍禡牙之類全錄藝文初學北堂御覧諸書無所増輯知宋世篇集不復具存適用類書誇示宏肆是誠在所不免周嬰巵林譏其悮引金樓子以劉休元水仙賦為唐劉子元踈舛亦不能無然其言篤實終出楊慎丹鉛諸錄之上亦考古者所必資矣乾隆四十五年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:e8416c3ae9f57ec486971c18bb293926c5be445512785683463defc663c631fd
