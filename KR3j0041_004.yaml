body:
  text: 緯略卷四宋髙似孫撰細氈王吉曰廣厦之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛按韵集曰氈細罽也班固與弟超書曰月支毾㲪小大相雜但細好而已亦用細字林登續博物志曰劉學儀謂北狄為氈鄉氈鄉未有人用後漢西域傳注氈曰毛席亦佳青氈王子敬在齊中卧偷人取物一室之內略盡子敬呼曰偷兒石染青氈是我家舊物也可特置否於是群偷置物驚走語林按海南傳曰調一作波斯國有青石染氈絳染氈也石染青氈事出於此又魏武帝與楊彪書曰今贈足下青氈牀褥三具三國時已用此杜詩今晨降白露還憶舊青氈于鵠詩醉卧枕欹木坐寒展青氈氍㲣毾㲪張衡四愁詩曰美人贈我氈氍㲣古樂府詩請客上北堂贈我氈氍㲣衡詩蓋用此諸葛亮集詔答恢曰行當離别以為惆悵今致氍㲣一魏略曰大秦國以野蠶作繭織成氍㲣文出黃白黑緑則漢魏間所施也按通俗文曰織毛褥謂之氍㲣聲類曰氍㲣毛席也廣志曰氍㲣用㲲毛織也出南海又通俗文曰氍㲣之細者謂之毾㲪毾㲪者施大牀之前小榻之上所以登而上牀者魏略亦曰出大秦國以羊毳木皮野絲為之有五色九色鮮於東海所作東觀漢記曰景丹率衆至廣阿光武出城外馬坐於氈毾㲪上設酒肉杜篤邊論曰胸奴請降毾㲪罽褥帳幔氈裘積如邱山蓋謂是也李尤牀銘銘曰體之所安寢處之歡夕則敬慎崇德逺姦吁尤之㫖深矣一出有堅床銘曰體之所安寢處知歡久則敬慎崇德逺姦知字久字蓋字訛也蔡雍枕銘有曰哲人降鑒居安思危又切於尤也毛布韋光輝毛詩問曰七月之詩無褐箋曰褐毛布也賤者之所服毛布二字甚佳說文曰罽西胡毳布也用毳布尤新然不知禹貢所謂皮服卉服直是下字竒古陸機詩嘉卉獻時服靈术進朝飱卉服二字拆用尤精南方以竹為布郡國志寰宇記輿地志但曰竹布耳而庾翼與燕王書曰今致竹練三端用竹練尤竒諸葛恢表直曰纎絺細竹顔測集有謝絹葛啓曰氷紈風綌劉孝綽詩釣舟畫彩鷁漁一作遊子服冰紈冰紈出漢地里志齊俗織作冰紈綺繡純麗之物師古曰其色鮮潔如冰紈風綌却少用也劉楨瓜賦曰承之雕槃羃以纎絺公幹曽用纎綌也火浣布列子曰周穆王大征西戎獻昆吳劒火浣布劒切玉如泥布浣之必投火中布色益明出而振之縞然疑乎雪魏志青龍二年西域重譯獻火浣布詔大將軍太尉臨試以示百僚搜神記曰西域獻火浣布魏初時人疑之文帝以為火性酷烈無含育之氣著之典論明其不然按南史曰南海諸簿國有自然火洲樹生火中人績其皮為布與蕉麻無異色微青若小垢投火中則精潔此言木也又按吳録曰日南取火鼠毛為布名火浣布此言鼠也又按東方朔神異經曰南荒之外有火山生不燼之木晝夜火燒火中有鼠重百斤毛長二尺餘細如絲織作布以水沃之即死雖皆言鼠木而只言鼠可作原無作字布耳唯抱朴子曰火浣布有三種其一曰海中肅丘有自生火春起秋滅洲上生木木為火焚不糜但小一無小字焦黃人或得薪俱如常薪但不成灰炊熟則以水滅之使復更用如此不窮夷人取此木華績以為布一也又其木皮赤剝之以灰煮治以為布粗不及華俱可火浣二也又有白鼠毛長三寸居空木中入火不灼其毛可績為布三也據諸家所記惟葛稚川之言最為該的梁四公記載杰公至市見商人賫火浣三端杰公遙識曰此火浣布也二是緝木皮所作一是鼠毛所作因問木鼠之異公曰木堅鼠柔是可别也以陽燧火山隂柘木爇之木皮改常試之果驗王褒詩單衣火浣布利劒水精珠李頎詩火浣單衣繡方頷茱茰錦帶玉盤囊此蓋梁冀會群僚服火浣中單也白疊杜詩細軟青絲履光明白疊巾王昌齡詩手巾花疊淨香帔一作被稻畦成按漢書所謂苔布注曰白疊也吳時外國傳曰諸簿國用安子草織作白疊花布王昌齡所用者此也南史曰髙昌國有草實如繭中絲為細纑名曰白疊安子國人取以為布甚為軟白其言甚明也五時食蔡雍月令論曰問者曰春食麥羊夏食菽雞魚之屬但以為時味之宜不合於五行月令服飾器械之制皆從五行者說所食獨不以五行不已略乎曰亦嘗思之矣凡十二辰之㑹五時所食者必家人所蓄丑牛未羊戌犬酉雞亥豕而已其餘虎以下非食也食檄𢎞君舉食檄有所謂麞肶牛䐑炙鴨䐹魚熊白麞脯糖蟹車螯如何𦙍極侈於味去其甚者猶食白魚䱉脯糖蟹嘗食蚶蠣使門人議之鍾岏曰䱉之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕獷殼外緘無香無臭與瓦礫何異宜充庖厨永為口實𦙍之視君舉蓋無以優劣也宋景文公絶葷詩宣父蒲葅真可學鍾岏蚶蠣更無求其視所謂赤米白鹽緑葵紫蓼春初早韭秋末晚菘萬萬不侔矣奕孟子曰奕秋通國之善奕者也使奕秋誨二人奕其一人專心致志惟奕秋之為聽其一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之也左傳曰寧喜許納衛獻公太叔文子曰今寧子視君不如奕棋奕者舉棋弗定不勝其偶而況置君弗定乎所謂舉棋弗定者其一心以為有鴻鵠將至者乎班固奕㫖曰北方之人謂棋為奕揚雄方言曰圍棋者自關東齊魯之間謂之奕擊壤藝經曰擊壤古戲也釋名曰野老之戲也逸士傳曰堯時有壤父五十人擊壤於康衢或有觀者曰大哉堯之為君也壤父作色曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉此藝經所謂古戲也𤣥晏云皇甫謐號𤣥晏先生十七時與從姑子梁桞等擊壤于路則晉時尚有此戲矣風土記曰擊壤者以木作之前廣後鋭長尺四闊三寸其形如屨臘節童少以為戲分部如擲一作撾博也經曰壤以木為之前廣後鋭長尺四闊三寸其形如屨將戲先側一壤於地遙於三四十步以手中壤敵之中者為上此言之最分明也然觀吳盛彥擊壤賦曰論衆戲以為樂獨擊壤之可娛因風托勢罪一殺兩罪一殺兩不可曉當是以手中之壤擊地上之壤如今以錢取中之類也逸士傳所云壤父是猶稽康髙士傳曰堯時隱人年老以樹為巢而寢其上故人號曰巢父許由所師者是也抃左思吳都賦曰翹關扛鼎抃射壺博李善注曰元帝時覽抃射孟康曰手摶為抃按甘延壽以良家子善騎射試抃為期門以材力愛幸觀此則知抃為武力之驍雄者矣安哉李尤安哉銘曰安哉令名甘㫖是盛埏埴之巧甄陶所成食彼美珍思此鹿鳴此不知何器别無所著見雖是陶器未審其形製也鴟夷揚雄酒賦曰鴟夷滑稽腹大如壺晝日盛酒人復借酤常為國器託於屬車按史記吳王夫差取子胥尸盛以鴟夷革而浮之江中應劭曰取馬革為鴟夷鴟夷榼形也唐韻曰瓻丑饑切酒器大者一石小者五斗古之借書盛酒瓶則借書一瓻當用此字或又用鴟字者鴟夷亦盛酒器也所謂鴟夷滑稽腹大如壺蓋此物也山谷詩願公借我藏書目時送一鴟開鎖魚莫惜借行千里他日還君一鴟然則借書一鴟用鴟字也崔浩漢書音義曰滑稽酒器也轉注吐酒終日不已若今之陽燧樽酒臺晉舊事曰酒臺二金塗環鈕按周禮六彛皆有舟鄭司農曰舟下臺也今時承盤也今所謂臺盞盤盞並出此古鐺古銅鐺者龍首三足挹注以口翠蝕可玩因考晉舊事有龍首鐺即是此類唐薛大賈敦頤鄭德本為刺史皆有異政號鐺腳御史則鐺三足矣服䖍通俗文曰釜有足曰鐺笑林曰太原人夜失火欲出銅鐺乃得尉斗便大驚怪曰異事火未至已被燒失腳亦言有足也述異記有謂卿無溫鐺安得飲酒當是溫酒器也竟陵王子良遺何㸃徐景山酒鐺宋景文公詩謝病歸裝能辦未葛洪丹竈景山鐺當是酒具一日有人持一枚求售且言以紙燃燈一枚引火鐺下酒可溫余曰吾齊所有安知不解溫酒也乃取與俱則吾鐺中酒先熱售者大駭携之去下榻徐稚字孺子豫章人陳蕃為太守不接賔客唯孺子來特設一榻去則懸之又曰周璆字孟玉陳蕃為太守璆來置一榻去則懸之也出謝承後漢書楊素詩獨坐對陳榻無客有鳴琴韋應物詩方醉郡齊榻為酌離亭樽李商隱詩登舟慚郭泰解榻愧陳蕃李白詩髙人屢解陳蕃榻過客難登謝朓舟許渾詩賔館盡開徐稚榻客帆空望李膺舟前人用事只用孺子下陳蕃之榻未嘗用孟玉事也捫蝨圖捫蝨圖唐人筆也筆如絲縷意度精到捫蝨乃王猛隱華山桓溫入關猛披褐謁之一面談當代事捫蝨而言傍若無人趙仲讓為梁冀從事中郎將冬月坐庭中向日解衣裘摶蝨因鴟卧形悉表露冀夫人襄城君見之大驚云北闕下向得一老翁不潔清當亟推問冀曰我從事中郎清髙士也風俗通晉顧和字君孝王導為揚州辟從事月旦當朝未入停車門外周顗遇之方摶蝨夷然不動北齊邢子才望實兼重不以才位傲物士無賢愚皆願接對客或解衣覔蝨此但言摶蝨覔蝨也澡盤魏武上雜物疏有容五石銅澡盤古人制作其大如此述征記曰長安逍遙宫門裡有澡盤面徑丈二殆所謂可容五石者矣異苑曰中朝人有蓄銅澡盤旦夕常鳴張華曰與洛鐘宫商相諧故相應錯鑢之乃止傅𤣥澡盤銘曰與其澡於水寧澡於德水之清猶可穢也德之興不可塵也其視商盤銘何啻天淵也大戴禮周武王盤之銘曰與其溺於人也寧溺於淵此言有味剔齒纎陸雲與兄機書曰有剔齒纎一枚以寄兄酉陽雜俎曰仙人鄭思逺常騎彪故人許隱齒痛求治鄭拔彪鬚及熱插齒間即愈更拔數莖與之所謂纎者當是此類若以金類絲類為之無足竒者何必寄耶菴摩勒油本草曰菴摩勒油可染白髮即餘甘子也核有五六稜嵇含南中草木狀曰菴摩勒樹葉細似合昏花實似李青黃色核圓作六七稜食之先苦後甘一名餘甘子術士以變白鬚髮有驗出九真吳録曰髙凉安寧縣有餘甘初食之味苦後更甘陳祈暢異物志曰餘甘大小如彈丸初入口如苦咽口中乃更甜美鹽而蒸之尤美左思吳都賦曰其果則丹橘餘甘荔枝之林蜀石有人遺余玉筆格一枚狀如漿水瑪瑙而非玉也因扣之謂玉出嘉陵按司馬相如上林賦曰蜀石黃碝張揖曰蜀石次玉者也嘉陵之玉蓋出於此東蘠司馬長卿子虛賦曰東蘠雕胡張揖曰東蘠實可食蓋不明言何物也按魏書曰烏桓地宜東蘠注曰東蘠似蓬草實如葵子十月熟也廣志曰東蘠色青黑粒如葵子幽涼并皆有之西河語曰貸我東蘠償我田粱揖豈不知出此甘脆似孫昔奉祝攢陵得牙盤食有所謂薄餌狀如薄脆而甘脆特甚後閲范汪祠制曰孟夏祭有甘脆又盧諶祭法四時祠用安乾特束晳餅賦曰安乾粔籹之倫當是此類也筮雨沛獻王善京氏易永平五年京師少雨上饗雲臺自作卦以易林占之其疏曰蟻封穴戶大雨將至上以問輔輔上書曰蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居知雨雨將至故蟻為興東觀漢記荆州旱筮遇坎之比坎者水也子爻為世今夜二更其有甘雨金樓子鄧艾當伐蜀夢坐山上而有流水以問殄虜將軍袁紹紹曰易卦山上有水曰蹇蹇繇曰蹇利西南不利東北往必克蜀殆不還乎艾不樂魏志䑛痔莊子曰秦王有病召醫䑛痔者得車五乘也韓子曰醫善吮人腸含人血非有肌骨之親也利之所加也宋景文公詩誰言舐痔非長策却得君王五乘車蓋有所譏也􅭁服䖍通俗文曰煮米為􅭁所㦸切食經曰作糄法近水則澀江西有所謂米纜豈此類也鳥禦火翠山有鳥名鸓音壘狀如鵲色赤黑兩首四足可禦火小華山有鳥名鷩可以禦火將遇之山有鳥名鴟狀如翟而赤喙可以禦火緣光山囂一作嚚水出焉有鰼鰼之魚其狀如鵲可以禦火崑崙山有木狀如棠而黃花赤實其味如李其核名沙棠可以禦水食之不溺山海經詩安得沙棠木刳以為舟船茶神農食經曰茶茗久服令人有悅志華他食論曰茶久食益意思壺居士食志曰苦茶久食羽化陶𢎞景新録曰茶茗輕身換骨桐君録曰茗有真香煎飲令人不眠以上所論皆嚴簡極品藻實録之妙非區區茶經茶録形容所及爾雅曰早採者為茶晚採者為茗魏王花木志曰老葉謂之茒當是荈字細葉謂之茗陸羽茶經一曰茶二曰檟三曰蔎四曰茗五曰荈周公云檟苦茶蜀西南謂茶曰蔎郭𢎞農云早取為茶晚收為茗一曰荈蔎荈尺兗切蔎音設晉杜育有荈賦曰調神和內倦解疾愈此八字亦佳左思嬌女詩心為茶荈劇吹噓對鼎䥶一作烹此詩竒古劇字晉人最好用所謂劇談劇棋也番虜矜茶常魯使西番烹茶帳中番人問曰何為者魯曰滌煩療濁所謂茶也番人曰我此亦有取以出指曰此壽州者此顧渚者此蘄門者在唐時已為如此諺此只采古諺耳人有言曰及語曰皆不録說文曰俗言曰諺諺曰人莫知其子之惡莫知其苖之碩大學吾王不遊吾何以休孟子山有木工則度之賔有禮主則擇之左傳髙下在心川澤納汙山藪藏疾瑾瑜匿瑕左傳唯食忘憂左傳魏子衆心成城衆口鑠金國語冷州鳩寧為雞口無為牛後史記桃李不言下自成蹊史記千金之子不死於市史記力則任鄙智則樗里史記家纍千金坐不垂堂史記得黃金千斤不如季布一諾漢書貂不足狗尾續晉書趙王倫傳死諸葛走生仲達漢晉春秋救寒無若重裘止謗莫若自修梁祚魏國紀王昶解結理煩我國陸君張勃吳録陸稠難可狎李鱗甲江表傳李藝得黃金一笥不如為桞伯騫所識江表傳桞琮生有知人之明死有貴神之靈三輔决録游殷人寧負人千石之粟不願負人猴頭羹􅌜臨海異物志安家夷皆好噉猴頭羹察知淵魚者不祥智料隱逸者有殃列子田父可坐殺晨出夜入自以性之恆啜菽茹藿自以味之列子堯舜千鍾孔子百觚一作瓢子路嗑嗑尚飲百榼孔叢子長袖善舞多錢善賈韓子鳥窮則噣牛窮則􅠅人窮則詐淮南子不聰不明不能為王不啞不聾不能為公慎子人聞長安樂則出門而西向笑知肉味美則對屠門而大嚼桓談新論投鼠忌器賈誼新書侏儒見一節而長短可知桓談新論魯班雖巧不能為乞丐者顔王朗貧窶語失晨之雞思哺更鳴魏武遺令鑒古物張安世給事尚書上幸河東亡書三篋詔問莫能知唯安世識之具作其事後求得書以相校無所遺失上竒其才擢尚書令晉太康中汲郡人發魏王冢得古文竹書武帝付祕書詳校時束晳任著作郎得竹書隨義注解皆有識證周平蜀還得樂器皆莫之識太常少卿斛斯澄直陵切見之曰此錞于也人弗之信澄遂依干寶周禮注以芒莖捋之其聲極振衆乃歎服澄取以合樂焉三國典略陸澄字彥淵為博士竟陵王子良得古器小口方腹底平可容七八勝一作升以問澄澄曰此名服一作復匿單于與蘇武子良又視器底有字髣佛可識如澄說襄陽有盜發古冢相傳是楚王冢獲竹簡書青絲編簡廣數分長二尺皮節如新盜以把火照書後人又得十餘簡以示撫軍王僧虔云是科斗書考工記周官所闕蕭子顯齊書張永嘗開𤣥武湖遇古冢冢上得一銅斗有柄文帝以訪朝士何承天曰此亡新威斗三公亡皆賜之一在冢內時三公在江左者唯甄邯為大司徒必邯之墓俄而又啓冢內更得一斗復有一石銘曰大司徒甄邯之墓江北有發古冢獲石銘曰青州世子東海女郎無能識者河東賈潤字希鏡見云此司馬越女嫁為茍晞子婦驗之果然後漢廣平王弟掘得古玉印敕詔祖瑩辨之瑩云此是于闐國王太康中獻乃以墨塗字觀之果如瑩言時人稱為博物梁劉顯字嗣芳沛國人任昉嘗得一篇缺簡書文字零落歷示諸人莫能識者顯云是古文尚書無逸篇昉驗周書果如其言時魏人獻古器有隱起字無能識者顯按文讀之無有滯礙考校年月一字不差髙祖甚嘉焉潤州得玉磬十二以獻張率更叩其一曰是晉某嵗所造是嵗閏法月數今闕其一宜於黃鍾東九尺掘必得詔求之如其言又有人於古墓中得銅物似琵琶而身正圓元行冲云此阮咸所造國朝傳記詩卜筮卜云其吉終然允臧定之方中爾卜爾筮體無咎言氓君一作民曰卜爾萬壽無疆天保卜筮偕止㑹言近止杕土我龜既厭不我告猷小旻爰始爰謀爰契我龜綿考卜維王宅是鎬京維龜正之武王成之文王有聲握粟出卜自何能穀小宛綿之詩曰爰始爰謀爰契我龜毛鄭皆以契為開非也契者合也古者卜人令龜已遂預取吉兆以墨畫其上然後灼之灼文適順其墨是為食墨食墨者吉其兆不應墨則云不食不食則龜不從也洛誥曰我卜河朔黎水我卜澗水東瀍水西惟洛食是龜所食者畫洛之兆而河朔黎水之兆不食也古公亶父之改居經始而謀度之未敢以為可居也以墨令龜而兆與墨同故曰契言人謀與龜相合也故曰爰始爰謀爰契我龜書卜筮龜筮協從卜不習吉禹謨龜從筮從洪範乃卜三龜一習吉金縢遺我大寶龜朕卜并吉大誥伻來以圖及獻卜洛誥春秋卜筮楚伐鄖一作鄭莫敖曰請卜之鬭亷曰卜以决疑不疑何卜遂敗鄖一作鄭師晉獻公欲以驪姬為夫人卜之不吉筮之吉卜人曰筮短龜長不如從長狐偃言于晉侯曰求諸侯莫如勤王使偃卜之遇黃帝戰于阪泉之兆梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然衛遷於帝丘卜曰三百年邾文公卜遷於繹史曰利於君不利於民齊侯戒師期而有疾惠伯令龜卜楚丘占之龜卜有咎公薨楚子圍鄭鄭人卜行成不吉卜臨於大宫且巷出車吉鄭皇耳帥師侵衛孫文子卜追之獻兆於定姜晉侯還及著雍疾卜桑林見鄭石􅿩言於子囊曰先王卜征五年而嵗習其祥盧蒲癸王何卜攻慶氏示子之兆子之曰克楚人執吳蹶由欲以釁鼓王使問焉曰汝卜來吉乎對曰吉公卜使王黑以靈姑鈈率吉請斷三尺焉而用之楚召觀從王曰唯爾所欲對曰臣之先佐開卜乃使為尹卜靈王卜曰余尚得天下不吉吳伐楚陽胸為令尹卜戰不吉臧昭伯如晉臧㑹竊其寶龜僂句以卜為信與僣僣吉衛侯將如五氏卜過之龜焦楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也卒於城父楚昭王有疾卜曰河為祟趙鞅卜救鄭遇水適火史趙史墨史龜曰是謂沈陽可以興兵六經中無有不言龜筮者其用大矣記曰昔者聖人建隂陽天地之情立為易易抱龜南面天子卷冕北面雖有明知之心必進斷其志焉示不敢專以尊天也又曰昔三代明王皆事天地之神明無非卜筮卜筮不相襲夫天子立國大事必卜而況諸侯乎而況卿大夫乎去古既逺專門寖廢厯算醫卜之流往往無所著見嗚呼漢官隨筆載漢有行寃獄使者張敞殺絮舜美俗使者何並代嚴翊河隄使者王延世塞决河直指使者暴勝之皆不書於百官表因事乃見者按漢史又有監北軍使者武帝都水使者武帝稻田使者昭帝勸田使者元帝教民趨時急務出汜勝之書護羌使者成帝併録之壓角唐兩省官上事皆宰相親送之上事官設床几面南判案三道宰相别施一床坐於西隅謂之壓角不知何義亦不知所從起按唐裴坦傳令狐綯薦坦為知制誥裴休持不可不能奪故事舍人初詣省視事四丞相送之施一榻堂上壓角而坐坦見休重愧謝休咈然曰此令狐丞相之舉休何力顧左右索肩輿出宋次道乃云舍人上事必設紫褥於廷面北拜㕔角閣長立褥之東北隅謂之壓角宋莒公作掖垣叢志亦不解其事未知何者為是又唐國子祭酒李涪刋誤曰兩省官上事日宰相臨焉上事者設床几面南而坐判案三道宰相别施一牀連上事官南坐于西隅謂之壓角自常侍而下以南為上差互相承實乖禮敬何不為丞相設位於衆官之南常侍諫議給事舍人循次而坐於丞相之下尊卑有序足以為儀由此觀之不獨中書舍人凡兩省官禮上宰相皆壓角也至五代馮道為宰相判狀尾罷之應自此閣長立東北隅猶謂之壓角如宋次道所記也又五代㑹要曰晉天福五年三月勑中書門下五品以上於兩省上事宰相壓角之禮宜廢此禮今不復存惟中書舍人上事日設氊褥於庭下北向再拜閣老一人别設褥位立于東北隅候上事官拜畢則相與揖而升階亦謂之壓角蓋有餘風也吳正憲詩壓角舊儀煩閣老濡毫逋債費公移宋次道詩聖世建官追茂制唐家壓角失前規緯略卷四
