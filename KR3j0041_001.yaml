body:
  text: 緯略卷一宋髙似孫撰似孫既輯經略史略子略集略又輯騷略事有逸者瑣者為緯略蓋與諸略相為經緯不以彚分者可續也漢唐詔西漢詔令四百有一自唐虞夏商周上下千數百載為書五十八篇又自五十八篇而後起衰周至五代千數百載間詔令溫醇簡盡有三代遺法唯西漢耳其進退美惡不以溢言沒其實其申飭訓戒皆至誠明白節緩而思深至叢脞大壞之餘其施置雖已不合古道當人心然猶陳義懇到雍容而不迫此其一代之文流風未泯為不可及王通嘗以續典謨訓誥誓命之文書雖不傳漢詔皆可考也唐開元中陳正卿纂漢至唐十二代詔策章疏歌頌符檄議論謂之續尚書雖襲河汾之意然其書雜矣宋景文筆記曰文有屬對平側用事供公家一時宣讀施行似健快然不可施于史傳余修唐書未嘗以唐人一詔一令載於傳者惟拾對偶之文近髙古者乃可著于篇大抵史近古對偶宜今以對偶之文入史如粉黛飾壯士笙匏佐鼙鼓非所施也今觀唐史蓋無一詔如文景武宣之世吁難哉暍史記曰夏禹扇暍按淮南子曰文王葬死骸而九夷順武王蔭暍人于樹下而天下懷越王決獄不當援刀自割而戰士畢死感於恩也此但言蔭暍不言扇暍也京房易飛候曰有雲如大車蓋十餘此陽沴之氣必有暑暍抱朴子曰指氷室不能起暍死之熱望炎冶不能止噤凍之寒暍者暑沴也少女風劉孝威雨詩電舒長男氣枝搖少女風管輅别傳曰輅過清河太守時天旱輅曰今夕當雨時樹中已有少女微風又有隂鳥和鳴又少男風起衆鳥亂翔其應至矣須臾風雲興玄氣四合大雨注傾易曰艮三索而得男故謂之少男兌三索而得女故謂之少女又曰兊為少女欸乃桞子厚漁翁詩欸乃一聲山水緑欸音襖乃音靄唐劉言史瀟湘詩夷女采山蕉緝紗浸江水野花滿髻粧色新間歌曖乃深峽裡曖乃知從何處生當時泣舜斷腸聲言史之詩則又以欸乃為泣舜之餘聲夷女皆能之不必為漁父棹船相應聲也二字音雖同而字則異以欵為曖以乃為乃元結系樂府欸乃曲曰誰能聽欸乃欵乃感人情不恨湘波深不怨湘水清所嗟豈敢道空羡江月明昔聞扣斷舟引釣歌此聲始歌悲風起歌竟愁雲生遺曲今何在逸為漁父行次山又有欸乃歌五章章四句其序曰大厯丁未中漫叟以軍事詣都使還州逢春水舟行不進作欸乃五曲舟子唱之蓋取適于道路耳其中一章曰千里楓林煙雨深無朝無暮有猿吟停橈靜聽曲中意好是雲山韶濩音審其末章亦是泣舜之意也蚊民東方朔蚊賦曰長喙細身晝伏夜存存一作伸其屬惡煙為掌所捫臣朔愚戇名之曰民崔豹古今注曰河內有人嘗見人馬滿地如黍米大取火燒皆作蚊蚋飛去因號蚊蚋為黍民潘子真詩話載紫姑神蚊賦曰其來繽繽紛紛如煙如雲嘗聞之秦謂之蚋楚謂之民用東方朔賦中字也賦體梁武帝賦體曰草回風以照春木承雲以含化芳競飛於陽和花爭開于日夜樂萬類之得所豈此心之云舍欣分竹其厲精慙戎車之屢駕梁任昉賦體曰俶征侣兮艤行舟奉君命兮不俟駕屬軒軌之易循值堯民之可化慙孺雉之聲朝惡鰥魚之在夜奉玉簡之陸離侍金罍之云舍梁王僧孺賦體曰雜沓兮翠旌容與兮龍駕新桐兮始華乳雀兮初化思治兮終朝求人兮永夜竟大德之未酬何飛光之徒舍陸倕賦體曰奉欽明之睿后沐隆平乎玄化參振鷺之充庭侍長徒之曾舍冀無恨於終南豫告成於芝駕雖就列而陳力終胡顔于長夜六朝人好作賦體今録數家于此食雪單于幽蘇武置大窖中絶不與飲食雨大雪武卧齧雪與氊毛并咽之段熲破羌羌復寇張掖熲下馬大戰力盡羌亦引退且行晝夜食雪四十日漢紀陳刪詩食雪天山近思歸海路長王維詩路繞天山雪家臨海樹秋溫庭筠詩紅淚文姬洛水春白頭蘇武天山雪三詩皆用蘇武事而庭筠末句甚竒旁午儀禮曰度尺而午注曰一縱一橫曰午漢書霍光傳曰使者旁午師古曰一縱一橫為午猶言交橫也蓋用此劉向傳曰螽螟􅑣午如淳曰􅑣午猶言雜沓也洗玉池銘東坡為龍眠李伯時作洗玉池銘曰世忽不踐以用為急秦漢以還龜玉道熄六器僅存五瑞莫輯趙璧婦玩一作完魯璜盜竊鼠亂鄭璞鵲抵晉棘維伯時父吊古啜泣道逢玉人解驂推食劒璏珌錯落其室晚獲拱寶遂空四壁哀此命世久就淪蟄時節沐浴以幸斯石孰推是心施及王國如伯時父琅然環玦援手之勞終睨莫拾得喪在我匪玉欣戚仲和父銘之維以咏德按伯時石刻序跋曰元祐八年伯時仕京師居紅橋子弟得陳峽州峽州名彥默字子真馬臺石愛而致之齋中一日東坡過而謂曰斷石為沼當以所藏玉時出而浴之且刻其形於四旁豫為子銘其脣而號曰洗玉池而所謂玉者凡一十六雙琥璩三鹿盧帶鈎琫珌璊瑑杯水蒼佩螳螂鉤佩柄珈瑱拱璧是也伯時既下世池亦湮晦徽宗嘗即其家訪之得於積壤中其子碩以蘇文有禁磨去銘文以授使者於是置宣和殿十六玉唯鹿盧環從葬龍眠餘者咸歸內府矣伯時序跋世不多見庸載于此寧馨唐張謂詩家無阿堵物門有寧馨兒以寧為去聲劉夢得贈日本僧智藏詩為問中華學道者幾人雄猛得寧馨以寧為平聲蓋王衍傳曰何物老嫗生寧馨兒山濤叱王衍語也又南史曰宋王太后疾篤使喚廢帝帝曰病人間多鬼那可往太后怒謂侍者取刀來剖我腹那得生寧馨兒所謂寧馨者晉宋間人語耳今吳人語音尚用寧馨字為問猶言若何也東坡詩六朝文物餘丘壠空使英雄笑寧馨張謂詩東坡詩用寧馨為是遺母鮓世説曰陶侃作魚吏以坩鮓餉母母返書責侃曰汝為吏以物見餉非唯不能益吾反以增吾憂按列女傳孟宗為監魚司馬罷職還道作兩器鮓以奉母母曰吾老為母嘗言唯飲彼水何吾言之不從也乃還鮓於宗宗扶伏遂沉於江二事相類有如此者魚吏為監魚字佳謝玄與妹書曰昨出釣獲魚以為三坩鮓今奉送亦用坩字説文曰鮓藏魚也藏魚二字更佳坩音龕纂文曰大坩為坊東宫舊事曰白坩五枚貝經師曠有禽經浮丘公有鶴經雖相畜亦有牛經馬經狗經下至蟲魚有龜經魚經朱仲所傳貝經怪竒今録于此仲受經於琴髙嚴助為會稽太守仲遺助以徑尺之貝并致此文曰黃帝唐堯夏禹三代之貞瑞靈竒之祕寶其有次此者貝盈尺狀如赤電黑雲謂之紫貝素質紅黑謂之朱貝青地緑文謂之綬貝黑文黃畫謂之霞貝紫愈疾朱明目綬消氣瘴霞伏蛆蟲雖不能延齡增壽其禦害一也復有下此者鷹啄蟬脊以逐濕去水無竒功貝大者如輪文王得大秦貝徑半尋穆王得其殼懸於昭觀秦穆公以遺燕鼂可以明目遠察宜玉宜金南海貝如珠如礫或白駮其性寒其味甘止水毒浮一作伏貝使人寡欲無以近婦人黑白各半是也濯貝使人善驚無以親童子黃脣點齒有赤駮是也雖貝使病瘧黑鼻無皮是也䂃一作瞬貝使胎消勿以示孕婦赤帶通脊是也慧貝使人善忘勿以近人赤熾肉殼赤絡是也醟貝使童子愚女人淫有青脣赤鼻是也碧貝使童子盜脊上有縷句脣是也雨則重霽則輕委貝使人志強夜行書伏迷鬼狼豹百獸赤中圓是也雨則輕霽則重布帆無恙顧愷之為殷仲堪參軍嘗因假還以布帆借之至破冡遭風大敗愷之與仲堪箋曰地名破冡真破冡而出行人安穩布帆無恙楚辭九辨曰還及君之無恙此言及君之無憂耳爾雅曰恙憂也漢元帝詔貢禹曰今生有恙何至不已乃上疏乞骸骨此言病何憂不差而乞骸骨豈如被蟲食心邪凡言無恙謂無憂耳戰國策曰趙威后問使者曰嵗亦無恙耶民亦無恙耶説苑曰魏文侯語倉唐曰擊無恙乎又曰子之君無恙乎聘禮亦曰公問君實對公再拜鄭注曰拜其無恙蘇氏演義曰時人以無憂疾謂之無恙神異經曰北方大荒中有獸食人咋人則病罹人則疾名之曰㺊㺊恙也常近人村落入人屋室皆患之黃帝殺之由是北方人得無憂疾謂之無恙應劭風俗通曰上古之時草居露宿恙噬人蟲也善食人心大患苦之凡相問云無恙五星聚四星聚附殷紂之時五星聚房房者蒼神之精周據之而興周興於房宿分星變蒼得天下之祥春秋元命苞髙祖元年十月五星聚于東井以厯推之從嵗星也李竒曰嵗星得其正度其四星北行故曰從也孟康曰嵗星先至為主漢天文志崔浩考古今厯云五星以前三月聚東井按晉天文志東井三十三度分野最濶以乾曜度論之一度二千九百餘里則東井之分合十萬里石氏星經曰是年嵗星在東井五星皆從故為有天下之象然以左氏嵗星合之又復不然蓋左氏論其常也五星旋于冀方而魏有天下魚豢典略元帝登祚是嵗鎮太白星等聚于牛女之間晉陽秋皇朝太宗即位五星在奎居兖州地分太宗時為晉王領兗海漢史岑出師頌曰五曜宵映素靈夜嘆晉傅玄髙祖像贊曰五星協象神母告徵乾鵲詩人以乾鵲對濕螢唯王荆公以為虔字音見於鵲之強強易統卦曰鵲者陽鳥先物而動先事而應淮南子曰乾鵲知來而不知往此修短之分也悼騷愍騷後漢班彪悼離騷曰夫華植之有零茂故隂陽之度也聖哲之有窮達亦命之故也惟達人之進止得時行以遂伸否則詘而尺蠖體龍蛇以幽潛晉摯虞愍騷曰蓋明哲之處身固度時以進退泰則攄志於宇宙否則澄神於幽昧摛之莫究其外函之罔識其內順隂陽以潛躍豈凝滯乎一槩漢賈誼吊屈原文曰鸞鳳伏竄兮鴟梟翺翔謂隨夷溷兮謂跖蹻亷莫耶為鈍兮鉛刀為銛騰駕罷牛驂蹇驢驥垂兩耳服鹽車所貴聖人之神德遠濁世而自藏使麒麟可係而羈豈云異夫犬羊後漢蔡雍吊屈原文曰鸋鴂軒翥鸞鳳挫翮啄一作琢碎琬琰寶其瓴甋皇車奔而失轄執轡忽而不顧卒壞覆而不振顧抱石其何補宋謝延之祭屈原文曰蘭薰而摧玉貞則折物忌堅芳人諱明潔曰若先生逢辰之闕三公吊屈原之辭筆力皆髙併録于此蓍梁范筠咏蓍詩曰數竒不可偶性直誰能紆禎蔡伏靈異祥雲降溫腴晉傅玄蓍賦曰邁衡德於青陽混百卉而萌生逮朱夏而修茂暨商秋而堅貞雖離霜而未雕與潛龜乎通靈於是原極以道形極以度以類萬物之情以通天下之故豈唯終始於事業乃參天而倚數洪範五行傳曰蓍之為言耆也草木之壽知吉凶者也此説甚竒夫揲蓍之法四十九蓍聚之則一而四十九隱于一中散之則四十九而一隱于四十九中一者道也謂之無則一在謂之有則不可取焉四十九者用也靜則歸于一動則唯覩其用一在其間而不可取此所謂大衍之數五十其用四十有九也碧芙蓉頌顔延之碧芙蓉頌曰澤芝芳豔擅竒水屬練氣紅荷比符縹玉擢麗滄池飛映雲屋實紀仙方名書靈躅水屬二字全未見人用齊王融謝紫鮓啓曰東越水羞實罄乘時之美南荆任土方揖鮓魚之味劉孝威謝藕啓曰凡厥水羞莫敢相輩水羞二字亦新招隱詩晉張華招隱詩曰隱士托山林遁世以保真連惠亮未遇雄才屈不伸又詩栖遲四野外陸沉背當時循名奄不著藏器待無期羲和策六龍弭節越崦嵫盛年俯仰過忽若振輕絲晉張載招隱詩出處雖殊途居然有輕易山林有悔􅪟人間實多纍鵷雛翔窮冥蒲且不能視鶴鷺遵臯渚數為矰所繫隱顯雖在心彼我共一地不見巫山火芝艾豈相離去來捐時俗超然辭世偽得意在丘中安事愚與智晉張協招隱詩結宇窮嵐曲耦耕幽藪隂荒庭寂以間山岫峭且深凄風起東谷有淹興南岑雖無箕畢期膚寸自成霖澤雉登壟雊寒猿擁條吟溪壑無人迹荒楚鬱蕭森投竿修岸垂時聞樵采音重棋可擬志回淵可比心養真尚無為道勝貴陸沉遊思竹素園寄辭翰墨林晉閭丘沖招隱詩大道曠且夷蹊路安足尋經世有險易隱顯自存心嗟哉巖岫士歸來從所欽右晉人招隱詩四家今録于此梁昭明所采招隱唯左太沖陸士衡王康琚耳箕子名司馬彪莊子注曰箕子名胥餘書傳所不載楚辭楚辭注楚有先王之廟及公卿祠堂圖畫天地山川夾靈奇偉及古賢聖怪物行事屈原周流罷倦休息其下仰見圖畫因書其壁呵而問之以泄憤悶舒寫愁思讀此則九歌之意全本于此圖畫鬼神之間猶足以泄憤悶寫愁思况其餘乎今觀屈宋騷辭所以激切頓挫有人所不可為者蓋皆發於天如羌誶蹇紛侘傺些只者楚語也沅湘江澧修門夏首者楚地也蘭茝荃藥蕙若蘋蘅者楚物也以其土風形於言辭故風雅比興一出於國風二雅之中不可及已嚴助薦買臣召見言楚辭帝甚説之宣帝修武帝故事徵能為楚辭者九江被公等自漢以還文人詞客慕其一作摹擬軌躅摛華競秀而識其體要者亦寡爾後才士但襲其體追其韻言雜燕粵事兼夷夏亦謂之楚辭失其旨矣湘君山海經曰洞庭之山帝之二女居之郭璞疑二女者舜后不當降小水為其夫人因以二女為天帝之女又曰天帝之女處江為神即列仙傳所謂江妃二女也劉向列女傳曰帝堯之二女長曰娥皇次曰女英堯以妻舜於溈汭舜既為天子娥皇為后女英為妃舜死於蒼梧之野二妃死於江湘之間俗謂之湘君羅含湘中記曰舜二妃死為湘水神故曰湘妃韓愈黃陵廟碑曰秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭康成亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸以為湘君者自其水神而謂湘夫人乃二妃洪興祖曰堯之長女娥皇為正妃故曰君其二女女英自宜降曰夫人也故九歌謂娥皇為君女英為帝子如山海經凡言帝者皆為天帝如所謂帝之密都帝之下都帝之平圃至言帝俊帝顓兼稱其號其以娥皇女英曰帝之二女者其稱謂審矣九歌所謂帝子者亦本山海經言之禮曰舜葬於蒼梧之野蓋三妃未之從也鄭康成注曰帝嚳立四妃象后妃四星其一明者為正妃餘三者為次妃帝堯因焉至舜不告而娶不立正妃但三妃而已謂之三夫人離騷所歌湘夫人舜妃也夏后氏增以三三而九合十二人春秋説曰天子娶十二即夏制也康成之論本取帝王世紀耳世紀曰長妃娥皇無子次妃女英生商均次妃癸比生二女宵明燭光是也乃知康成所注為有據依又按秦紀曰死而葬焉今王逸以為溺死非矣玉帶王荆公作謝玉帶表甚恨無玉帶事既上表有客失記姓名曰何不用虹玉圍腰公惋悵良久虹玉圍腰四字出常衮謝賜玉帶表可謂竒事李賀詩曲沼芙蓉波腰圍白玉冷便不及常公四字薛逢詩帶文雕白玉符理篆黃金帶文二字亦佳如李賀又用金魚公子夾衫長密裝腰鞓割玉方玉方二字亦佳賀詩又云越衫羅袂迎春風玉刻麒麟腰帶紅王光庭詩玉碾盤龍帶金裝鳳頸驄李郭詩玉鴈排方帶金鵝立仗衣此三詩當時侍衛供奉之人所服者然唐制三品以上皆服玉帶韓愈詩不知官髙卑玉帶懸金魚茂陵中書武帝遺詔以雜道書四十卷置棺中元康二年河東功曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱卷後題日月是武帝時也河東太守張純以箱及書奏上之武帝時左右見之流涕曰此是帝崩時殯物宣帝愴然以書付茂陵內傳宋元憲公詩怪牒汲郡來幽經茂陵聚此事與蘭亭入昭陵相類尚書故實曰唐太宗酷好書有大王真迹三千六百紙率以一丈二尺為一軸內行書有五十八卷禇遂良以蘭亭為第一太宗寶惜者獨此為最於座側朝夕觀覽嘗一日附耳語髙宗曰吾千秋萬嵗後與吾蘭亭將去也及奉諱之日用玉匣貯之藏於昭陵江南别録曰鄭元素溫韜之甥也從韜入昭陵見太宗散髮以玉架桁之玄堂兩廂皆石榻以五金之匣藏鍾王墨迹僅千軸蘭亭亦在其中自是散在人間不知流落何所黛楚辭曰粉白黛黑施芳澤長袂拂靣善留客後漢書曰明德馬后眉不施黛獨左眉角小闕補之如粟宋起居注曰西河王沮渠蒙遜獻青雀頭黛百斤説文曰黱畫眉也黱與黛同釋名曰黛代也滅去眉毛以此代其處也通俗文曰染青石謂之點黛武元衡詩艷歌愁翠黛寶瑟思清商張謂詩殘粧添石黛艷舞落金鈿用石黛二字正用通俗文也脂澤蔡雍女誡曰傅脂則思其心之和澤髮則思其心之潤馮衍集衍與婦弟任武達書曰惟一婢武達所見頭無叉澤靣無脂粉世説曰江淮以北謂靣脂為靣澤釋名曰澤人髮恆枯瘁以此濡澤人唇脂以丹作象唇赤也北史后妃傳曰晉舊儀典櫛三人掌宫中櫛膏沐膏沐二字出詩豈無膏沐王維詩邀人傅脂粉不自著羅衣此言脂也夏英公詩絳唇不敢深深注却怕香脂汚玉簫用脂字尤妙溫庭筠詩蘭膏墜髮紅玉春燕叉拖頸拋盤雲即澤也熊經鳥伸莊子曰吹喣呼吸吐故納新熊經鳥申為壽而已矣此導引之士養形之人也彭祖壽考者之所好也魏志曰吳普嘗問道於華他他謂普曰人體欲得勞動但不當使極耳如搖動則穀氣易消血脈流通病不得生譬猶戶樞不蠧流水不腐以其常動故也是以仙者法之及漢時有居士舊為導引之事熊經鵠顧引挽腰體動諸關節以求難老吾有一術名五禽之戲汝可行之一曰彪二曰鹿三曰熊四曰猿五曰鳥亦以除疾病利蹄足以當導引體中不快起作一禽之戲普行之年九十餘春秋繁露曰猿長臂所以壽好引其氣也陸龜蒙詩所以親逋客兼能助五禽宋景文詩五禽習法觀空證佛緣又詩驚猿參作戲探仙術萬鶴伸鳥雜經熊龜息抱朴子曰城陽郤儉少時行獵墮空冢中飢見冢中先有大龜數回轉所向無常張口吞氣或俯或仰儉素亦聞龜能導引乃試隨龜所為遂不復飢百餘日後人有偶窺冢中見儉而出之後竟能咽氣斷穀魏王拘置土室中閉試之一年不食顔色悅澤氣力自若龜策傳曰南方老人以龜支床行二十年老人死而龜猶活以龜吐納息也王維詩鳩形將刻杖龜殼用支床許渾詩遊從依野鶴休息過靈龜宋景文公詩度日銜花翻翠鳥經年支榻養靈龜笳却敵晉劉琨在晉陽為胡騎所圍乃乘月登樓清嘯賊聞之皆悽然長嘆中夜奏胡笳賊又流涕並棄圍走劉疇為羣胡欲害之疇無懼色援笳而吹為出塞之聲以動其遊客之思於是羣胡垂涕而去二公皆以笳聲却敵真壯士也雞鳴度關雞鳴度關皆曰孟嘗君出秦關中雞未鳴關未開下客為雞聲群雞和之乃得出然燕太子丹質于秦逃歸到關丹為雞聲遂逃前乎此已有之矣獵碣周宣王石鼓文韋應物韓退之最所贊善如老杜李潮八分小篆歌亦曰陳倉石鼓亦已訛唯歐陽公以為可疑者三蘇朂載記曰石鼓文謂之獵碣共十鼓其文則史籒所篆周宣王所創獵碣二字甚生蘇氏用此必有所據任昉述異記曰崆洞山有堯碑禹碣亦用碣字燒香佛圖澄傳曰襄國城塹水源暴竭石勒問澄澄曰今當勑龍取水乃置澄上坐繩床燒安息香呪數百言水大至李相之賢已集曰燒香蓋始于此按漢武故事曰昆邪王殺休屠王以其衆來降得其金人之神置之甘泉宫金人者皆長丈餘其祭不用牛羊唯燒香禮拜事又在佛圖澄之前也千弩俱發漢李陵至浚稽山與單于相值騎可三萬圍陵軍居兩山間以大車為營引士出外為陳前行持戟盾後行持弓弩令曰聞鼓聲而縱聞金聲而止虜見漢軍少直前就營陵轉戰攻之千弩俱發應弦而倒虜走上山漢軍擊殺千人單于大驚漢丞相亮出軍圍祁山魏司馬宣王使張郃拒於祁山亮糧盡軍還至清風木門郃追之亮駐車大削樹皮題曰張郃死此樹下預令兵夾道以數千弩備之郃果至千弩俱發射郃而死袁希之列傳龎涓追孫臏臏度其行暮當至馬陵馬陵道狹而傍多阻隘可伏兵乃砍大樹白而書之曰龎涓死此樹下涓果夜至斫木下見白書乃鑽火讀之未畢齊軍萬弩俱發魏軍大亂相失涓乃自剄曰遂成豎子之名史記此言萬弩俱發也解鳥語和菟有鳥鳴書一卷王喬有解鳥語書一卷魏尚字文仲髙皇帝時為太史曉鳥語謝承後漢書楊宣為河內太守行縣有群雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲往食行數里果有覆車粟益州耆舊傳秦仲知百鳥之音與之語皆應史記管輅聞有鳴鵲來在閣屋上其聲甚急輅曰東北一婦昨殺夫牽引西家父離婁候不過日在虞泉之際告者至矣到時果有東北五人來告鄰婦手殺其夫詐言西家人與夫有嫌來殺我聓管輅别傳解六畜語廣漢陽翁偉能聽鳥獸之音嘗乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中馬曰蹇馬蹇馬亦罵之曰眇馬御者不信往視馬目竟眇論衡李南乘赤馬行道逢人白馬先鳴而赤馬應之南謂從者曰此馬言汝今當見一黃馬左目盲者是吾子也可告之快行相及從者不信行二里果逢黃馬而左目盲南之馬先鳴而盲者應之其盲果白馬子抱朴子介葛盧來朝聞牛鳴曰是生三犧皆用之矣左傳東方有國人數數解六畜語蓋偏智之所得矣缺廷尉沈僧照校獵中道而還左右問其故答曰國有邊事當選人丁何以知之答曰南山彪嘯所以知爾梁典陸羽水品一廬山康王谷簾水二無錫惠山石泉水東坡詩間携天上小團月來試人間第二泉三蘄州蘭溪石下水四峽州扇子峽蝦蟆口水五武丘寺井水六廬山招賢寺下方橋潭水七揚子江南零水八洪州西山瀑布水九桐柏淮源水十廬山龍池山頂水十一丹陽觀音寺井水十二揚州大明寺井水十三漢江中零水十四歸州玉虛洞香溪水十五商州武關西洛水十六吳松江水十七天台千丈瀑布水十八郴州圓泉水十九嚴陵灘水二十雪水劉伯芻水品張又新煎茶水記曰劉伯芻謂水之宜茶者有七較之陸氏品固有異同也一揚子江南零水二惠山石泉水三武丘石井水四丹陽觀音寺井水五揚州大明寺井水六吳松江水七淮水最下六一居士曰陸羽茶經其論水曰山水為上江水次之井水為下又曰山水乳泉石池漫流者上瀑湧湍潄勿食食之令人有癭疾江水取去人遠者井水取汲多者其説止于此未嘗品第天下之水也張又新煎茶水記曰代宗朝李季一作秀卿刺湖州至維揚逢陸處士命謹信者操舟取南零水至陸以杓揚水曰非南零者既傾而半陸曰此南零矣使大駭曰至岸舟蕩覆半挹岸水增之李德裕常令所親取揚子江中零水其人醉忘乃汲石頭城水以紿之德裕能辨其非是蓋不止羽能辨也德裕好惠山泉置驛取水有僧言長安昊天觀井水與惠山泉通雜他水十餘缶試之僧獨指其一曰此惠山泉水也文饒為罷水驛東坡愛玉女洞泉日致兩瓶恐為使者所紿因破竹為契使寺僧藏其一為信謂之調水符洞在大秦寺按蒲元傳曰元性多竒思於斜谷為諸葛亮鑄刀三千口刀成以漢水鈍弱不任淬乃取水蜀江水至元曰水雜涪水不中用取水者捍言不雜元以刀畫水言雜八升取水者叩頭云於涪津覆水以涪水八升益之然則别水固有此事淄澠之辨蓋始於易牙也易牙名巫牙其字也見孔頴達左傳疏如東坡汲江水煎茶詩活水還須活火烹自臨釣石取深清此二句直入茶泉理窟夫天下名泉不知有幾豈止如二公所品而已哉歐公汝隂詩水味甘于大明井山谷省中烹茶詩閣門井不落第二竟陵谷簾空誤書謂此也緯略卷一
