body:
  text: 緯略卷六宋髙似孫撰和香方范曄撰和香方其序曰麝本多忌過分必害沉實易和盈斤無傷零藿虚燥詹唐粘濕甘松蘇合安息鬱金奈多和羅之屬竝被珍於外國無取於中土又棗膏昏鈍甲煎淺俗非惟無助於馨烈迺當彌増於尤疾也所言悉以比類朝士麝本多忌比庾仲文零藿虚燥比何尚之詹唐粘濕比沈演之棗膏昏鈍比羊𤣥保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沉實易和以自比也山谷香偈我讀蔚宗傳風流不減二班者此也梁武帝祀地用和香杜佑注以地與人近宜加雜馥雜馥即和香然則和香非始於梁也何遜詩月暎九㣲火風吹百和香華嚴經曰鬻香長者善調香調香二字尤佳李賀詩練香薰宋鵲尋箭踏盧龍練香二字更好也竊香郭子曰陳騫以韓壽為掾每㑹聞壽有異香香迺外國所貢一著衣厯日不歇騫計武帝唯賜已及賈充他家理無此香嫌壽與女通問之左右婢以實對騫迺以女妻壽晉書但云賈充女竊香耳此迺曰陳騫何耶庾信詩盤龍明鏡餉秦嘉辟惡生香寄韓壽盧珣詩燃香望韓壽磨鏡待秦嘉薛道衡詩月暎班姬扇風飄韓壽香蓋皆用韓壽耳香物周禮名物夢書曰夢得香物婦人歸也香物二字未有人用周禮專是言物曰珍用八物薦修之物肉物膳羞之物三酒之物醯物絲纊組文之物動物植物毛物魚物鱗物魚物二字出䱷人膏物羽物覈物介物筴物臝物叢物十二壤之物鄉三物馬牛之物牲物器物蓄聚之物米粟之物九榖之物米物六齍之名物雞牲之物玉瑞玉器之名物衣服之名物六龜之名物五雲之物旗物五路之物馬量之三物戈盾之物弓弩矢名物山林之物川澤之物金玉錫石丹青之物牷物蠧物然海物惟錯禹貢言之好香秦嘉荅婦徐淑書曰好香四種各一斤可以去穢淑荅書曰未侍帷帳則芬芳不設如杜詩燈影照無睡心清聞妙香但用妙香耳好香二字未經人用也聞妙香三字出維摩經坐香樹下聞斯妙香漢武内傳曰西王母降爇嬰香等品多名異是蓋令種之類也奔月黄庭經曰髙奔日月吾上道鬱儀結璘善相保梁丘子曰鬱儀奔日之仙結璘奔月之仙七聖紀曰鬱華赤文與日同居結璘黄文與月同居鬱華日精結璘月精也歸藏經曰昔嫦娥以不死之藥奔月淮南子曰羿請不死之藥於西王母姮娥竊而奔月注曰姮娥羿妻羿從西王母請不死之藥姮娥服之得仙奔月為月精大洞雌一篇曰日華玉堂仙母金丹在其内奔日月二景隱文曰西𤣥山下洞臺中有鬱儀結璘經太上𤣥宫髙上臺阪一作及蓬萊府北室金闕玉璧刻此益􅍯九真中經曰奔日月之道太上太清闕九皇四司真人之所寳秘𤣥元君之玉章也自非有闕玉名及東華紫字皆不得聞見此鬱儀奔日結璘奔月章表彖詩長引逐清風髙歌送奔月石流丹神仙列傳曰許由巢父服箕山石流丹抱朴子曰石流丹者山之赤精蓋石流黄之類也神農經曰石英有五色者石脂有五色者流石有黄青白三色今藥中流石用黄石英用紫庾闡詩朝采石英磵左夕翳瓊芝巖下此言石英耳皮日休詩様如金蹙小能輕㣲潤将融紫石英此乃言紫石英也石脂用赤白他色少用也姚合詩石脂稀勝乳玉粉細如塵龍門三秦記曰龍門一名河津兩岸有山魚不得上上即化為龍李膺獨持風裁以聲名自髙有被其容接者名為登龍門晉王衍善𤣥言唯談荘老為事理有所不安即改更朝野翕然謂一代龍門陸倕與任昉俱為竟陵王西邸之客及昉為憲司簮裾輻輳預宴者號曰龍門之遊袁昻在朝蹇諤號曰宗臣雅有倫鍳遊處不雜入其門者號曰登龍門八蠶左思吳都賦曰國税再熟之稲鄉貢八蠶之綿李善注曰劉欣期交州記曰一嵗八繭蠶出日南按吳録曰南鄉郡一嵗蠶八績李賀詩将餧吳王八繭蠶正用此事海物異名記曰八蠶綿者八蠶共為一大繭蠶理孫卿蠶賦曰蠶食桑而吐絲先亂而後治夏生而惡暑喜濕而惡雨蛹以為母蛾以為父三俯三起事乃大已是謂蠶理氾勝之書曰衛尉上蠶法以農事人不可忽略故衛尉勸之蠶法二字尤佳陸龜蒙蠶賦曰荀卿子有蠶賦楊泉亦有之皆言蠶有功於世不斥其禍於民也余激而賦古民之衣或羽或皮夫蠶之生繭厚絲美機杼經緯鸞鳳葩卉官誕益嚵盡取後已伐桑滅蠶民不凍死輞川圖朱景𤣥畫斷曰王維畫山水松石似吳生而風標特出京師西塔院有輞川圖山谷鬱盤雲水飛動山谷詩丹青出右轄詩句妙九州物外常獨往人間無所求袖手南山雨輞川桑柘秋胸中有佳處涇渭㸔同流此詩足以氣吞右轄筆墨今所見者摹本不足道也余與徐淵子同㸃檢南宫出右丞捕魚圖一卷如無咎公所題者余曰此善摹者為之徐不以為然一日得一卷僅存三分之一徐圖葭葦之外意其為水耳此特波濤浩瀰水痕浪迹一一畢具人物尤精絶淵子必欲易之余有難色已而又有一卷題曰摩詰寒江釣雪上施秘閣之印此迺淳化以前未更秘書省印篆也畫筆竒古全不類世間所見山水圖也秦太虚云予為汝南學官得疾卧直舎髙符仲攜輞川圖視余曰閲此可以愈疾予本江海人得圖甚喜即使二兒從旁引之閲於枕上恍然與摩詰入輞川度華子岡經孟城坳憇輞口荘泊文杏館上斤竹嶺並木蘭柴絶茱茰沜躡槐陌窺鹿柴返於南北垞航欹湖戲桞浪濯欒家瀨酌金屑泉過白石灘停竹里館轉辛夷塢抵漆園幅巾杖履碁奕茗飲或賦詩自娛忘其身之匏繫于汝南也數日疾良愈萬年觴兒寛傳曰兒寛為御史大夫從東封泰山登明堂寛奉觴再拜上千萬嵗壽制曰敬舉君之觴班超曰臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴元和十四年齊魯初平宴羣臣裴度舉觴跪曰陛下德配天地明並日月神武獨斷冦逆削平願同上千萬嵗壽上執酒為飲之江漢詩曰虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬壽此漢唐奉觴所自也方響禮圖曰梁有銅磬蓋今方響也方響以鐡為之修九寸廣二寸圓上方下架磬而不設倚架上以代鍾聲人間用者纔三四寸樂府雜録曰胡部無方響縁聲直拔不應諸調太宗内庫别收鐡方響一片應二十八調筝只有宫商角羽四調臨時移柱應二十八調唐興慶宫龍池波湧得古鐡一片擊之乃宫架㽔賔鐡此即方響也雜爼曰蜀将皇甫直能别音律好彈琵琶元和中製一調乘凉臨水池彈之本黄鍾而聲入㽔賔直甚怪因易絃再三奏之聲如故試彈於他處則黄鍾也直因調㽔賔夜復鳴絃於池上頃之覺近岸波動有物激水如魚躍及下絃則没矣明旦率力竭池池下獲古鐡一片扣之迺方響㽔賔鐡也唐咸通中有吳續打方響其妙超羣本李太尉家樂人也唐李沇方響歌十六葉中侵索光寒玲震月雜珮璫雲和不覺罷餘怨蓮峰一夜啼琴姜急節寫商商恨促秦愁越調逡廵足夢入仙樓戞殘曲飛霜稜稜上秋玉竒絶之辭牛闕亦有方響歌曰長短參差十六片敲擊宫商無不遍筆力全不及賜古物太祖以素屏風憑几賜毛玠曰卿有古人之風賜卿所宜之物魏志孔靈彦不仕太祖以白毛扇素几遺之曰卿有古人之風故贈古人之物呉均齊春秋何㸃不仕豫章王命駕造門逃去竟陵王子良聞之曰豫章王尚不屈非吾所識遺㸃嵇康酒杯徐景山酒鐺以通意傅昭字茂達為中書舎人身安麤糲髙祖賜漆合燭盤等物勑曰卿有古人之風賜卿古人之物梁典劉杳字士深為歩兵校尉東宫通事舎人昭明謂之曰酒是卿之所好而居酒厨之職太子有瓠瓢食器以用錫焉曰卿有古人之風故遺古人之物梁典琛版仲長子曰笏以書君教令既善刺過今之版以象焉笏用象板甚佳劉義恭唘事曰珍冠飾首琛版宜躬用琛版益竒累代文集東晉丞相王導導子洽洽子珣珣子曇首曇首子僧綽僧綽子仲寳仲寳子𤣥成𤣥成子規規子褒九代並有文集路敬淳卓絶譜晉太傅謝安生琰琰子混三代為僕射並有文集宋光禄大夫謝荘荘子朏朏子瀹瀹子覽覽孫温六代五人皆為吏部尚書並有文集魏譙郡太守江㽔㽔孫統統子彪彪子顗顗子夷夷子湛湛孫斆斆子清清子紛紛子聦九代有文集而史有謂七葉之中人人有集者此也累代列傳東晉始興公王導九世有列傳河東裴氏自魏晉宋齊梁陳隋後魏北齊周十代皆有列傳魏有潛晉有秀頠楷宋有松之齊有昇業昭明梁有子野邃陳有忌後魏有駿升景延雋敬憲伯茂北齊有讓之周有舉長寛狹杲隋有藴肅之諸子各習一藝鄧禹十三子各習一藝晉劉殷字長盛七子各授一經一子太史公漢書一門之中七業俱興北州之學殷門為盛青陸易通綂圖曰日行東方青道曰青陸日行南方赤道曰南陸日行西方白道曰西陸日行北方黒道曰北陸唯東方以色言耳續漢書律厯志曰日行東陸謂之春却曰東陸也厯法天有黄赤二道日有九道此皆強名而已非實有也又曰天之有三百六十五度天何嘗有度以日行三百六十五日而一期强謂之度以歩日月五星行次而已日之所由謂之黄道南北極之中度最均處謂之赤道月行黄道之南謂之朱道行黄道之北謂之黑道黄道之東謂之青道黄道之西謂之白道黄道内外各四并黄道為九日月之行有遲有速難可以一術御也故因其合散分為數叚每叚以一色名之欲以别算位而已如算法用赤籌黑籌以别正圓之數厯家不知其意遂以為實有九道也宋景文公曽用青陸二字氷魚晉王祥後母朱氏王祥世家曰祥父融娶髙平薛氏生祥繼室以廬江朱氏生覽常欲得生魚時寒氷凍結祥解衣将剖氷求之氷忽自解雙鯉躍出晉陽秋曰祥母患疾盛寒氷凍每欲生魚祥解衣将剖氷求之㑹有一處氷小解魚出陽秋之叙事如此辭精事覈今併録於此王延西河人繼母卜氏盛冬思魚勑延求而不獲延尋汾叩氷而哭得一魚見崔鴻十六國春秋前趙録曽存之詩椎氷小鯉應堪鱠掃岸疎梅未放花蓋用王祥事李商隱詩魚因感姜出鶴為弔陶來却用姜詩事姜詩事母孝母好飲江水兒汲水溺死其妻恐母知之詐云行學嵗作衣投江中俄而泉出舎側味如江水井且出鯉魚一雙懐果殷輝字子倫汝南人每得甘果持歸進其母黄昌字聖真㑹稽人得珍玩可食之物歸以進母並謝承後漢書陳徐孝克事所生母彌盡每侍宴無所噉髙祖審記以問中書舎人管斌斌不能對自是斌覘之見取珍果内於懐袖還以遺母斌白髙祖嘆嗟令所司自今宴享孝克前饌以餉其母孟宗江夏人遷吳令時制不得将家行每得時味必以寄母干寳晉紀如此等事不止懐橘也張祐詩懐中陸績橘江上伍胥濤錢起詩節下趨庭出秋來懐橘情二詩皆用陸氏事坤王兑相五行休王論曰立秋坤王兊相乾胎坎没艮死震囚巽廢離休魚負氷易通卦驗曰大雪魚負氷鄭𤣥曰魚負氷上近氷也負氷言解蟄也夏小正曰魚陟負氷陟升也張嘉貞詩河魚未上凍江蟄已聞雷武三思詩凍解魚方戲風暄鳥欲啼冬至孝經説曰斗指子為冬至至有三義一者隂極之至二者陽氣始至三者日行南至故謂為至厯義疏曰大雪十一月節月之初氣也言太隂之氣以大水凝為雪故曰大雪冬至十一月之中氣也言冬至者極也太隂之氣生於太陽太陽之氣下極於地寒氣已極故曰冬至以其一陽復生是以冬賀也亦以日之行天至於巽維東南角極之于此故曰冬至豹尾成帝大幸趙昭儀每上甘泉宫嘗從在属車豹尾中揚子雲甘泉宫賦曰珍臺閒館璇題玉英蜵蜎蠖濩之中唯夫所以澄心清魂儲精垂思感動天地逆釐三神又曰想西王母欣然而上壽考兮屏玉女而却宓妃皆譏帝也可謂制作之妙矣蔡邕獨斷曰大駕属車八十一乘最後一車懸豹尾已前比省中崔豹古今注曰豹尾車周制象君子豹變言尾謙也古軍正建之今惟乘輿焉江南録曰古諸侯二車九乘秦滅九國兼其車服故大駕属車八十一乘尚書御史乘之最後一車懸豹尾李商隱詩直登宣室螭頭上横過甘泉豹尾中正用此費㫤詩一辭豹尾内長别属車垂權德輿詩豹尾從風直鸞旗應日飜宋莒公詩新陪豹尾乗便襲虎頭囊河冰合漢世祖至下曲陽傳云王郎兵至從者恐及至滹沱河水流無船可濟官属大懼世祖令王覇往視還曰氷堅可渡世祖遂前北至河河氷合矣獨孤及漢光武渡滹沱河氷合賦曰昔漢光武收河北之年馳馬将進滹沱在前為敵所迫當氷不堅及軍装隱轔以登岸殺氣峥嶸而塞川意者欲定神氣於茲日彰至人之動天若非使不道者䘮有德者王則水不能以造次而結氷不能以斯湏而壮變浩浩之流為峩峩之状擁髙旌以進雷長轂以上及企路以全軍又迎風而破浪慕容德正月渡黎陽津流澌氷合鄴令韓軌言於德曰光武渡滹沱河氷自合大王濟黎陽津橋自成德大悦改黎陽津為天津橋燕録石勒逆戰劉曜於洛陽從大河南濟時凍合軍至而河氷自泮舟檝無闕遂生擒曜謂是神靈相助改名靈昌津石勒迺以河泮而策勲也日觀漢封禪儀曰泰山東南有山名日觀雞一鳴時見日始出長三尺秦觀者望見長安呉觀者望見㑹稽周觀者望見齊泰山記曰周觀者望見鎬黄河去嶺三百餘里望見如帶應劭漢官儀曰泰山東南名曰日觀雞鳴時見日丁春澤日觀賦曰昔者帝王御宇立極垂綂封禪及此成功廵狩應其春仲莫不登茲絶頂遐燭大明思煦嫗之義窮造化之精以為日象一人之德嶽是三公之名信王侯之設險俾夷狄之來平又唐人日觀賦曰泰嶽東南峯開一室旁接天路低臨曉日隂埋玉兎動霄漢之㣲明報曉天雞越氛埃之逈出梁李鏡遠詩始臨東嶽觀俄升若木枝术序皮日休詩白月半窓抄术序清泉一器授芝圖殊不曉术序所出後讀道藏仙經有載紫㣲夫人撰术序其畧曰吾察草木之勝負益於己者不及术之多驗乎所以長生久視逺而更靈非謂諸物減於术也以术之用今之所要末世多疾宜當服餌夫道有内足者猶畏外事之禍有外足者亦或中崩之弊我見山林隱逸得服术者比肩五嶽今撰术數方以傳好尚此服术之法也梁庾肩吾有荅陶隱居賚术煎唘曰木榮火謝盡采擷之難唘旦移申窮淋漉之劑故能競爽雲珠爭竒水玉此妙於餌术者列仙傳載涓子餌术陳子皇餌术南陽文氏食术皆得法者也日休之言术序迺深得乎服餌之法其詩又曰多攜白术鍤愛買紫泉缸又曰倚杉閑把易燒术静論𤣥又曰白石靜敲蒸术火清泉間洗種花泥又曰度日竹書千萬字經冬煎术兩三缸皆言术也花信麥信徐鍇嵗時記曰三月花開名花信風東臯雜録曰江南自初春至初夏有二十四畨風信吕氏春秋曰春之德風風不信則花不成晏元獻公詩春寒欲盡復未盡二十四畨花信風崔德符詩亦曰清明煙火尚闌珊花信風來第幾畨徐師川詩一百五日寒食雨二十四畨花信風尹遷詩曉雨催花信春衣汚酒痕張潨詩春容将變臘暖信已驚花皆言花信也皮日休詩潮期暗動庭泉碧梅信微浸地障紅李昭玘詩凍雲欲雪雁聲過臘酒正香梅信來則言梅信也王履道詩桃花春有信結子徧昭陽則言桃信也國史補曰江淮船泝流而上常待東北風謂之信風七八月有上信三月有鳥信五月有麥信沈存中筆談石淙詩序曰屏梅氣而蕩燠清麥候而含凉者麥信也筆談又曰北方有白雁似雁而小色白秋深至則霜降河北人謂之霜信杜甫詩故國霜前白雁來漢九州漢光武省郡國四百餘所為十三州部司𨽻理河南今洛陽豫州理譙今亳州兗州理昌邑今兗州金鄉縣徐州理郯今泗州下邳縣青州理臨淄今青州凉州理隴今秦州隴城縣并州理晉陽今太原府冀州理鄗今趙州髙邑縣幽州理薊今幽州薊縣揚州理厯陽州縣荆州理漢壽今朗州武陵縣交州理廣信今梧州蒼梧縣益州理廣漢至於漢末加置郡國百有五凡縣千一百八十東有樂浪郡西有燉煌郡北有雁門郡西南有永昌郡廣袤如前漢漢官解詁曰冀趙常山胡廣注曰經曰冀州既載居趙國今治常山兖衛濟河經曰濟河惟兖州居衛國今治山陽青齊海岱經曰海岱惟青州居齊國今治焉徐魯淮沂經曰海岱及淮惟徐州又曰淮沂其乂居魯國今居豫州而治東陽揚吳彭蠡經曰淮海惟揚州又曰彭蠡既瀦居吳國今治九江荆楚衡陽經曰荆及衡陽惟荆州居楚國今治武陵益康岷梁經曰華陽黒水惟梁州漢改梁州為益州今治廣漢梁邠黑水經曰黑水西河惟雍州居邠國漢改雍州為邠州右扶風邑縣居司𨽻部不復属州今治漢陽雍州朔方漢别雍州之地置朔方刺史交趾南越漢平南越之地置交趾刺史列諸州今治蒼梧幽燕朝鮮經無幽州而周官有焉蓋冀之别也居燕國今廣陽是并代晉陽經無并州而周官有焉梁州之别也楊泉物理論曰九州變易交錯不同禹貢有梁州無并州周官有并州無梁州爾雅有營州無青州漢興武帝開拓三方立十三州通并梁之數而増交益焉女史詩曰靜女其孌貽我彤管后夫人必有女史書其日月而以環進退之生子月辰則金環退之當御者以銀環進之着于左手既御着于右手事無大小記以成法毛詩義䟽曰女史彤管法如國史主記后夫人之事周禮曰女史八人女史女奴曉書者掌内治之貳以詔后治内政書内令漢班媫妤自傷賦曰陳女圖以鏡鑑顧女史而問詩范曄後漢書曰頒官分務各有典司女史彤管記功書過晉記曰元康中司空張華懼后族之盛作女史箴華箴曰歡不可凟寵不可專專實生慢愛極則遷致盈必損理有固然其義精好裴頠亦有女史箴曰膏不厭鮮水不厭清玉不厭㓗蘭不厭馨尤妙後漢皇甫規女師箴曰奉上惟敬撫下惟慈怨豈在明患生不思更佳沈約宋書曰女史執策記言是司專貞内表妖蠱外息又曰太宗留心後房置内職紫極房光興房各女史一人天子目送之絳侯為丞相朝罷趨出上禮之恭常目送之晉文帝器重魏舒每朝㑹罷目送之曰魏舒堂堂人之領袖濯纓孟子孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足楚辭曰滄浪之水清可以濯我纓滄浪之水濁可以濯我足文中子曰混混之水濁可以濯我足悠悠之水清可以濯我纓全不侔矣書曰又東為滄浪之水注曰别流在荆州宋永初山川記曰漢水古為滄浪即漁父所云滄浪之水今滄浪水合流出鐔城北界山此蓋後人名之非古滄浪也荆州圖經曰武當縣西北四十里江中有滄浪州長四里廣十三里禹貢稱漢水東流為滄浪水疑此州是也太史公詩論史記曰古詩三千餘篇孔子上采契后稷中述殷周之盛下至幽厲之缺始於袵席故關雎為國風始鹿鳴為小雅始文王為大雅始清廟為頌始三百五篇皆絃歌之以求合韶武雅頌之音禮樂自此可得而述此論竒妙其言詩至矣盡矣學者試思之蔡子池石硯宋永初山川古今記曰興平縣蔡子池南有石百丈許石青色堪為硯一云出劉澄之江州記又按唐仲雍州記曰應陽縣蔡子池南有石臼云是蔡倫紙臼此當又是一池也太牢左氏傳曰僖公十五年秦改館晉侯饋七牢焉注曰牛羊豕各一為一牢吳責晉饋百牢亦類此數也牛羊豕具為太牢有羊豕而無牛為少牢漢書昭帝紀賜郡國所選有行義者人帛五十匹詔曰不幸者祠以中牢師古曰中牢即少牢謂羊豕也今只以牛為太牢羊為少牢非也襄公二年曰馬牛皆百疋如司馬兵法曰兵出馬一疋牛三頭然則牛當稱頭此言疋者合言之耳宋沈攸之使范雲餉武陵王賛犢一羫牛亦可稱羫也丙宂周地圖記曰順政郡丙宂以其口向丙因以為名沮水經宂間而過或謂之丙水每春三月上旬後有魚長八九寸或二三寸從宂出躍相傳名為嘉魚水經曰丙宂出嘉魚常以三月出十月入宂口廣五六尺去地七八尺水泉懸注魚自宂下透入水宂口向丙故曰丙宂左太冲蜀都賦曰嘉魚出於丙宂詩曰南有嘉魚詩義䟽曰嘉魚無鱗皮青長三五尺任豫益州記曰嘉魚細鱗蜀中謂之拙魚蜀郡山處處有之年年從石宂中出録異記曰嘉魚䱓魚也形如鱒人以芭蕉葉隔火炙之肥美莫及洛陽有味魚亦此類杜詩魚知丙宂由來美酒憶郫筒不用沽褦襶音奈戴晉程曉詩曰平生三伏時道路無行車閉門避暑卧出入不相過今世褦襶子觸熱到人家主人聞客來嚬蹙奈此何謂當行起去安坐止跘跨上音盤下音跨所説了無急􅊱唅一何多疲倦向之乆咲問君極那揺扇臂中痛流汗正滂沱莫謂此小事亦是人一瑕傳戒諸髙明熱行宜見呵聲類曰褦襶不曉事之稱也山谷和錢穆父贈松扇詩可憐逺渡幘溝漊適堪今時褦襶子燭龍山海經曰鍾山之神名曰燭隂燭龍也是燭九隂也身長千里視為晝瞑為夜吹為冬呼為夏括地圖曰鍾山之神名曰燭龍視為晝瞑為夜吹為冬呼為夏息為風楚辭曰日安不到燭龍何照王逸曰言天西北無日之國有龍銜燭而照之詩含神霧曰天不足西北無有隂陽故有龍銜火精以照天門中也謝惠連雪賦曰爛兮若燭龍銜耀照崐山張説賦曰南窮火䑕之譯北盡燭龍之㑹此二句用事新而壮蓬萊神仙傳麻姑謂王方平曰自接侍以來三見海水變為桑田蓬萊之清淺也列仙傳曰麻姑謂王方平曰自接侍以來見東海三變為桑田向到蓬萊水乃淺於往者畧半也豈復為陵谷乎至王氏神仙傳曰王方平過蔡經家因遣人召麻姑姑年十八九頂中作髻餘髪垂腰既坐各進行厨金杯玉盤麟脯仙饌非人世所有姑曰自接侍以來見東海三變為桑田向到蓬萊水復淺于舊矣殆還為陵陸乎方平曰海中行復揚塵也二傳文有同異並録之山海經曰蓬萊山海中神山列子曰渤海之東有大海其中有山曰岱輿曰貟嶠曰方壺曰瀛洲曰蓬萊𤣥中記曰東南之大者有巨鰲以背負蓬萊山十洲記曰蓬萊山外别有員海繞之是為溟渤無風而洪波百丈有九氣丈人九天真君宫則蓬萊固在海中也謝自然欲過海求師蓬萊或笑曰蓬萊隔弱水三千萬里不可到天台有司馬子㣲身居赤城名在絳闕真良師也可往從之自然迺回受道于子㣲白日仙去探策十八風俗通曰古封泰山禪梁甫舊説岱嶽上有金篋玉策能知人年壽脩短漢武帝探策得十八因倒讀曰八十其後果壽八十沈佺期中宗誕日應制詩祚延金篋裏歌奏玉筐前用此事甚工舜祠絃歌聲羅含湘中記曰衡山九疑皆有舜廟太守至郡遣官屬致祀則聞絃歌之聲王歆之神境記曰九疑是舜之𦵏處也有青澗中有黄色蓮花芳氣竟谷此山之表復有二峯望之迺似人形暎出雲端如玉積髙於諸山頂有飛泉如帶舜廟在山之陽人有入廟中者常聞絃歌之聲魯恭王登孔子舊宅聞絲竹金石之聲固有此事也辛菜字林曰蔊一作辛菜也辛菜二字佳南都賦注引説文曰蓼辛菜也緯略卷六
