body:
  text: 緯略卷三宋髙似孫撰鳳毛王敬倫姿容似父作侍中公服從門入桓公望之曰大奴故自得鳯毛也大奴王劭也世説亦見中興書謝超宗祖靈運父鳯宗好學曽作誄奏之帝大嗟賞曰超宗殊有鳯毛恐靈運復出南齊書北平王貞字仁賢世祖第五子也沉審寛恕太祖稱此兒得我鳯毛北齊一本無我字晉尚書閔鴻見陸雲竒之曰此兒若非龍駒即是鳯雛龎統字士元人目為鳯雛襄陽記杜詩欲知世掌絲綸美池上于今有鳯毛岑參詩中郎一鳯毛世上獨賢豪此用鳯毛也劉商隱詩鳯雛皆五色鴻漸又雙飛此用鳯雛也宋元憲詩羽毛丹穴種頭角玉麟兒尤更奪胎門多好事漢張竦以列侯居長安貧無賔客時時好事者從之質疑問事論道説書揚雄家貧嗜酒人稀至其門有好事者載酒饌從學李楷述身賦曰座有清譚之客門多好事之車好事二字已見竦傳麈尾王導麈尾銘曰誰謂質卑御於君子拂穢靜暑虚心以俟許詢白麈尾銘曰蔚蔚秀格偉偉竒姿荏弱軟潤雲散雪霏君子運之探𤣥理㣲陸龜䝉麈尾賦有曰叩易論𤣥驅今駕古散入神明之賾中含道德之祖此形容揮用之趣獨孤授竹如意賦有曰發奥滌𤣥遐鈎獨索亦是形容用處優於龜䝉二公所作全不似唐人文章麋之大者曰麈群麋一作鹿隨之皆依一作視麈尾所轉出名苑又恩平郡譜曰麈謂之荒麈埤雅曰其尾辟塵秦醫越醫晉侯疾病求醫於秦秦伯使醫緩為之未至公夣疾為二豎子曰彼良醫也懼傷我焉迯之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之左氏成公十五年齊桓公六年越醫扁鵲過齊桓侯客待之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不疾病為功後五日復見曰君疾在血脉後五日復見曰疾在腸胃後五日見桓侯而還走桓侯使人問其故曰疾在骨髓臣是以無請也桓侯遂卒春秋後語春秋時論養生晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沉臺駘為祟史莫之知敢問此何神也子産曰若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是節宣其氣勿使有所壅閉湫子小切底以露其體湫集也底滯也露羸也一之則血氣集滯而體羸露今無乃一之則生疾矣左氏昭公晉侯求醫于秦伯秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祜公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本末以相及中聲以降五降之後不容彈矣于是有煩手滛聲慆堙心耳乃忘和平君子弗聼也物亦如之至于煩乃舎也已無以生疾君子之近瑟琴以儀節也非以慆心也天有六氣降生五味發為五色徵為五聲滛生六疾六氣曰隂陽風雨晦明也分為四時序為五節過則為菑隂滛寒疾陽滛熱疾風滛末疾雨滛腹疾晦滛惑疾明滛心疾女陽物而晦時滛則生内熱惑蠱之疾今君不節不時能無及此乎趙孟曰何謂蠱對曰滛溺惑亂之所生也於文皿蟲為蠱糓之飛亦為蠱在周易女惑男風落山謂之蠱皆同物也趙孟曰良醫也厚其禮而歸之雜卜蠡卜者春秋後語曰蘇秦事鬼谷子學終辭歸道乏困行以燕人蠡卜傳説自給彪卜者博物志曰彪知衝破又能畫地卜今人有畫物上下者推其竒偶謂之彪卜雞卜者史記曰越巫立越祀而以雞卜鳥卜者隋書曰女國在䓤嶺之南其國俗事阿修羅神及樹神嵗初以人祭或用獼猴祭畢入山祝之有一鳥如雌雉來集掌上破其腹而視之有粟則年豐沙石則有灾謂之鳥卜開皇六年遣使朝貢其後遂絶摴蒱卜者博物志曰老子入西戎造摴蒱摴蒱者五木也或云胡人亦為摴蒱卜十二棋卜者異苑曰十二棋卜出自張文成受法于黄石公行師用兵萬不失一逮至東方朔宻以占衆事自此以後祕而不傳晉寧康初襄成寺法味道人忽見一老翁着黄皮衣竹筒盛此書以授法味無何失所在遂復流于世竹卜者荆楚嵗時記曰秋分以牲祠社具供帳盛于仲春之月社之餘胙悉貢饋鄉里周于族社餘之㑹其在茲乎此其㑹也擲茭于社神以占來嵗豐歉或折竹以卜楚詞曰索瓊茅以筳篿楚人折竹結草以卜謂為籌也牛蹄卜者晉書曰夫餘國若有軍事殺牛祭天神以其蹄占吉凶蹄解者為㓙合者為吉楊方五經鉤沉曰東夷之人以牛骨占事呈吉示㓙對策射策甲乙科謂作簡策難問列置案上在試者意投射取而答之謂之射策上者為甲次為乙若録政紀得失顯而問之謂之對策也出漢書音義翟方進射策甲科為郎晁錯舉賢良上親策之詔策百餘人錯為髙第董仲舒以賢良對策為天下第一王嘉射策甲科為郎何武射策甲科為郎後漢蘇章對策髙第拜議郎劉淑桓帝時對策為天下第一拜議郎建初元年詔舉賢良方正對策者百餘人魯平策在髙第拜為議郎司馬彪續漢書漢射策與對策不同按蕭望之傳注射謂為難問疑義書於策量其大小署為甲乙之科不使彰顯欲射者隨其所取得而釋之對者顯問以政事經義觀其所對文詞定髙下晉潘京為州所辟因謁見問策探得不孝字刺史曰辟士為不孝耶答曰今為忠臣不得為孝子此亦射策遺法耳唐科唐之科目視漢最盛因衰録之志烈秋霜科顯慶二年韓思彦幽素科乾封元年蘇瓌解琬苖神容何輔元徐昭劉訥言崔谷神詞殫文律科上元元年崔融岳牧科永隆元年員半千才膺管樂科神龍二年張大求魏啟心魏愔盧絢張文成禇璆咸慶業郭璘趙不為才髙位下科馮萬石㓂良貞張敝材堪經邦科三年張九齡康元瓌賢良方正科蘇晉宋務光冦泚盧怡吕慎抱器懷能科景龍三年張侯銛茂才異等科王敬從盧重元詞標文苑科垂拱四年房晉甫瓊王旦蓄文藻之思科永昌元年彭景直抱儒素之業科李文愿臨難不顧徇節寧邦科長壽二年薛稷㓂此長才廣度沉迹下僚科證聖元年張漪文藝優長科通天元年韓琬絶倫科神功元年蘇頲崔元童袁仁敬何鳯孟温禮洪子與盧從愿趙不欺拔萃科大足元年崔翹鄭徵疾惡科馮萬石龔黄科長安二年馬克麾文以經國科景雲二年袁暉韓朝宗藏名負俗科李俊之文經邦國科先天元年韓休藻思清華科趙冬曦宣風興化科郭璘之道侔伊吕科張九齡手筆俊拔超越輩流科杜昱張子漸張秀明常無咎趙居貞賈登邢巨直言極諫科開元二年梁昇卿袁楚客哲人竒士逸倫屠釣科孫逖良才異等科邵閏之崔翹文史兼優科五年李昇期康子元逹奚珣文儒異等科崔侃禇庭誨博學通議科六年鄭少㣲蕭道成文詞雅麗科七年邢巨苖晉卿禇思光趙良器將帥科十二年裴敦復房自謙武足安邊科十五年鄭昉樊衡髙才沉淪草澤自舉科鄧景山才髙未達沉迹下僚科十七年吳鞏博學宏詞科十九年鄭昉陶翰多才科二十一年李史魚王霸科二十三年劉璀杜綰智謀將帥科張重光崔圓季廣深文詞秀逸科天寳元年崔尤顔真卿風雅古詞科六年薛璩詞藻宏麗科十三年楊綰樂道安貧科大厯二年楊闕諷諫主文科六年鄭珣瑜李益賢良方正能直言極諫科大厯二年裴休裴素李郃南皁李廿杜牧馬植鄭亞崔博崔璵王式羅群京崔渠韓賔崔慎苖愔韋㫤崔煥崔讜韋建中元年姜公輔元友直樊澤吕元膺貞元元年執誼鄭科田穆賢楊鄬裴復桞公綽歸登李直言崔邠鄭敬魏𢎞簡田元祐徐元祐徐衮四年崔元翰裴次元李彛崔豐史侔陸震桞公綽趙傪徐𢎞毅韋彭壽鄒儒立杜倫元易王及王真十年裴垍王播朱諫裴度熊執易許堯佐徐𢎞毅杜轂崔群玉皇甫鏄王仲舒季同仲子陵鄭士林丘顓寳厯元年唐中楊儉韋端符舒元褒蕭敞楊魯士來釋趙祝裴暉韋瑤李昌實嚴封李涯蕭夷中求元晦元和三年牛僧孺皇甫湜李宗閔李正封吉𢎞宗徐晦賈餗王起郭琳瑯姚衮便威從長慶元年龎嚴任畹吕述姚中韋曙李回崔嘏崔龜韋正實崔知白陳𤣥錫軍謀宏逺堪任將帥科大厯二年鄭冠李式詳明吏理達於教化科大厯二年宋琨寳厯元年韋正實文詞清麗科建中元年奚陟梁肅劉公亮鄭轅沈封呉通𤣥經學優深科建中元年孫珌黎逢白李隨髙蹈丘園科建中元年張紳衡良儒蘇哲軍謀越衆科建中元年夏侯審平知和鄭澹凌正周謂丁侁孝弟力田聞於鄉閭科建中元年郭黄中崔治季牧貞元四年張皓博通墳典達於政化科貞元元年熊執易劉簡甫十年朱穎𤣥元和三年馮苞凌旦長慶元年李思識洞韜畧堪任將帥科貞元元年許䞇清亷守節政術可稱堪任縣令科貞元四年李巽詳明政術可以理人科貞元十年張平叔李景亮長慶元年崔郢才識兼茂明於體用科貞元十年元稹韋惇獨孤郁白居易曹景伯韋慶復崔琯羅讓崔䕶薛存慶章衍李璠元修蕭俛沈傳師柴宿達於吏理可使從政科貞元十年陳岵元和三年蕭睦軍謀宏逺材任將帥科元和三年樊宗師長慶二年吳思李商卿軍謀宏遠材任邊將科寳厯元年裴儔侯雲章鹽梅鹽豉後漢桓麟七説曰河黿之羹齊以蘭梅崔駰七依曰鹺以大夏之薑酢以越嘗之梅張景陽七命曰燀以秋橙和以春梅説命曰若作和羹爾惟鹽梅左傳晏子曰水火醯醢鹽梅以烹魚肉古人調鼎皆用梅也禮記内則楚辭招魂備論飲食而不及豉史游急就篇乃有蕪荑䀋豉史記貨殖傳曰蘖麴鹽豉千合三輔决録曰前隊大夫范仲公䀋豉蒜果共一籩秦漢以來始有之也商寳玉湯誓曰遂一作武伐三朡俘厥寳玉誼伯中一作仲伯作典寳周書曰武王俘商舊寳玉萬四千佩玉億有八萬其多如此韓子曰周有玉版紂令膠鬲索之文王不予文王有一玉版紂尚欲得之寶玉可知矣湯誥曰不殖貨利盤庚曰無總貨寶茲所以戒也帝王世紀曰紂敗績登鹿臺蒙寳衣玉席投于火而殁汲冢書曰紂取天智玉自焚玉不銷玉馬異苑曰晉東瀛王騰鎮鄴天雪門前方數十歩融液不積騰怪掘之得玉馬髙一尺許又曰𢎞農楊子陽太元初聞土中有聲掘得玉肫韓詩外傳曰魯哀公使人穿井三月不得泉得一玉羊焉公以為玉羊使祝皷舞之欲上于天羊不能上孔子見曰水之精為玉土之精為羊願無怪之此羊肝土也公使殺之視肝即土矣易是類謀曰西岳亡玉羊鄭𤣥注曰玉羊華山之精二十四圖二十四真圖五嶽之藏也得之必能仙去飛歩太清欲得道法先沐浴去穢一作汚當得東井圖欲朝五帝役山精當得五嶽圖欲通神靈法仙訣當得入史真形圖欲通五行當得六甲通靈圖欲存吾身致天神當得九宫紫房圖欲奉道法當得太清圖欲奉順道當得混成圖欲通道機當得西昇保録圖欲通變化當得靈化圖欲攝大道當得九天圖欲脱身形當得九變圖欲隱身存神當得養身圖欲定身守神寶當得含影圖欲恬泊守一以存身當得養身圖欲寂黙養志當得精誠守志圖欲清浄潔白致其芝英當得芝英玉女圖欲驅六丁當得六隂玉女圖欲致仙籙當得九九道仙圖欲食道氣當得道引圖欲治道術當得洞中皇寶圖欲為變化當得偃息圖欲臨鑪定九丹金液當得太乙圖欲登五岳求神仙芝藥當得開山芝藥圖欲保神形别邪精當得明鏡圖玉符經龜周禮曰天龜曰靈屬地龜曰緯屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬史記曰一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰王龜凢八名爾雅曰一曰神龜龜之最神明者二曰靈龜涪陵郡出大龜甲可以卜縁中文似瑇瑁俗呼為靈龜即今觜􅏲龜一名靈􅏲能鳴􅏲以規切三曰攝龜小龜也腹甲曲拆解能自張閉好食蛇江東呼為靈龜也四曰寳龜尚書五曰文龜甲有文采六曰筮龜常在蓍藂下潛伏見龜策傳七曰山龜八曰澤龜九曰水龜十曰火龜此皆説龜生之處所火龜猶火䑕物有含異氣者不可以常理推然亦無所怪也漢藝文志有龜書五十二卷夏龜書二十六卷南龜書二十八卷巨龜書三十六卷雜龜書十六卷此皆灼之法占之文也蓋古之卜者皆有繇辭周官三兆其頌千有二百如鳯凰于飛和鳴鏘鏘間于兩社為公室輔專之渝攘公之羭一薰一蕕十年尚猶有臭如魚竀尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰大横庚庚予為天王夏啟以光之類是也今此書亡矣漢人尚視其體今人雖存其意而專以五行為主三代舊術莫有傳者龜厯任昉述異記曰陶唐之世越裳國獻千嵗神龜方三尺餘背上有文科斗書記開闢已來帝令録之號龜厯伏滔述帝功徳銘曰朝書龜厯之文桞氏龜經曰龜一千二百嵗可卜天地之終始何以言之三千四十二占於天地千嵗之龜甲黑龜有五色時用之晉書曰苻堅末髙陸人穿井得龜大三尺背上有文象八卦堅命太卜池養之食以粟及死藏其骨於太廟是夜廟丞髙虜夢龜謂之曰我本出将歸江南遭時不遇殞命秦庭又有人夢謂虜曰龜三千六百嵗終必妖興亡國之象也其後竟驗天里孝經援神契曰周天七衡六間者相去萬九千八百三十三里三分里之一合十一萬九千里從内衡以至中衡從中衡以至外衡各五萬九千五里洛書乾曜度曰周天三百六十五度四分度之一夫一度為千九百三十二里則天地相去十七萬八千五百里闗令内傳曰天地南午北子相去九千萬里東卯西酉亦九千萬里四隅空相去九千萬里天去地四十萬里日月星徐整長厯曰衆陽之精上合為日徑千里周圍三千里下於天七千里又曰月徑千里周圍三千里下於天七千里地里山海經曰帝令竪亥步自東極至于西極五億十選郭璞注曰竪亥徤行人選萬也九千八百八十步竪亥左手抱算右手指青丘北淮南子曰禹使大章步自東極至于西極二億三萬三千五百七十里使竪亥步自北極至于南極二億三萬三千五百七十里河圖括地象曰八極之廣東西二億三萬三千里南北二億三萬一千五百里夏禹所治四海内地東西二萬八千里南北二萬六千里又曰地廣東西二萬八千里南北二萬六千里有短長之制有九阻中土之文德及而不治吕氏春秋曰凢四極之内東西五億有九萬七千里南北五億有九萬七千里孝經援神契曰計校九州之别土壤山陵之大川澤所注萊沛所生鳥獸所聚凢七百一十萬八千二十四頃磽确不墾者千五百萬二千頃博物志曰地部之位起形于崑崙從廣萬里髙萬一千里神物之所生聖人仙人之所集崑崙之東北地轉下三千六百里有八𤣥幽都方二十餘萬里地下有四柱柱廣十萬里地有三千六百軸互相牽制也天部淮南子曰天有九部八紀地有九州八柱九州之外有八埏東方曰沙澤東南方曰沅澤南方曰浩澤西南方曰丹澤西方曰泉澤西北方曰海澤北方曰塞澤東北方曰無通澤顔延年詩辰角麗天部提封經地域蓋用此天部也風流風流罪過晉庾翼與殷浩書曰王夷甫先朝風流士也宋受禪謝晦謂劉裕曰陛下受命恨不得謝益壽奉璽裕歎曰吾甚恨之使後生不得見其風流益壽混字也謝安傳史臣曰琰稱真幹卒以忠勇垂名混曰風流竟以文詞獲譽並階時宰無墜家風王珣以疾解職嵗餘卒桓𤣥與㑹稽王道子書曰珣神情朗悟經史明徹風流之美公私所寄忽爾喪失悲嘆之深豈徒相悼而已殷浩善𤣥言風流談論者所宗顧愷之上疏頌殷浩曰伏見故中軍揚州刺史殷浩體德沉粹識理淹長風流雅稱聲蓋當時王夷甫樂廣俱宅心事外風流著稱唯王樂焉晉陽秋王獻之文藝並長而能撮其勝會故擅名一時為風流之冠續陽秋撫軍問孫興公劉真長何如曰清蔚簡亮王仲祖何如曰温潤恬和徐廣晉紀曰凢稱風流者以王劉為宗焉范豫章謂王荆州范寗王悦卿風流雋望真後來之秀王曰不有此舅焉有此甥王氏譜曰王坦之娶慎陽范任女北齊郎基性清儉在官惟頗令人寫書潘子義遺之書曰在官寫書亦是風流罪過子雲千賦桓譚少好文見子雲工賦頌欲從學子雲曰能讀千賦則善之矣新論按藝文志自屈原唐勒至劉向王褒賦二十家三百六十二篇又自陸賈枚臯至張豐朱宇賦二十一家二百七十四篇孫卿秦時雜賦至華龍路恭賦二十五家百三十六篇又客主賦頌德賦至雜賦十二家二百三十三篇數亦千篇子雲所讀其謂是歟獨淮南賦八十二篇枚臯賦百二十篇今所見者淮南屏風賦枚臯兎園賦耳古人儀度姿宇魁秀魏謩姿宇一作富神秀偉蕭得聖風采峭整阮當國神情爽拔李義琛容止嚴峭韋斌姿質軒秀嚴挺姿儀瓌秀吕元膺姿采玉峙鄭畋進止雍閒裴休神清明秀王衍進止詳華温彦博姿表瓌傑温造舉止都雅張洎風度髙嚴劉伯芻姿制閒美李闕進止雍如崔沔儀狀瓌偉張鎬神采軒異趙㫤精神爽秀蘇逢吉狀貌雄偉閩王審知神觀爽邁裴度風度凝逺宋璟風骨秀爽趙彦昭舉止秀峙崔澹儀幹秀偉楊謹矜兄弟姿幹瓌壯張守珪容止端秀裴臯姿儀秀偉崔郾神采秀徹王戎神采髙徹王衍風神髙邁裴楷進止詳華髙士亷神氣清爽源乾曜體貌閒麗宋玉儀容端正吳孫坦姿狀秀偉武元衡姿貌魁秀劉德威姿質偉岸宗室從誨姿度魁傑馬燧裴度氣象清古王邱姿貌魁異桞澤髭貌雄偉宗晉卿形神秀發五代和凝體貌軒特李棲筠風度沉整房綰器局峻整裴垍器量方峻楊於陵眉目瓌異李邕眉宇秀整汝陽王風致峭整崔逺姿體魁秀李義琰體貌偉麗路岩神㝢警邁陸據古人文章虞世南文章婉縟趙涓翰藻豪邁龎嚴詞章峭麗崔文為文華麗張説屬思精壯封敖屬辭贍敏吕温藻翰精富楊炎文藻雄蔚韓愈雄深雅徤似司馬子長崔蔡不足多也桞宗元卓偉精緻元幹用思精緻崔元幹馳騁班固蔡邕間白居易文章精切陸扆屬文敏速李賀辭尚竒詭李商隱瑰邁竒古李白清雄奔放徐堅屬文典厚桞渾屬文簡拔李翰為文精宻王勃文章宏放歐陽詹文章切深囬復李華文辭緜麗韋承慶為文迅捷許景先屬辭豐美得中和之氣水精鹽李白詩客到但知畱一醉盤中秪有水精鹽金樓子曰胡中有鹽瑩澈如水精謂之玉華鹽野鵞宋鮑昭野鵞賦曰邈辭群而别偶超烟霧以風行如張文昌詩但曰曲沼春流滿新波暎野鵞耳則鵞安得超烟霧而風行耶按西京賦曰鳥則鷫鷞鴰鵓鴐鵞鴻鶤張揖上林賦注曰鴐鵞野鵞也鮑昭所賦蓋是鴐也緯略卷三
