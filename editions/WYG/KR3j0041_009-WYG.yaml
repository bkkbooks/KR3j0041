body:
  text: 緯略卷九宋髙似孫撰劉孝標世説宋臨川王義慶采擷漢晉以來佳事佳話為世説新語極為精絶而猶未為奇也梁劉孝標注此書引援詳確有不言之妙如引漢魏吳諸史及子傳地理之書皆不必言只如晉氏一朝史及晉諸公列傳譜録文章皆出于正史之外紀載特詳聞見未接實為注書之法今采於後朱鳳晉書沈約晉書王隠晉書虞預晉書朱鳳晉紀劉謙之晉紀徐廣晉紀鄧粲晉紀曹嘉之晉紀干寶晉紀晉陽秋續晉陽秋檀道鸞續晉陽秋漢晉春秋晉中興書晉惠帝起居注晉安帝紀晉後略庾翼别傳孟嘉别傳郭璞别傳王述别傳諸葛恢别傳羊曼别傳謝鯤别傳阮孚别傳邵薈别傳王含别傳王珉别傳管輅别傳荀粲别傳司馬徽别傳丞相王導别傳賈充别傳郭泰别傳桓𤣥别傳阮光禄别傳王㳟别傳范宣别傳王乂别傳嵇康别傳桓彞别傳汝南别傳周處别傳王覬别傳陸玩别傳向秀别傳衛玠别傳王長史别傳潘岳别傳王敦别傳賀循别傳王弼别傳桓温别傳劉剡别傳殷浩别傳王彬别傳郄超别傳郭泰别傳卞壼别傳郄愔别傳桓冲别傳孔愉别傳蔡司徒别傳羅府君别傳劉濛别傳郄鑒别傳郄曇别傳陶侃别傳羅含别傳孫放别傳祖約别傳王胡之别傳王澄别傳謝𤣥别傳顧秋别傳陳逵别傳王邃别傳劉尹别傳支遁别傳髙坐别傳佛圖澄别傳衛氏譜祖氏譜温氏譜吳氏譜庾氏譜許氏譜戴氏譜曹氏譜虞氏譜陶氏譜序周氏譜諸葛氏譜華嶠譜索氏譜桓氏譜傅氏譜馮氏譜孔氏譜晉世譜謝氏譜王氏譜王氏譜謝女譜司馬氏譜陸氏譜郄氏譜羊氏譜郝氏譜摯氏世本王氏世家袁氏世紀裴氏家傳荀氏家傳顧愷之家傳李康家誡禇氏家傳李氏家傳謝車騎家傳袁氏家傳嵇康髙士傳皇甫謐髙士傳楚國先賢傳海内先賢傳汝南先賢傳江左名士傳會稽後賢傳蕭廣濟孝子傳鄭緝孝子傳江表傳逸士傳名士傳文士傳髙士傳文章傳晉中興士人書晉諸公傳王中郎傳袁宏孟處士傳殷羡言行永嘉流人名竹林七賢論先賢行狀列仙傳髙逸沙門傳安法師傳支法師傳名徳沙門題目庾法暢人物論宋明帝文章志摯虞文章志顧愷之文章志續文章志丘淵之文章叙丘淵之文章録文章叙録婦人集王朝目録晉百官名八王故事晉東宫官名明帝東宫僚屬名伏滔大司馬屬名征西僚屬名齊王官屬名山公啟事太乙青藜劉向校書天禄閣專精覃思夜有老人衣黄衣執青藜杖叩閣而進向獨坐閣中誦書老人迺吹杖端出火用以照向言開闢以前向因受五行洪範之文乃裂裳及紳以記其言至曙而去向請問姓名答曰我太乙之精天帝聞卯金之子有博學者下而觀焉乃出懐中竹牒有天文地圖之書授之向子歆復授其術王子年拾遺記胡文恭公詩青藜香灺掩殘書越絶東南駕隼輿又曰詩就雞林買書成太乙觀皆用此事四扈左思齊都賦曰四扈推移注曰春夏秋冬四時鳥也按爾雅曰春鳸鳻扶雲反鶞敕倫反夏鳸竊𤣥秋鳸竊藍冬鳸竊黄此正左思所謂四户也又曰桑鳸竊脂棘鳸竊丹行鳸唶唶子夜反宵鳸嘖嘖詩曰交交桑扈率場啄粟箋曰桑扈竊脂食肉今無肉循場啄粟失其性也淮南子曰馬不食脂桑扈不食粟詐廉也左氏郯子曰少皞摯以鳥名官九扈為九農正杜預曰扈有九種爾雅同其九老扈鷃鷃也顧愷之作父傳顧悦與簡文同年而髮蚤白簡文曰卿何以先白髮對曰蒲栁之姿望秋而落松柏之質經霜彌茂中興書曰顧悦字君叔君一作居晉陵人初為殷浩揚州别駕浩卒上疏理浩或諫以浩為太宗所廢必不許悦固争之浩果得申物論稱之後至尚書丞顧愷之為父傳曰君以直道遲囬于世入見王王髮無二毛而君已斑白問君年乃曰卿何偏蚤白君曰松柏之姿經霜猶茂臣蒲栁之質望秋先零受命之異也王稱善久之子作父傳史所罕載只此傳中數語固自與諸書所載不同也惟司馬遷述太史公談之言曰天子始建漢家之封而太史公留滯周南不得與從事發憤且卒而子遷適反見父于河洛之間太史公執遷手而泣曰予先周室之太史也自上世常顯功名于虞夏典天官事後世中衰絶于予乎汝復為太史則續吾祖矣今天子接千歳之統封泰山而予不得從行是命也夫命也夫予死爾必為太史毋忘吾所欲論著矣且夫孝始于事親中于事君終于立身揚名後世以顯父母此孝之大者夫天下稱周公言其能論歌文武之徳宣周召之風達太王王季思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子修舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘歳而諸侯相兼史記放絶今漢興海内一統明主賢君忠臣義士予為太史而不論載廢天下之文予甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人之所次舊聞不敢闕卒三歳而遷為太史令紬史記石室金匱之書嗚呼若司馬氏父子可謂能世其傳矣艾納東坡詩憑仗幽人收艾納國香和雨入青苔和香之方用艾納則衆香發越樂府歌曰何來毾㲪五味香迭迷艾納及都梁廣志曰艾納出西國似細艾本草及沈氏香譜曰艾納松上莓苔也魏文帝迭迷賦曰覽芳草之樹庭揚修幹而結莖薄西夷之穢俗越萬里而來征應瑒迭迷賦曰振纎枝之翠粲動芳葉之莓莓陳琳迭迷賦曰立碧莖之婀娜銷緑條之蜿蟺廣志曰迭迷生西海中盛𢎞之荆州記曰都梁縣有小山山水清淺其中生蘭草俗謂蘭為都梁䕶門草梁王筠寓直詩龍樓實九重薄寒殊復早玉階泫清露銅池結秋潦霜被守宫槐風驚䕶門草之子摛一作擅文華縱横富辭藻舒錦慙光麗握珠謝奇寶愧予非工文何用披懐抱此詩六朝人詩之傑作也窈窕清暢之甚按賛寧物類志曰䕶門草出常山北有之彼處人取之置于門户上夜或有過其門其草則必叱之有盗者皆驚奔矣俗呼為䕶門草一曰靈草也鰒魚後漢書曰張歩遣使伏隆詣闕上書獻鰒魚郭璞引三蒼曰鰒似蛤偏著石廣志曰鰒一面附石決明細孔雜雜或七或九魏志曰倭國人入海捕鰒魚水無深淺皆沈没取之吳良為郡議曹掾諫太守無受正旦賀觴賜鰒魚百枚魏文帝與孫權書曰今因趙咨致鰒魚千枚陳思王求祭先主表曰先主喜食鰒魚前已表徐州刺史臧霸送鰒魚二百足自供事皮日休詩君卿唇舌非吾事且向江南問鰒魚詩中用鰒魚僅見此郭有道碑蔡伯喈作郭林宗碑曰吾為人作銘未嘗不有慙容唯為郭有道碑頌無愧耳劉長卿詩獨繼先賢傳誰刋有道碑觀長卿詩則此碑重矣泰卒會葬者千餘人鄭𤣥卒自郡守以下嘗受業者縗絰赴會千餘人范丹卒會葬者二千餘人陳寔卒海内會葬者三萬人亦一時之盛禹鼎禹貢九牧之金鑄鼎荆山之下民入山林川澤魑魅魍魎莫能逢之所鑄九鼎五者以應陽法四者以象隂數使工師以雌金為隂鼎以雄金為陽鼎鼎中水常滿以占氣象之休否夏桀之世鼎水忽自沸煎及傳于周周末九鼎咸震亡滅之道也第七車益都耆舊傳曰蜀郡張寛漢武帝時為侍中從祀甘泉至渭橋有女子浴于渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寛在第七車對曰天星主祭祀者齋戒不嚴則此女見異苑曰魏武過曹娥碑下有婦人浣于汾渚問之曰第四車解既而至乃禰正平也衡以離合義解之所謂離合義者即黄絹幼婦外孫虀臼或謂此婦人即娥靈也人面子嵇含南方草木狀曰人面子樹似含桃結子如桃實無味核正如人面故以為名以蜜漬之稍可食其核可玩也紫玉沈約宋書曰王者不藏金玉則紫玉見于深山矣貫休詩欲贈之以紫玉尺白銀鐺盖用此耶悉茗油耶悉茗花是西國花色雪白胡人攜至交廣之間家家愛其香氣皆種植之廣州圖經曰舶上有耶悉茗油盖胡人取花壓油偏宜麻風膏摩于手心香透于手背嵇含南方草木狀曰耶悉茗花茉莉花皆胡人自西國移植于南海南海人憐其芳香競植之陸賈南越記曰南海之境五穀無味百花不香此二花特芳香者縁自胡國移至不隨水土而變與夫橘北為枳異矣彼之女子以綵絲穿花心以為首飾段公路北户録曰耶悉茗今之素馨也古泉貨太昊金尊盧氏幣神農氏金黄帝貨金軒轅貨金帝昊金帝嚳金髙陽金堯泉舜䇿乗馬幣舜䇿幣貨金夏貨金商貨莊布商貨四布商連幣商湯金商子貨金周圜注貨周圜法别種齊公貨齊刀别種齊梁山幣莒刀齊布齊刀醮漢建安二十四年吳將吕蒙病孫權為之命道士於星辰下為請命醮之法當本於此顧况詩飛符超羽翼焚火醮星辰姚鵠詩蘿磴静攀雲共過雪壇當醮月孤明李商隠詩通靈夜醮達星辰承露盤晞甲帳春趙嘏詩春生藥圃芝猶短夜醮齋壇鶴未逥醮之禮至唐盛矣隋煬帝詩迥歩逥三洞清心禮七真馬戴詩三更禮星斗寸匕服丹霜薛能詩符呪風雷惡朝修月露清此言朝修之法也然陳羽歩虚詞曰漢武清齋讀鼎書内官扶出畫雲車壇上月明宫殿閉仰看星斗禮空虚漢武時已如此律室蔡邕月令章句曰截竹為管謂之律置之密室以葭莩為灰以實其端其月氣至則灰飛而管空司馬彪續漢書曰候氣之法于密室中以木為案置十二律琯各如其方實以葭灰覆以緹縠氣至則一律飛灰世皆疑其所置諸律方不踰數尺氣至獨夲律應何也或謂古人自有術或謂短長至數㝠符造化或謂支干方位自有感召皆非也盖彪説得其略耳惟隋書志論之甚詳其法先治一室令地極平乃埋律琯皆使上齊入地則有淺深冬至陽氣距地面九寸而止唯黄鍾一琯達之故黄鍾為之應正月陽氣距地面八寸而止自太簇以上皆達黄鍾大吕先以虚故惟太蔟一律吹灰如人用鍼徹其經渠則氣隨鍼而出矣地有疎密則不能無差忒故先以木案隔之然後實土案上令堅密均一其上以水平其槩然後埋律其下雖有疎密為木案所節其氣自平但在調其案上之土耳隋蕭慤詩天宫初動罄緹室已飛灰韓偓詩中宵忽見動葭灰料得南枝已有梅皆佳句也夏英公詩玉琯飛灰新氣應璇霄合璧瑞華凝此又用李賀天官玉琯灰剰飛也秦碑三句一韻梁書范雲傳曰竟陵王子良為會稽太守雲為府主簿王尅日登秦望山雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又加大篆人多不識乃夜取史記讀之暨登山子良命賓寮讀之皆茫然不識末問雲雲曰嘗讀史記見此刻石文讀之如流水子良大悦秦碑有存者泰山碑兗州嶧山碑李斯篆鄭文寶摹兗州始皇詔書李斯篆兗州梁山刻石可辨者十九字登州梁大篆可辨者十六字登州始皇朐山碑海州會稽山碑李斯篆越州二世詔文李斯篆密州殘碑二十字李斯篆登州巫咸乆湫文俗呼詛楚文李斯篆鳳翔府又渭州州學本與鳳翔小異漏刻銘孫綽漏刻銘曰累筒三階積水成淵器滿則盈承虚赴下靈虬吐注隂蟲承瀉陸機刻漏賦曰激懸泉以逺射跨飛途而遥集伏隂蟲以成波吞絙流其如挹此並用隂蟲承瀉梁元帝新漏銘曰方壺外㳄圓流内襲靈虬承注隂蟲吐吸微若抽繭逝如激電銅史司刻金徒抱箭皆有所襲唐符子璋刻漏賦曰方圓列陛髙卑中度制隂蟲以吐輸設靈虬以承注銅史應其方金箭刻其數顔舒刻漏賦曰髙卑列級洪殺順理靈虬屹以俯開隂蟲矯而仰止上流注而不竭下吞挹而無已二賦皆仿六朝人制作各盡其趣王廙洛都賦曰挈壺司刻漏尊瀉流山叟秉尺隨水沈浮此四句亦佳漢複道王維詩複道開長樂青門臨上路宋之問詩複道開行殿鉤陳列禁兵按漢未央宫長樂宫北有桂宫北宫明光宫皆有複道廟記曰桂宫有紫房複道通未央宫北周圍四十里中有明光殿殿有複道從宫中西至城上建章宫神明堂太平寰宇記建章宫在長安城外其與未央諸宫隔城相望故跨城而為閣道三輔故事曰神明臺在建章宫故垂棟飛閣從宫中西上跨城而出乃達建章也孔光傳曰哀帝祖母定陶傅太后居北宫有紫房複道通未央宫太后從複道朝夕至帝所漢室制度凡有宫即有複道也西都賦曰輦路經營修除飛閣自未央而連桂宫北彌明光而亘長樂凌隥道而超西墉掍建章而聮外屬薛綜西京賦注曰隥閣道也上雍宋元憲公詩積髙人上雍昭配禮從周用上雍二字也唐彦謙詩雲低雍畤祈年去雨細長楊從獵歸闕司馬遷曰迫季冬薄從上上雍雍鳳翔府天興縣也上者自下升髙之辭也四面曰雍四望不見四方是之謂雍漢故事凡幸雍悉言上雍也漢初未有南北郊惟雍縣有四畤髙帝又立北畤故文帝十五年四月幸雍始郊見五帝景武宣元皆循之秦之離宫多在雍鄠之間故諸帝亦時時臨幸也成帝建始中罷雍五畤始祀天地於長安南北郊則前乎此者皆以雍畤為郊丘也西畤者秦襄公始為諸侯居西自以為主少昊之神作西畤祠白帝畤者峙土為髙也即壇也鄜畤者自襄公以後十四年文公東獵汧渭之間卜居而吉夢黄蛇自天而下屬地其口上於鄜衍山阪為衍作鄜畤唐鄜州義取諸此而鄜州之地不在此也上畤下畤者文公後二百十五年靈公於吳陽作上畤以祭黄帝作下畤以祭炎帝此四畤也北畤者漢髙帝入闗問秦祀上帝何帝也對曰四帝有白青黄赤帝之祠帝曰吾聞天有五帝今四何也已而曰吾知之矣乃待我而具五也迺立黑帝祠名曰北畤成帝建始中罷雍五畤始祀天地于南北郊又有武畤好畤者在雍縣旁之吳陽此二畤者不知何世所造參求其地即靈公所立上畤下畤正在吳陽也靈公既立上下兩畤則昔之武畤好畤不在五畤之數矣畦畤獻公作祠白帝言其如畦畛也密畤者宣公作在渭南祭青帝不在雍也凌煙閣賛徳宗幸凌煙閣見右壁頽剥上有殘缺文記每行可辨三五字命録之以問宰臣宰臣卒然無以對遽召蔣乂訪之對曰此聖厯中侍臣圖賛也暗諷誦不失一字宰臣大慚徳宗嘆曰虞世南暗寫列士傳無以加也唐書此賛今不傳矣然貞觀十三年詔圖畫功臣二十四人上自為賛詔曰自古皇王褒崇勛徳既勒銘于鍾鼎又圖形于丹青是以甘露良佐麟閣著其美建武功臣雲臺紀其迹宜酌故實𢎞兹令典今凌煙閣在西内三清殿側是也畫功臣皆北面按西内即太極宫也閣中凡三隔内一層畫功髙宰輔外一層寫功髙侯王又外一層次第功臣此三隔者雖分内外其所畫功臣像貌皆北面者豈北辰所居之義耶按唐河間王元恭碑曰唐初功臣皆圖形戢武閣今曰凌煙閣耳戢武之名不見于他書又段志𤣥碑亦曰圖形戢武閣二碑皆當時所立不應差誤宋鮑昭有凌煙樓詩瞰江倒楹望景延除俯窺淮海俛眺荆吳我王結駕藻思神居宜此萬春修靈所扶凌煙之名六朝已有矣吕温作勲臣賛舊唐書長孫無忌傳載二十四人而闕其一呂温作賛乃併髙申公士廉二十四人代宗廣徳二年七月給功臣鐵劵藏於太廟圖形于凌煙閣宣宗大中二年七月己巳圖形功臣於凌煙閣寶應元年徳宗為大元帥封雍王以平河北與郭子儀李光弼等皆賜鐵劵圖形凌煙閣徳宗紀貞元間徳宗嘉李晟馬燧之勲下詔曰昔我烈祖乗乾盪坤滌掃五代荒茀體元御極作人父母則有熊羆之士不二心之臣左右經綸參翊締搆昭文徳恢武功王業既成泰階既平乃圖厥容于凌煙楙昭績效表式儀形君臣之義厚莫重焉歳在乙巳秋七月外行西宫瞻望崇閣見老臣遺像儼然肅然和敬在色觀往思今取類非逺且功與時並才與世生茍藴其才遇其時尊主庇民何代蔑有在中宗時有如桓彦範等著朝載之績在𤣥宗之時有如劉幽求申弼翼之勲在肅宗時有如郭子儀掃除氛祲今顧晟等保寧朕躬咸宣忠肆力光復宗社訂之前烈夫豈多讓闕而未録孰旌厥賢有司宜叙前後各圖其像于舊臣之處命皇子書其文以賜晟晟刻石于門李晟傳宣宗大中初紀史館差第元和將相圖形凌煙閣李絳與焉出絳傳武徳功臣十六人貞觀功臣五十三人至徳功臣二百六十五人徳宗即位録武徳以來宰相及功臣子孫賜一子正員官史館放勲闕文十字以三等條奏第一等以闕文一字歳授官第二等闕文六字人每等武徳以來宰相為首功臣次之至徳以來將相又次之大中初又詔求李峴王珪戴胄馬周褚遂良韓瑗郝處厚婁師徳王及善張柬之袁恕已崔𤣥暐桓彦範宋欽則魏知古陸象先張九齡裴寂劉文静劉幽求郭元振房琯袁履謙李嗣業張巡許逺盧奕南霽雲韋皋張鎬李勉張鎰蕭復栁渾賈耽馬燧李憕三十七人皆畫像于凌煙閣唐樂曲涼州伊州甘州人不知其始盖始於明皇因輯唐樂曲為一編云又按唐人西域志云龜兹國王與臣庶知樂者於巖嶼間聽風水之聲均節成音後翻入中國如伊州甘州凉州也太宗四曲傾杯曲長孫無忌作樂社曲魏徵作英雄樂曲虞世南作髙宗七曲景雲河清歌亦名燕歌景雲見河水清張文叔為之喜慶善樂破陣樂承天樂一戎衣大定樂伐髙麗宴洛陽城門觀屯管教舞按新用武之勢八紘同軌樂象髙麗平天下定夷羌賓曲遼東平李勣作是曲明皇三十四曲立部八曲太常選坐部伎無性識者退入立部伎又選立部伎無性識者退入雅樂部則雅聲可知一作可和一太平安舞二太平樂安舞太平並周隋遺音三破陣樂四慶善樂五大定樂六上元樂七聖夀樂八光聖樂坐部伎六曲一燕樂二長夀樂三天授樂武后天授年作四烏歌萬歳樂武后時有烏能人言萬歳五龍池樂明皇為郡王時賜第隆慶坊坊之南地忽變為池中宗泛之以厭其祥明皇即位乃作龍池樂六小破陣樂半夜樂還京樂明皇自潞州還京師夜半舉兵誅韋后故作此樂文成曲明皇作霓裳羽衣曲河西節度使楊欽述獻一説羅公逺與明皇逰月宫見仙女數百皆素練霓裳問其故曰云云故作是曲直道曲道士司馬承禎奉詔作大羅天曲茅士道曲紫清道曲工部侍郎賀知章作景雲九真紫極小長夀承天樂順天樂二曲並太清宫成太常卿韋縚作君臣相遇樂曲商調韋緯作茘枝香貴妃生日張樂長生殿奏曲未有名會南方進茘枝故名茘枝香梨園法曲法曲本隋樂其音清而近雅煬帝厭其聲淡明皇愛之選坐伎三百人教之梨園宫女數百亦為梨園子弟涼州伊州甘州天寶樂曲皆以邊地名之又詔道調法曲方胡部新聲合作千秋節明皇生日作代宗二曲寶應長寧樂代宗復二京梨園供奉官劉日進獻十八曲宫調廣平太一曲大厯元年作徳宗四曲定難曲河東節度馬燧獻繼天誕聖樂徳宗生日昭義節度王䖍休獻中和樂徳宗生日作孫武順聖樂山南節度于頔獻文宗二曲雲韶法曲霓裳羽衣舞曲此二曲文宗詔太常卿馮定采開元雅樂作也臣下功髙者賜之又改法曲為仙韶曲武宗一曲萬斯年曲李徳裕命樂工作萬斯年曲以獻宣宗一曲播皇猷曲帝自製宴禮用之竹簡春秋序曰小事簡牘爾雅曰簡謂之畢郭璞曰今之簡札也説文曰簡牒也釋名曰簡書編也杜周傳曰三尺安在哉注曰以三尺竹簡書法律也劉向列子序皆殺青書注曰謂汗簡刮去青皮也劉向别録曰殺青書治竹作簡新竹有汗善折蠧凡作簡者皆以火炙乾之謂之汗汗者去其汗也吳越曰殺亦治也風俗通曰劉向典校書籍二十餘年皆先書竹改易刋定可繕寫者以上素今東觀書竹素也張景陽詩逰思竹素園寄辭翰墨林是也張璠漢記曰吳祐父恢為南海太守欲以殺青寫書祐年十二諫不可海濱多珍玩若成載書盈兩必思薏苡之謗文士傳曰人于嵩山下得竹簡一版上有兩行科斗之書張華以問束晳晳曰此明帝顯節陵中竹簡蕭子顯齊書曰襄陽有盜發古塜相傳是楚王塜獲竹簡書青絲編簡廣數分長二尺皮節如新盜以把火照書後人得十餘簡以示撫軍王僧䖍云是科斗書考工記周官所缺文也齊春秋曰襄陽人發古塜有玉鏡及竹簡古書字不可識王僧䖍善識字體亦不能解云是科斗濟陽江淹博古好事以科斗文字推之則周宣之前也簡殆如新李嶠詩竹是蒸青外池仍㸃墨餘楊炯詩道書編竹簡靈藥灌梧桐武元衡詩署分刋竹簡書囊䕶芸香陸龜蒙詩簡便書露竹樽破待霜匏宋景文公詩此時刀筆手慙愧殺青人又詩聞道蘭臺有圖籍故留香粉照蒸青蘇欒城詩栽向鳳池吹律處斸從芸閣殺青餘八磨後魏書曰崔亮在雍州讀杜預傳見其為八磨嘉其有濟時用遂教民為碾及為僕射奏於張方橋東堰穀水造水碾磨數十區其利十倍國便之通俗文曰石鍋轢穀曰碾嵇含八磨賦外兄劉景宣作磨奇巧特異闕轉八磨之重因賦之曰方木矩跱圓質規旋闕文二字下青以轉以乾巨輪内建八部外連腦能柔物左氏僖公二十八年晉文公將與楚戰夢楚子伏已而盬其腦子犯曰吾且柔之矣杜預曰腦能柔物皮氏録曰羊腦猪腦男子食之損精氣又云羊腦食之令五臟消也陳琳賦魏陳琳武軍賦曰其刃也則楚金越冶棠谿名工清堅皓鍔脩刺鋭鋒陸陷蘂犀水截輕鴻鎧則東胡闕鞏百煉精鋼函師振旅韋人制縫弩則幽都筋骨恒山檿榦通肌暢骨崇緼曲煙其弓則烏號越耗繁弱角端象弭繡質哲弣文身矢則申息肅慎箘簵空䟽焦銅毒鐵麗轂撻輈馬則飛雲絶景直鬛騧駵駁龍紫鹿文的􅗎魚若清道整列按節徐行龍姿鳳峙灼有遺英琳之賦戎器瓌壯如此其為檄可知矣琳之檄曰若使水而可恃則洞庭無三苗之墟子陽無荆門之敗朝鮮之壘不刋南越之旌不拔也其語意殊佳戴叔倫詩陳琳草奏才還在王粲登樓興不賖劉長卿詩陳琳書記好王粲從軍樂鏁香李義山詩鏁香金屈戌帶酒玉崑崙又詩金蟾囓鏁燒香入玉虎牽絲汲井回此皆香器其名鏁者盖有鼻鈕施之於幃幬之中者也梁簡文帝詩織成屏風金屈膝唇朱玉面燈前出徐彦伯詩畫屏繞金膝珠簾懸玉鈎李賀詩屈膝銅鋪鏁阿甄夢入家門上沙渚屈膝當即是屈戌也李賀詩曉奩籹秀靨夜帳減香筒又詩象口吹香毾㲪暖七星挂城聞漏版亦帳中香也大小山猶二雅樂府解題淮南書有大山小山猶詩有二雅黄太史言章子厚論楚辭皆有所本予初不以為然因叩之子厚曰離騷經本之國風九歌本之大雅九辨本之小雅考之信然常嘆息斯人妙解文章之味于翰墨之林千載一人也惜其以世故廢學耳北酥沈約謝北酥啟曰曠阻隂山之外眇絶蒲海之東自非神力所引莫或輕至按西河舊事曰祁連山冬夏寒涼宜牧牛羊充肥乳酪好當是此類承露盤銘魏母丘儉承露盤銘曰赫赫聖魏紹天維則承露瑰生爰昭懿徳下有蛟龍偃蹇虬紛上有層盤厲彼青雲修莖擢擢髙弗可及仙掌岧岧零露是集有直其體有固斯基休徴攸降神明攸持少昊惟好我后斯固以介眉夀以保萬邦魏陳王曹植承露盤銘曰岧岧承露峻極太清神石礧磈洪基岳停下潜醴泉上受雲英和氣四充翔鳳所經匪我明后孰能經營近厯闡度三光朗明殊俗歸義祥瑞混并鸞鳳晨棲甘露宵零神明攸協髙而不傾奉戴巍巍恭統神器固若露盤長存永貴賢聖繼迹奕世明徳不忝先功保兹皇極垂祚億兆永荷天秩李賀金銅仙人辭漢歌序魏明帝青龍元年八月詔宫官牽車西取漢孝武帝捧露盤仙人欲立置殿前宫官既折盤仙人臨載迺潸然淚下唐諸王孫李長吉遂作金銅仙人辭漢歌茂陵劉郎秋風客夜聞馬嘶曉無迹畫欄桂樹懸秋香三十六宫土花碧魏官牽車指千里東闗酸風射眸子空將漢月出宫門憶君清淚如鈆水衰蘭送客咸陽道天若有情天亦老攜盤獨出月荒涼渭城已逺波聲小魏既遷漢金銅仙人而曹植所序乃謂明帝所作按曹植銘曰明帝鑄承露盤莖長十二丈大十圍上盤徑四尺下盤徑五尺銅龍繞其根龍身長一丈背負兩子自立于上林園甘露乃降使植為頌又按三輔故事曰漢武以銅作承露盤髙二十丈大七圍上有仙人掌承露盤魏既遷漢盤又作新盤也儉又有承露盤賦有曰雄幹碣以髙立干雲霧而上征盖取象于蓬萊實神明之所憑峻極過于閬風鳳髙翔而弗升味一作采和氣之精液承清露于飛雲語亦峭拔然讀長吉歌非儉植可及也謝𤣥暉詩風動萬年枝日華承露掌劉孝綽詩仙掌方承露靈烏又轉風王褒詩御溝槐影出仙掌露光晞岑文本詩佳氣浮仙掌薫風入帝梧韓偓詩露和玉屑金盤冷月射珠宫貝闕寒張九齡詩仙掌明璣入露盤李商隠詩仙人掌冷三霄露玉女窗虚午夜風楊文公詩仙盤露冷蛛絲濕綺閣香風鳳吹傳劉中山詩三闕月臨承露掌九雛烏繞守宫槐胡文恭詩金掌氣寒知露重玉壺聲近覺天低夏英公詩沆瀣氣凉仙掌迥滿盤清露結朱英又詩宫槐煙煖鶯猶睡仙掌雲寒露未晞盧轅詩樹揺仙掌露庭接玉樓隂緯略卷九
