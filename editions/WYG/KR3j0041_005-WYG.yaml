body:
  text: 緯略卷五宋髙似孫撰黄銀太宗賜房𤣥齡黄銀帶顧謂𤣥齡曰昔如晦與公同心輔政今日所賜獨見公因泫然流涕程氏繁露以為黄銀者果何物鍮石属其殆鍮石也余攷之若以鍮為帶而賜大臣何足貴者按禮斗威儀曰君乗金而王則黄銀見當是瑞物北史辛公義為牟州刺史時山東霖雨自陳汝至於滄海皆苦水災境内大麥獨無所損山産黄銀獲之以獻益知其為異物又虞世南書夫子廟堂碑太宗賜之王羲之黄銀印一枚有表以謝若以黄銀為鍮是恐不然按唐書髙宗上元元年詔九品服淺碧竝鍮石帶八胯唐固自有鍮帶也又按唐慎微證􅁼本草載霞子曰丹砂伏火化為黄銀能重能輕能神能靈唐日華子論曰銀凢十七品水銀銀白錫銀曽青銀土碌銀生鐡銀生銅銀硫黄銀砒霜銀雄黄銀雌黄銀鍮石銀惟有至藥銀山澤銀草砂銀丹砂銀黑鉛銀五者為真餘則假也本草曰丹砂雄黄雌黄皆殺精魅所謂黄銀者非丹砂銀即雌黄雄黄銀也太宗賜帶之時如晦已死故帝曰黄銀鬼神畏之也顯慶中監門衞長史蘇恭撰唐本草其中稱黄銀作器辟惡益知黄銀為瑞物也方勺泊宅編曰黄銀出蜀中南人罕識朝散郎顔京監在京抵當庫有以十釵質錢者其色黄與上金無異上石則正白此説尤分明玉剛卯陳簡齋以玉剛卯壽向薌林詩曰仲冬吉日風穆氣休我出剛卯以壽元侯祝融之玉奠此離方元侯佩之如玉之剛攘蠲厲㓙以廸明王南門不鍵有室剛强三肅元侯既贈既禱曷以報我當以剛卯剛卯佩印其製外方内圓以正月卯日作銘刻於上以辟邪厲詳見王莾傳及後漢輿服志簡齋詩十六句每句四字皆如剛卯之銘銘之文曰帝令祝融以教䕫龍庶疫剛癉莫我敢當説文殳類釋㱾改曰大剛卯也以逐精鬼從殳亥聲攴類釋㱾改曰大剛卯以逐鬼鬽也音義如魅从攴已聲讀若已然則一名而異製也金鋪通俗文曰門首飾謂之鋪首風俗通曰門戸鋪首揚雄甘泉賦曰排玉戸而揚金鋪兮發蘭蕙與芎藭是也説文曰門扇鐶謂之鋪首李尤平樂觀賦曰過洞房之輔闥歴金鐶之華鋪是也通俗文又引百家書曰輸般見水上蠡謂之曰開汝頭見汝形蠡適出其頭般以足畫圖之蠡引閉其戸終不可開設之門戸欲使閉藏如此固宻也義訓曰門飾金謂之鋪鋪謂之鏂音歐今俗謂浮漚釘者也劉孝威詩金鋪玉鏁琉璃扉花鈿寳鏡織成衣江總詩兎影脉脉照金鋪虬水滴滴瀉玉壺沈佺期詩梅樓翠幌教春住舞閣金鋪借日懸齅金異物志曰狼㬻民與漢人交關常夜市以鼻齅金知其美惡王建詩生金有氣尋還逺仙藥成窠見即移金若有氣誠可齅矣賛寧物類相感志曰山石盛夏必汗出赤黄者金汗白辛者銀汗地鏡圖曰凢觀金玉寳劍皆以辛日平旦或黄昏夜半觀之物類相感志又曰嗅金獸生瀛洲山状如麒麟不食惡卉不飲濁水嗅石知有金玉吹開則金璞燦然可用獸尚有嗅金者而况人乎瑟瑟程氏繁露援唐語林盧昻主福建監鐡有瑟瑟枕大如斗憲宗召估其直曰至寳無價或云美石非瑟瑟今世所傳瑟瑟或皆鍊石為之也按明皇雜録上於華清宫置長湯數十間屋以銀鏤漆船飾以珠玉又於湯中壘瑟瑟其言壘者當是珠類非石也又按虢國夫人奪韋氏宅造中堂既成召匠圬墁授二百萬償其直復賞以金杯二瑟瑟三斗其以斗計為珠明矣物類相感志曰唐懿宗賜公主瑟瑟幕紋如碧絲貫以真珠則是珠類尤明矣杜詩石笋行雨多往往得瑟瑟此事恍惚難明論注曰雨過人多得瑟瑟按博雅曰瑟瑟碧珠也杜陽雜編曰瑟瑟幕寰宇記曰瑟瑟窟在陜州平陸陳陶詩瑟瑟盤輕促世珠黄泥局瀉流年箭孫何上王翰林詩猩猩箋寫宫詞濕瑟瑟函盛手詔香益知其為珠類也宋景文公詩踏溪分藕養新荷鈿蓋斜臨瑟瑟波又言其色之美也藻井西都賦曰蒂一作蔕倒茄於藻井披紅葩之狎獵魏都賦曰綺井列疏以懸蔕注曰疏布也以板為井形飾以丹青如綺也王延壽魯靈光殿賦曰圓折方井交植荷蕖緑房紫葩一作菂咄咤垂珠左思魏都賦曰綺井列疏以懸蒂華蓮重葩以倒披曹植七啓曰綺井含葩金璧玉箱顔延之七繹曰木寫雲氣土秘椒芳既挺天而倒井又斵圓而鏤方古人形容木工必言藻井者若此風俗通曰殿堂象東井形刻作荷菱水物所以厭火也沈存中筆談曰屋上覆橑古人謂之綺井亦曰藻井又謂之覆海今墳中謂之闘八吳人謂之罳項頂唯宫室祠觀謂之藻井即天花板也雁塔西京記曰隋無漏寺在長安唐武德初廢正觀十二年髙宗在春宫為文德皇后立寺於故基以慈恩為名西院浮圖髙三百尺永徽五年沙門元楚所立國人謂之雁塔塔在長安朱雀街東第二街自北次南第十五坊南臨黄渠木竹隂翳最於京師沈佺期詩雁塔丹青古龍池嵗月深即此唐故事進士及第列名於慈思寺塔謂之雁塔題名塔以石為壁唐人遊觀留題甚多不特進士題名而已塔屢遭火㫁石遺字猶有存者故裒其餘字鐫之石凢十卷進士題名僅存數處餘皆唐賢遊觀留題耳劉公嘉話曰慈恩題名起於進士張莒遊寺中題其姓名于塔下遂為故事錢希白南部新書曰李肇初及第題名於此李肇國史補曰進士既㨗列名于寺謂之題名本朝進士題名皆刻名於相國興國兩寺蓋效慈恩也璜傅𤣥歌詩曰有所思兮在天一方何以贈之玉珮珠璜此學四愁體也楚辭曰璜臺十成誰可極焉王逸注曰璜石次玉也然周分魯公以夏后氏之璜杜預注曰璜美玉名按周官以𤣥璜禮北方則璜之色𤣥矣説文以璜為半璧吕尚父釣磻谿之涯得玉璜當是古人服用之遺也宋向魋出奔衛公父文伯攻之求夏后之璜與之他玉而奔齊則夏璜固在衞矣文中子曰夏后之璜不能無纇淮南子曰夏后氏之璜不能無考考者瑕也辟邪研匜古銅水滴色如漆状極精古舊物也頭有兩角口銜匜按孟康曰桃枝一名符枝似鹿長尾一角者為天禄兩角者為辟邪此為辟邪也沈文通集有天禄研匜詩張君贈我古研滴四脚爬沙角如㦸􅁏翼絡髀老獸姿世不能名眼未識我知此為天禄兒口銜一寸黄金匜蟾蜍嚼月兩吻坼天鯨胸宂雙泉飛玉聲琮琤珠迸落影射巖石光瀺灂未央書殿立髬一作髵曽見揚雄老投閣子孫晩出中平間渇烏翻車灑平洛宗資墓口卧露霜頭角頓挫仍騰攫爾來拂拭傍几案眉目睢盰苔蘚剥形模不入世俗用疑付大手傳糟粕未能㸃綴清廟頌開闢大易摛春秋就令闕五字末勢猶足為遷彪物無貴賤繫所用千金乞我直暗投圖書散落愈闕下晩嵗惟有虀鹽謀學注蟲魚問老圃無乃塌颯為匜羞養和程氏繁露載李泌訪隠選異采恠木蟠枝以隠背號曰養和人至于今效之余按皮日休以五物送毗陵處士魏不琢其一曰烏龍養和且曰有桐廬養和一恠形拳跼坐若變去謂之烏龍養和皮陸皆有詩皮詩壽木拳數尺天然形狀幽把疑傷虺節用恐被蛇瘤置合月觀内買湏雲肆頭料君攜去處煙雨太湖舟龜蒙詩養和名字好偏寄道情深所以觀逋客兼能助五禽倚肩滄海望鈎膝白雲唫不是逍遥侶誰知物外心太𤣥經先儒注太𤣥經每首之下必列二十八宿蓋周天二十八宿三百六十五度四分度之一太𤣥經凢七百二十九賛乃此數也以七百二十九賛分而為二合三百六十四度有半宜若不相應子雲本意以為其半不可合也故踦賛贏賛以應周天之數漢之正統以象數也莽之僣竊迺閏位也故先儒於踦賛贏賛之下注以為水火之閏王莽傳賛所稱餘分閏位者謂此書訛王嘉封事曰臣聞咎繇戒帝舜曰亡傲佚欲有國兢兢業業一日二日萬㡬師古曰虞書咎繇謨之詞也言有國之人不可傲慢佚欲但當慎懼以理萬事之㡬也敖音傲今尚書作無教逸欲有邦教字訛寫作敖字為曉然矣書序曰科斗書廢已久時人無能知者為𨽻古定更以竹簡寫之所以易訛也劉貢父曰武成一篇簡册錯亂兼有亡逸今次定之予小子其承厥志以下武王之誥末終當有百王受命之語計脱五六簡矣然後迺接以偃武修文云易文言易曰元者善之長也左傳曰元者體之長也易曰嘉㑹足以合禮左傳曰嘉德足以合禮善之與體會之與德其字不同其義則别易之文言以為孔子所作然孔子生於襄公二十二年史作此筮乃襄公九年二語蓋在孔子之先也十五國風一十五國風獨無宋魯或曰孔子之先宋人也魯父母之邦也為尊者諱親者諱不列二國於變風之次且孔子生於襄公二十二年至二十九年季札來聘是年孔子生八嵗季札請觀周樂為之歌周南下至曹風凢十五國正與今之詩一同未嘗有宋魯也宋魯不在變風之列其來乆矣自周南至於齊八國與今之次序同自􅃎風至曹風七國與今之次序異蓋當時魯國之序如此熟攷史記左氏可以言詩矣十五國風二十五國風次序或曰王黍離在􅆁鄘衛之後天子安得居諸侯後蓋存二代之後也周滅商分其畿内為三國􅆁鄘衛也紂城以北謂之􅆁南謂之鄘東謂之衛故以封紂子武庚也鄘管叔尹之衛蔡叔尹之以監商民謂之三監三監叛周公誅之盡以其地封康叔故􅆁詩十九篇鄘詩十篇衛詩十篇共三十九篇皆衛詩也序詩曰以其地本商之畿故在於王黍離上列為三國而不獨謂之衛也嘯嘯十五章一曰權輿嘯之始也二曰流雲三曰深溪彪四曰髙桞蟬五曰空林夜鬼六曰巫峽猿七曰下鴻鵠八曰古木鳶九曰龍唫十曰動地十一曰蘇門孫登隠蘇門山所作也十二曰劉公命鬼仙人劉根所作也十三曰阮氏逸韻阮籍所作也十四曰正章深逺極大非常聲也十五曰畢音五音之畢而大道畢矣異苑又炙轂子晉成公綏嘯賦曰精性命之至機妍道德之𤣥奥邈跨俗而遺身迺慷慨而長嘯逍遥攜手踟蹰歩趾發妙聲於丹唇激哀音於皓齒響抑揚而潜轉氣衝鬱而熛起協黄宫于清角雜商羽於流徵飄游雲于太清集長風乎萬里諒自然之至音非絲竹之可擬阮籍遊蘇門山山有隱者莫知其姓名有竹實數斛杵臼而已籍從之與談太古無為之道五帝三王之義蕭然曽不經聽籍迺對之長嘯清韻響亮蘇門生迺逌爾而籍既降蘇門生亦嘯若鸞鳳之音桓𤣥與袁宜都書論嘯曰讀卿歌賦序詠音聲皆有清味然以嘯為彷彿有限不足以致幽㫖将未至耶夫神契之音既不俟多贍而通其致茍一音足以究清和之極阮公之言不動蘇門之聽而㣲嘯一鼓𤣥黙為之解顔若人之興逸響惟深也哉袁崧荅書曰嘯有清浮之美而無接引之深歌窮淵根之致用之彌覺其逺至乎吐詞送意曲究其奥豈唇吻之切發一性之清泠而已哉若夫阮公之嘯蘇門之和蓋感其一竒何為徵此一至大疑嘯歌所拘耶詩曰其嘯也歌袁崧所用嘯歌迺詩中字也雜字解詁曰嘯吹聲也説文曰嘯吟也載事物之法書顧命狄設黼扆綴衣狄下士扆屏風畫為斧文置户牗間復設幄帳象平生所為牗間南向敷重篾席黼純華玉仍几篾桃竹枝白黑雜繒縁之華采色華玉以飾慿几仍因也因生時几不改作此見群臣覲諸侯之坐西序東向敷重底席綴純文貝仍几東西廂謂之序底篛萍綴雜采有文之貝飭几此旦夕聽事之坐東序西向敷重豐席􅀞純雕玉仍几豐莞采色為畫雕刻鏤此養國老饗群臣之坐西夾南向敷重筍席𤣥紛純漆仍几西廂夾室之前筍篛竹𤣥紛黒綬此親屬私宴之坐故席几質飭越玉五重陳寳於東西序坐北列玉五重又陳先王所寳之器物赤刀大訓𢎞璧琬琰在西序寳刀赤刀箾大訓虞書典謨大璧琬琰之珪為二重大玉夷玉天球河圖在東序三玉為三重夷常也球雍州所貢河圖伏羲氏王天下龍馬出河遂則其文以畫八卦謂之河圖與典謨皆厯代寳傳之𦙍之舞衣大貝鼖鼓在西房𦙍國所為舞者之衣皆中法大貝如車渠鼖鼓長八尺商周傳寳之西房西夾在東兊之戈和之弓垂之竹矢在東房兌和古之巧人垂舜共工所為皆中法故亦傳寳之東房東廂夾室大輅在賔階面綴輅在阼階面大輅玉綴輅金面前階南向先輅在左塾之前次輅在右塾之前先輅象次輅木金玉象皆以飭車木則無飭皆在路寝門之内左右塾前北面几所陳列皆象成王生時華國之事所以重顧命二昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下於周為睦分魯公以大輅大旂夏后氏之璜封父之繁弱殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族将其類醜以法則周公用即命於周是使之職事于魯以昭周公之明德分之土田陪敦祝宗卜史􅍯物典策官司彞器因商奄之民命以伯禽而封於少皥之墟分康叔以大輅少帛綪茷旃旌大吕殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟取於有閻之土以共王職取於相土之東都以㑹王之東蒐􅆅季授土陶叔授民命以康誥而封於殷虚皆啓以商政疆以周索分唐叔以大路宻湏之鼓闕鞏姑洗懐姓九宗職官五正命以唐誥而封於夏虚啓以夏政疆以戎索玉窪俗説曰毛㤗買一玉窪八十八萬玉窪二字竒甚當是酒器也古人詩中及酒器者如曹植詩玉樽列廣庭又樂飲過三爵沈約詩玉罍信湛湛又金缾汛羽巵許渾詩晩促離筵醉玉缸伊州一曲淚雙雙後漢辛延年詩就我求清酒絲繩提玉壺李賀詩玉罌汲水桐花井絲蒨沉水如雲影王建詩月似圓來色漸凝玉盆盛水欲侵稜以上所用皆以玉為皿者皆不及玉窪二字殊未經用也佛鉢西域諸國志曰佛鉢在乹陁越國青玉也受三升許彼國寳之供養乞願終日花香不滿則如言也滿亦如言也皮日休有佛鉢詩帝青玉作緑冰姿佛律云此鉢帝青玉石也四天王所獻也曽得金人手自持拘律樹邊齋散後提羅花下洗來時乳麋味㫁中天覺麥麨香消大刼知從此共君親頂戴斜風應不等閑吹陸龜蒙詩空王初受逞神功四鉢湏㬰現一重至今鉢縁有四重也持次想添香積飯覆時應帶歩羅鍾光寒好照金毛鹿響静堪􅑙白耳龍從此寳函香裡見不煩西去詣靈峰皮日休詩序曰按釋法顯傳云佛鉢本在毗舎離今在乾陁衛竟若干百年當復至西月支國若干百年至于闐國若干百年當至屈茨國若干百年復來漢地晉建興二年二聖像浮海而至滬瀆僧尼輩取之以歸今存于開元寺後建興八年漁者於滬瀆沙汭上獲之以為臼類乃葷而用焉俄有佛像見於外漁者始以為異意滬瀆二聖之遺祥也迺以鉢供之迄今尚存紫團參參花蜜皮日休謝友人惠人參詩神草延年出道家神草别名是誰披露記三椏開時的定涵雲液斸後還應帶石花名士寄來消酒渇野人煎處撇泉華從今湯劑如相續不用金山焙上茶陸龜蒙和之曰五葉初成椵樹隂紫團峰外即雞林名參鬼蓋湏難見材視人形不可尋品第已聞升碧簡攜持應合重黄金殷勤潤取相如肺封禪書成動帝心紫團迺山名今人以人參有紫暈者為佳殊不然也沈氏筆談載王荆公病喘藥用紫團山人參不可得時薛師政自河東還有之贈公數兩公不受其曰紫團山者是矣王績詩家豐松葉酒器貯參花蜜參花蜜三字甚生參花人所未識温庭筠詩松刺梳空石差齒香風軟透人參蘂用參蘂字益竒蟹斷陸龜蒙蟹志曰稻之登也率執一穗以朝其魁然後任其所之蚤夜嘈沸指江南而奔漁者緯蕭承其流而障之名曰蟹斷斷其江之故道焉耳蟹志蟹斷四字皆竒吳都記曰江濵漁者揷竹繩編之以取魚謂之扈業亦是類也孟浩然詩鳥泊襄陽雁魚藏縮項鯿又曰試垂竹竿釣果得槎頭鯿又云土毛無縞紵鄉味有槎頭杜詩復憶襄陽孟浩然清詩句句盡堪傳即今耆舊無新語漫釣槎頭縮項鯿按杜田作杜詩補遺正槮曰槎頭一説為襄陽郡地名一説為釣磯上枯木曽緯曰非也爾雅曰槮謂之涔槮音滲孫炎釋曰積柴木水中養魚槮為槎頭言所積柴木槎枒然也宋景文公詩煙原射雉樂春槮養魚肥蓋用槮字又按習鑿齒襄陽耆舊傳曰漢水中鯿魚甚美常禁人捕以槎斷水因謂之槎頭鯿宋張敬兒為刺史作六櫓船置獻齊髙帝曰槎頭縮項鯿一千八百頭以槎斷水者即龜蒙所謂斷也賦句相埒丹甑玉燭蓂莢芝房唐人慶雲抱日賦失姓名銀甕金船山車澤馬庾信賦秦雲動色渭水躍波喬潭裴将軍舞劒賦洞庭安波楚山霽色錢起洞庭張樂賦下語有此相埒者温庭筠湖隂曲曰呉波不動楚山晩花壓闌干春晝長以賦中八字之意為詩一句尤為警㧞芍藥詩溱洧曰維士與女伊其相謔贈之以芍藥注曰芍藥香草也陸璣詩義䟽曰今芍藥無香氣非是也孔頴達亦曰未審何草皆非也牡丹古謂之木芍藥有所謂牡丹皮者宜於婦人是猶視爾如荍貽我握椒及椒聊之實蕃衍盈升也椒性温亦宜於婦人應劭漢官儀所謂以椒塗屋者取其温煖也緗素雜記曰芍藥破血令人無子所以為男滛女也椒氣下達用以養陽所以為女滛男也以為頗得詩人深意左傳申叔展曰有山蘜藭乎杜預曰芎藭所以禦濕説文曰芎藭香草藥品各有種類豈可但曰香草也晉傅綂芍藥花頌曰惟昔風人抗茲榮華蓋言花也宋王徽芍藥花賦曰惟神區之麗草兮慿厚德而挺授用麗草二字甚勝虞繁蜀葵賦曰惟茲珍草懐芬吐芳梁王筠蜀葵賦曰惟此竒草遷花西道傅咸芸香賦曰攜昵友以逍遥兮覧偉草之敷英傅𤣥宜男花賦曰猗猗令草生於中方古人好竒用字不肯蹈襲如此令草二字出楚辭也三焦彭山有隱者通古醫術與世諸醫所用法不同單驤從之學盡得其術遂有醫名於世治平中予與驤遇廣都論古今醫術同異驤既言其略復歎曰古人論五臟六腑其説有謬者而相承不察欲以告人人誰信者古説左腎其腑膀胱右腎命門其腑三焦女人以繫包以理推之當如膀胱有形質可見而王叔和言三焦有臟無形不亦大謬乎盖三焦有形如膀胱故可以藏有所繫若無其形尚何以藏繫哉其所以謂之三焦者何也三焦分布人體中有上中下之異方人心湛然慾念不起則精氣散在三焦華榮百骸及其慾念一起心火熾然翕撮三焦精氣入命門之腑輸㵼而去故號此腑為三焦耳世承王叔和之謬而不悟可為長太息也余甚異其説後為徐州從事有一舉子徐遁者石守道之壻也少嘗學醫療病有精思子為道驤之言遁喜曰齊嘗大饑群丏相臠割而食之有一人皮肉盡而骨脉全者遁以學醫故往觀其五臟見右腎下有脂膜如手大者正與膀胱相對有二白脉自其中出夾脊而上貫腦意此即導引家所謂夾脊雙關者而不悟脂膜如手大者之為三焦也單君之言與所見懸合可以正古人之謬矣龍川志略按漢白虎通情性篇曰六府者何謂也大腸小腸胃膀胱三焦膽也府者為藏宫府也故禮運記曰六情所以扶成五性也胃者脾之府也脾主禀氣胃者榖之委也故脾禀氣也膀胱者腎之府也膀胱常能有熱故先決難也三焦者包絡之府也水榖之道路氣之所終始也故上焦若竅中焦若編下焦若瀆膽者肝之府也肝者木之精也主仁仁者不忍故以膽㫁也據此則三焦有形矣位絶席張禹遷太傅每朝見特賛與三公絶席司馬彪續漢書王常為横野大将軍位次與諸侯絶席東觀漢記鄧鴻為車騎将軍位在九卿上絶席章帝以城門校尉馬防為車騎将軍位在九卿上絶席漢雜事絶席之禮漢世最以為重也諱太史公父名談史記無談字季布傳改趙談作趙同范曄父名泰後漢無泰字郭泰鄭泰皆作太字季翔父名楚金故為文皆以金為鎰韓愈為李賀作諱辯特言言在不稱徵之説故愈父仲卿未嘗諱焉曹志植之子奏議曰幹植不強不諱植字也帶甲百萬蘇秦説燕地方二千里帶甲百萬張儀説韓王曰秦帶甲百餘萬戰國策江乙對楚宣曰今王之地方五千里帶甲百萬蘇秦南説楚曰西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有汾隂郇陽地方五千里帶甲百萬春秋後語吳趙咨使魏文帝問咨吳拒魏難否咨曰帶甲百萬江漢為池何難之有晉王戎謂齊王冏曰今王帶甲百萬其鋒不可當古者捭闔之士言富國强兵者必曰有帶甲百萬事率類此緯略卷五
