body:
  text: 緯略卷十二宋髙似孫撰讀碑後漢禰衡讀蔡邕碑一覽能誦惟石缺二字不明因書出之魏王粲讀道邊碑人問卿能記乎誦之不失一字楊修從曹公讀陳寔碑既去恨不寫取修迺誦之馳使往勘惟石缺二字不同耳南齊范雲為竟陵王學士當時讀秦始皇刻石文雲誦得之張説詩會葬知元伯看碑識蔡邕習外國事漢鄭吉從軍數出西域由是為郎習外國事谷永上疏訟陳湯書奏天子出湯後西域都䕶叚會宗為烏孫兵所圍馳驛上書願發兵以自救大將軍王鳳言湯多奇䇿習外國事可問上召見湯宣室匈奴請和親上下其議大行燕人王恢為邊吏習胡事議曰漢與匈奴和親不數歳即背約不如勿許舉兵擊之趙充國好將帥之節學兵法通知四夷事黄香曉習邊事每出軍轉運調度動得事宜郭涼為將通經尤曉邊事有名北方三韓紙韓子蒼謝錢珣仲惠髙麗墨詩王卿贈我三韓紙白若截肪光照几錢侯繼贈朝鮮墨黒如㸃漆光浮水所謂三韓紙者即繭紙也宣和殿書畫磹卷盡用此紙右軍以蠒紙書蘭亭帖然晉宋自有一種紙長丈餘就船抄之謂之繭紙黄大史謝鄭閎中惠髙麗畫扇詩會稽内史三韓扇分送黄門畫省中子蒼用三韓紙盖本於此杜詩方丈三韓外崑崙萬國西東坡云潘谷作墨精妙雜用髙麗又孫莘老寄墨詩云徂徠無老松易水無良工珍材取樂浪妙手推潘翁後漢書曰韓有三種一曰馬韓二曰辰韓三曰弁韓馬韓在西有五十四國其地與樂浪南與倭接辰韓在東十有二國其地與獩貊接弁韓在辰韓之南亦有十二國其地亦與倭接凡七十八國大者萬餘户小者數千家各在山海間地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為王辰都月支國盡王三韓之地其諸國王先皆是馬韓種焉古器古人好事皆極其至如古鍾鼎彞器尤所愛尚其有識文者非獨其器可玩其文猶奇古其間有闗於考訂者所補亦不少劉禹錫詩耕人得古器宿雨多遺鏃皮日休詩室唯搜古器錢只買秋杉張籍詩每著新衣看藥竈多收古器在書樓如三公詩可見好事之至又如楊衡詩拾薪遇遺鼎探穴得古籍此又希闊之遇矣郊祀志曰汾隂得鼎大異於衆鼎文鏤無款識其所以言此者亦以款識為尚盖可考也韋昭曰款刻也師古曰識記也音式志反桂蠧南粤傳曰桂蠧一器應劭曰桂樹中蝎蟲也蘇林曰漢舊儀嘗以獻陵廟載以赤轂小車師古曰此蟲食桂故味辛漬之以蜜食之也金樓子曰翠飭羽而體分象美牙而身喪蚌懐珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠧而成疾正謂此也宋景文公詩幾枝北道梅傳信一器南方桂補羸牛膝酒酒譜曰酒多飲虚人脾氣脾主四肢久飲成疾唯酒用牛膝能補重腿輕筋骨且不失和甘之味亦飲者所宜造法每醇酒一斗用大木𤓰二疈之而實以牛膝四兩浸之以醇酒酒竭旋益俟其潰爛乃出之以熟艾末四兩同研為丸桐子大空腹下三十丸此良法也方書中絶無此方又明白簡易故采之栁書隂符經蔡端明曰栁書隂符經書之最精者善藏筆鋒余觀此書非惟栁氏筆法遒結全不類他書而此序乃鄭瀚之作尤為奇絶其曰雷雨在上與彞旁達浚其粹精流為聰明此四句精絶不似唐人詞章至曰磻谿之遇合金匱之秘奥留侯武侯思索其極尤足以發隂符之用也龜鼎孔愉獲龜放之餘干溪鑄一鼎刻之曰孔敬康沈之於水梁天監三年安豐獻一角𤣥龜武帝鑄一鼎沈於得龜處二事絶相類古今鼎録㑹稽後賢傳曰孔愉至吳興餘干亭放龜溪中龜反顧視愉及封此亭印三鑄龜首回屈如顧臧榮緒晉書曰愉鑄侯印而龜左顧更鑄亦然北齊趙儒宗龜詩儻蒙一曳尾當為屢回頭劉禹錫詩朱輪尚憶羣飛雉青綬初懸左顧龜陸龜蒙詩鵲銜龜顧妙無餘不愛封侯愛石渠王仲修送越帥程公闢詩一麾召得山川勝金鈕新提左顧龜殊不言鼎也崑崙丘賛郭璞崑崙丘賛曰崑崙月精水之靈府惟帝下都西羌之宇嵥然中峙號曰天柱前四語殊清壯所謂丘者按大荒西經曰赤水之後黒水之前有大山曰崑崙之丘所謂惟帝下都者按搜神記曰崑崙之山是惟帝之下都其曰崑崙月精水之靈府者按史記曰河出崑崙崑崙其髙二千五百餘里日月所相避隠為光明也其上有醴泉瑶池今自張騫使大夏之後窮河源惡覩所謂崑崙者乎又河圖曰崑崙之墟五城十二樓河水出焉爾雅曰西北之羌有崑崙之墟其曰西羗之宇亦其墟也龍魚河圖曰崑崙山天中柱也故曰磔然中峙號曰天柱郭璞之文精切如此一一皆援据文章而欲茍作難哉葛仙公傳曰崑崙一曰𤣥圃一曰積石瑶房一曰閬風臺一曰華盖一曰天柱仙人所居也砥柱銘水經注曰砥柱山名也禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱魏徴有砥柱銘其壯語僅曰傍臨砥柱北眺龍門茫茫舊迹浩浩長源黄太史曰吾愛魏公之為人故其作砥柱銘時為好事者書之忘其文之工拙然九成宫醴泉銘亦魏公之文也其曰東越青齊南踰丹徼獻琛奉贄重譯來王西暨輪臺北拒𤣥圃地列州縣人充編户又曰雲氏龍官龜圖鳳紀日含五色鳥呈三距頌不輟書筆無停史亦壯語也秋蘭秋蘭古人最所鍾愛一經靈均風騷之士競知慕焉九歌曰秋蘭兮蘼蕪羅生兮堂下緑葉兮素華芳菲菲兮襲予又曰秋蘭兮青青緑葉兮紫莖張衡思𤣥賦曰紉幽蘭之秋華東京賦曰芙容覆水秋蘭被涯魏武帝陌上桑曰柱杖桂枝佩秋蘭曹植迭迷香賦曰芳暮秋之幽蘭兮麗崑崙之英芝又詩繁華將茂秋霜悴之君不垂眷豈云其誠秋蘭可喻桂樹冬榮又詩秋蘭被長坂晉傅𤣥秋蘭篇秋蘭隂玉池池水芳且香又詩秋蘭豈不芬鮑肆亂其芳𤣥鼓吹曲又曰謀言協秋蘭清風發其芳陸機詩氣惠秋蘭闕潘尼詩流聲馥秋蘭一秋蘭之微而詞人眷眷如此是亦懐貞挺秀可以比徳歟比從永嘉移本大略如蕙擢花八九月之交香特重於春蘭也巫咸山賦巫咸堯之醫者郭璞巫咸山賦曰爾乃寒泉懸涌浚湍流帯林薄叢蘢幽蔚隠藹十六字奇甚右軍蘭亭記曰此地有崇山峻嶺茂林修竹又有清流激湍映帶左右晉人文章清暢如此宋支曇諦廬山賦曰南面巍崛北背􅣖蔕懸霤分流以飛湍七嶺重㟽而疊勢殊不及其從容自在也禡牙後漢滕輔祭牙文曰推轂之任實討不庭天道助順正直聰明晉袁宏祭牙文曰天生五材治道所司廢一不可静亂輔時晉顧愷之祭牙文曰烈烈髙牙闐闐伐鼓白氣經天簡揚神武宋王誕祭牙文曰敬建崇牙顯兹威靈鳴金輟釁無戰有寧宋鄭鮮之祭牙文曰崇牙肇建義鋒增厲人鬼一揆三才同契其文五家渉漢晉宋皆曰祭牙耳唐萬歳通天二年清邊道大總管建安郡王攸宜始有禡牙文曰旄頭首建將士聽誓星辰彗掃永清朔裔禡牙見於此文尾曰急急如律令元和十年東川移鼔角樓亦有禡角文曰整齊三軍以時鏗􅗟吹撃雷動一方風闕七字用和於聲然則角亦有禡祭之禮聲類曰禡師闕三字引是類是禡曰師祭也吳胡綜有黄龍大牙賦曰狼弧垂象實惟兵精聖人觀法爰求厥成明明大吳制其神軍取象太乙五將三門數語亦佳漢武北伐作太乙鋒旗所謂取象太乙亦凖此也衛夫人杜詩學書初學衛夫人但恨無過王右軍盖謂夫人善鍾繇書法能正書王逸少師之殊不知夫人為誰也按衛夫人衛姓名鑠字茂漪晉汝隂太守李矩之室也潤筆王岐公譔龎穎公神道碑其家以古書畫杜荀鶴及第時試卷為潤筆薛紹彭書米元章㑹稽公襄陽公丹陽二夫人告以智永臨右軍帖為潤筆可謂奇古之甚三十六鱗叚成式與温庭筠雲藍紙序曰予在九江出意造雲藍紙輒分送五十枚其詩曰三十六鱗充使時數篇猶得裹相思盖龍八十一鱗鯉魚三十六鱗也宋景文公詩曰君軒結戀蕭蕭馬尺素愁憑六六魚六六三十六也又詩歸從鶴翹六六間盖屬車三十六乗亦用六六字沈氏筆談曰鯉魚當脇一行三十六鱗鱗有黒文如十字故謂之鯉文從鯉文者三百六十也然井田法即以三百步為一里恐四代之法容有不相襲者隂璞曾南豐謝實録院賜研紙筆墨表曰隂山堅石之璞闕二字芳松之煙妍妙暉光水苔之質圓和正直秋兔之毫其闕于筆墨推美之辭固為精愜然隂山之璞盖用晉傅𤣥研賦曰採隂山之潛璞簡衆材之攸宜此賦之妙壓倒古今衆作正為此句第一一句之中又以潛璞二字為妙今若用堅璞或恐研有怨言李賀研詩孔研寛頑何足云亦病其堅耳曾公似未知研也青女楞嚴經曰青女者主霜雪之神也故淮南子曰秋三月青女乃出降霜雪髙誘注曰青女天神青腰玉女主天霜雪如二公皆以青女為霜雪神荆公所謂日髙青女尚横陳胡文恭公所謂青女偷飛一夜霜杜詩曰飛霜任青女亦以為霜也如梁昭明博山香爐賦曰青女司寒光翳景而已李商隠詩青女丁寧結夜霜羲和辛苦送朝陽楊文公詩九天青女霜添味五夜方諸月溜津可謂奇句艾楚辭璚蕭艾於重笥謂蘭芷之不香又曰扈服艾以盈腰兮謂幽蘭而不可佩又曰何昔日之令草兮今直為此蕭艾其意有所寓矣孔璠之艾賦乃曰貞灰與闕燼迭御芳煙與苦蘭競薫是以艾正而賤蘭妖而珍故言堯則桀對舉蘭則艾因是盖與騷相反其亦不為無意也璠之又有艾賛曰藹藹靈艾蔚彼修坂混區羣卉理深用逺何其拳拳於艾如此邪太史圖法夏太史終古見桀惑亂出其圖法奔商殷内史向執見紂愈亂以其圖法歸周按左氏所謂太史辛甲闕四字史此天子史官也至於諸國亦各有史如所謂太史克者魯史官也太史書者晉史官也左史者楚史官也史嚚者齊史官也命太史伯石者鄭史官也史華者衛史官也至於圖法亦有國者所重沛公至咸陽蕭何獨先收秦丞相御史律令圖書呉王濬受孫皓之降收其圖籍得郡三十二縣三百一十三晉應詹為鎮南將軍督五軍事平蜀賊一無所取唯收圖書皇甫真隨慕容評攻新都一無所取唯收圖書北齊辛術平定南淮諸物一毫無犯唯收典籍晉宋齊梁時佳本鳩集萬卷餘研巖下巖石乾則灰蒼色濕則青紫色巖有兩口其中則通為一穴大者取研所自入也小者泉水所自出也故號水口即陳公密所開也岩之北壁石皆為泉水所浸岩中歳久崩摧石屑翳塞積水淺深人莫能測以是石工不復能采今欲得下岩北壁石者往往於泉水石屑中得之岩南壁石尚或可采自崇觀後亦罕得矣此北壁石盖泉生其中非石生泉中也潤可知矣雖秋冬旱乾亦常有泉珠散落如飛雨不絶北壁石眼正圓有素緑碧白黒暈十數重中復有瞳子南壁石即泉水半浸者稍不及北壁眼之暈色皆少淡上岩有三穴上穴曰土地岩以土地祠居其上故也中穴曰梅樹岩下穴今石工以為中岩者是也下穴兩口其間通為一穴皆中岩也土地岩亦有兩穴其中亦相通土地岩石色黄赤眼亦如之梅樹岩石微黄赤而帯闕七字中岩南壁與梅樹同而少勝焉北壁石眼與闕三字石相類而少劣龍岩石色深紫眼少有類中巖半邊山者半邊石山諸岩石色灰青與下岩南壁石中岩南壁石相類但眼暈少耳赤緑赤黄皆淺色不明然半邊山岩眼極多半邊山岩近南者眼大暈少北者眼小暈愈少所謂緑豆眼蚌坑石性堅頑色深紫有眼即黄白微帯青色無瞳子雖潤不發墨眼偏邪不正無暈有翳又有黄坑石與上岩石相類新坑石與半邊山石之劣者相類小湘峽在州之西四十里其石類岩石而性軟燥色深紫如蚌坑擊鮮陸賈傅曰數撃鮮師古曰鮮謂新殺之肉也數數撃殺牲牢與我鮮食書曰暨益奏庶鮮食孔氏傳曰獲鳥獸民以進食又曰暨益播奏庶艱食鮮食孔氏曰決百川有魚鼈使民鮮食之此所謂鮮者魚鼈也老子所謂治國若烹小鮮者亦魚也張華詩鷹隼始撃鷙虞人獻時鮮時鮮二字亦佳歐宋唐書仁宗詔重修唐書十年而歐陽公至分撰帝紀表志七年書成韓魏公素不悦宋景文公以所上列傳文采太過又一書出兩手詔歐陽公看詳改歸一體公受命歎曰宋公於我前輩人所見不同詎能盡如己意竟不易一字又故事修書進御唯書署官崇者是時宋公守鄭州歐公位在上公曰宋公於此日久功深我可掩其長哉宋公聞之曰自昔文人相凌掩斯事古未有也然宋公却曾自撰紀表志今其家亦有此本世人未嘗見之耳通鑑温公進資治通鑑表曰臣之精力盡于此書其與宋次道書曰某自到洛以來専以修資治通鑑為事至今八年僅了得晉宋齊梁陳隋六代以來奏御唐文字尤多託范夢得將諸書依年月編次為草卷每四十闕為一卷自課三日刪一卷有事故妨廢則追闕自前秋始刪到今已二百餘卷至大厯末年耳向後卷數又須倍此共計不減六七百卷須更三年方可粗成編又須細刪所存不過數十卷而已其費功如此温公居洛十五年故能成此書今學者觀通鑑往往以為編年之法然一事用三四處出處纂成是其為功大矣不觀正史精熟未易決通鑑之功績也通鑑采正史之外其用雜史諸書凡二百二十二家孝水潘岳西征賦曰澡孝水以濯纓嘉美名之在兹李善曰字林曰孝水在河南郡酈道元曰在河南城西十餘里按山海經曰平逢山西十里廆山其陽多㻬琈之玉俞隨之水出於其隂北流注於穀世謂之孝水善不引山海經而引字林何也九藪國語曰伯禹疏川導滯豐殖九藪洎越九原宅居九隩周禮曰揚州之澤藪曰具區荆州之澤藪曰雲夢豫州之澤藪曰圃田青州之澤藪曰望諸兖州之澤藪曰大野雍州之澤藪曰弦蒲幽州之澤藪曰貕養冀州之澤藪曰楊紆并州之澤藪曰昭餘祁爾雅曰魯有大野今髙平鉅野東北晉有大陸今鉅鹿北廣河澤秦有楊陓音迂今在扶風汧縣西也宋有孟諸今在梁國睢陽縣東北楚有雲夢今南郡華容縣東南巴丘湖是也吳越之間有具區今吳縣南太湖即震澤齊有海隅海濱廣斥燕有昭餘祁今太原鄔陵縣北九澤鄭有圃田今滎陽中牟縣西圃田澤周有焦穫音䕶今扶風池陽縣瓠中謂之十藪夫周禮國語皆曰九藪耳而爾雅之言乃曰十藪名之同者五吕氏春秋曰昭餘祁一名大昭又名漚澤周禮并州藪俗名鄔城泊按是藪自太原祁縣連延西接至此晉太康地志曰汧澤有蒲谷鄉弦中谷乃雍州之弦蒲也水經注曰汧水源出汧山蒲谷鄉弦中谷決為弦蒲藪金錯刀張衡四愁詩美人贈我金錯刀何以報之英瓊瑶續漢書曰諸侯王佩刀以黄金錯環馬戴詩飲盡玉壺酒贈留金錯刀此固用四愁事如貫休詩孤燈耿耿征婦勞更深撲落金錯刀此固言刀也劉孝威詩犀羈玉鏤鞍寶刀金錯鞘尤更説得分明前人小説乃以錯刀為新室錢文非矣又按秦嘉妻與嘉書曰今奉錯金碗一隻可以盛書水則知金錯為飾益曉然矣書中用書水二字甚佳李白詩有云琉璃硯水不及此也梁昭明詩玉樹琉璃水羽帳鬱金香此用琉璃水亦佳漢甘露鼎宣帝甘露元年於華山仙掌鑄一鼎髙三尺受四斗擬承甘露其文曰萬國伏貽長久鑄神鼎承天酒刻以小篆後漢安帝延光四年於少室山鑄一鼎其文曰承露鼎刻以小篆此猶是金人承露盤遺意也又鼎為食器如景帝中元六年鑄一鼎曰食鼎以銅金銀雜為之其文曰五熟是資君王之膳刻以小篆昭帝元年于藍田覆車山鑄羮鼎其文曰宜君王和四方調滋味闕文宣和御題曹仲元觀音像相好極莊嚴趺坐蓮花上圍以火輪左手仗劍不似世所見大士像考之乃知為如意輪觀音像唐顧况有如意輪畫賛極其瓌妙余不敢重説偈言其言曰金剛記寶鼎記佛三昧頂輪三昧闕二字等經曰蘇迷盧南有俱露州州西南面夷羅國俱尸那城南去八千由旬至于雪山兹山純白厥草肥膩髙六十由旬周二千二百拔提河在左長仙園在右清熱惱海在南跋陀海在北善法堂在上瞽龍洞在下日月迴汨在俱物羅奢半空脇是龍居此洞地堅牢恒沙諸佛成道諸所如意輪於此山間佛言毗勒那鉢奢無忘無心是離那奢多性本空是祗彌物都思觀身實相是悉那鉢多彌觀佛亦然是又問何者是陀羅尼相貌佛言空觀心無為心廣大心常住心不變異心無心無無心是恒沙諸佛摩頂密語也言在身中恐人輕教諸佛不許内外雙立非賢不轉如意輪本名少足少法也其法滿足謂之少足與夫圓滿滿願廣大大悲等慈慈觀智綱寶手千手眼得無畏清浄光除業道破諸闇無障礙無等等與夫普明慈明千光佛十億之號猶為至略浄華宿王智佛時所立名記普門願行此應見聞隨方説法法同而名異固云賢刼中千佛助化此為一佛二尊不並願為侍者寶徳佛時名安忍童子請願之後名如意輪大悲菩薩是愚於䕃界畫彼真形法華經云一華獻畫象漸見無量佛讃曰同體如來所説總持法内外雙見為普門大悲廣運無邊際已渡塵沙生滅海金剛石經賛原闕漢令甲原闕往余從胡元瑞得髙氏緯略將謀梓而不勝魚虎也遂不果謀丙午春友人姚叔祥得善本於曹能始户曹視胡本最為佳勝及能始叙來云是弱侯先生校本更知讐對之勤非復一腕也顧讀之尚有疑碍因覔得同郡項穉玉家藏本則益女史條四十三字水麝條五字漢官條三字又得江隂李貫之本則益屬車條五十七字璜條四字而胡本亦增五夜條十字其他偏旁舛誤則三本互為參定復百許字信夫他山之為玉攻也梓竟復檢是書則援證極博間質已意至於聫類集録㸃摘新麗往往多醒豁人目第自愍騷招隠八風圍碁以及氍毹禡牙之類大都全録藝文初學北堂御覽諸書無少增損則知宋世篇集不復具存適取類書誇示宏肆耳善乎陳仲醇之言曰採拾多而評議寡真足為此書照膽繡水沈士龍題緯略卷十二
