body:
  text: 緯略卷十宋髙似孫撰孝碑蔡雍題曹娥碑曰黃絹幼婦外孫虀臼魏武觀碑謂楊修曰解不修曰解魏武曰卿未可言待我思之行三十里曰吾已得之令修别記修曰黃絹色絲也絶字幼婦少女也妙字外孫女子也好字虀臼受辛也辭字謂絶妙好辭也魏武亦記之乃與修同嘆曰我才不如卿三十里世說劉長卿詩舊石曹娥篆空山禹帝祠權德輿詩黃絹碑文在青松隧路新此用黃絹二字惟劉孝綽詩孝碑黃絹女神濤白鷺翔此二句妙甚用孝碑奇特人所不致思也守庚申唐時衣冠往往守庚申如皮日休白樂天諸公是也道士程紫霄有朝士夜會終南太乙觀拉師同守庚申師作詩曰不守庚申亦不疑此心良與道相依玉皇已自知行止任汝三彭說是非洛中記異三尸上尸青姑伐人眼中尸白姑伐人五臟下尸血姑伐人胃命又曰一居人頭令人多思欲好車馬一居人腸令人好飲食輕恚怒一居人足令人好色喜殺凡庚申日三尸言人過古語云三守庚申三尸伏七守庚申七尸滅酉陽雜俎甲子庚申是中鬼録闕青闕躁穢之日夫婦不可以同席當清齊不寢真誥鳳尾諾笠澤叢書有說鳳尾諾齊髙帝使江夏郡王學鳳尾一學便工帝以玉騏驎賜之蓋諸侯箋奏皆批曰諾諾字有尾若鳳焉蓋花書也有持二畫求售乃楊妃並馬上馬圖題陳宏二字筆力甚清壯又如有兩墨跡如飛燕狀全類鳳尾者殊不可曉徐考之乃江南李王花書陳宏者會稽人天寶間妙於畫嘗寫明皇御容與太真二圖筆墨之妙不可贊嘆韓子蒼詩翠華欲幸長生殿立馬樓前待貴妃尚覓君王一回顧金鞍欲上故遲遲即此二圖也蔡天啓集中亦有此詩程子山題宋㬇景晉待制所藏陳宏畫明皇太真聮鑣圖太真上馬圖詩並轡春風禁籞逰外間底事上心頭騎驢後日嘉陵道料得君王始欲愁阿環百巧専恩寵自是三郎騃不知上馬未應渾乏力要回一顧特遲遲余所得二圖即此本也氷蠶王貞白寄鄭谷詩曰火鼠重燒布氷蠶獨繭絲直須天上手裁作領巾披陳標詩吳女秋機織曙霜氷蠶吞線月盈箱皮日休詩毫端白獺脂猶濕指下氷蠶子欲飛樂府雜録曰康老子嘗買一舊錦褥有波斯見之乃曰此氷蠶絲所織暑月陳于座則滿室清涼王子年拾遺記曰東海圓嶠山有氷蠶長七寸有鱗角以霜雪覆之始為繭其色五采織為文錦入水不濡入火不燎青雲干吕漢武帝時西域逺夷來貢云常占東風入律百旬不休青雲干吕連月不散意中國有好道之君故搜奇藴而貢神香步天林而清猛獸乘毳車以濟弱淵䇿驥足以度飛沙十洲記唐清邊道大總管建安郡王攸宜禡牙文曰青雲干吕白環入貢蓋用此唐人曾以此命題試進士令狐楚詩郁郁復紛紛青霄干吕雲王履貞詩異方占瑞氣干吕見青雲娘子兵平陽公主聞髙祖起義兵太原乃招集亡命以迎軍時號娘子兵劉餗隋唐嘉話尉遲乙僧畫平陽公主像據鞍佩櫜鞬唐初奇筆畫馬尤精好在韓幹上比干墓銘唐開元中偃師人耕地得古銅盤篆奇古其文曰右林左泉後岡前道萬世之寧于焉是寶考之圖經乃比干墓銘東皋雜記蘭亭續帖賜書堂帖皆有此篆水麝天寶中虞人獲水麝臍香皆水也每取以針刺之香氣倍于肉麝出芻香後譜辟寒香漢武時外國貢辟寒香室中焚之雖大寒人必減衣徐鉉述異記魏明帝時昆明國貢嗽金鳥飼以真珠飲以龜腦常吐金屑如粟鳥性畏寒處之小室水精為户內外通光名辟寒臺宫人以鳥吐金飾叉謂之辟寒金洞冥記許渾詩還磨照寶鏡猶插辟寒金唐交趾國進犀一株以金盤置于殿中暖氣襲人使者曰此辟寒犀也王仁裕開元天寶遺事李商隱詩有云犀辟塵埃玉辟寒則玉亦辟寒矣唐東夷所貢之玉長尺數寸積之可以燃鼎置之室中不復挾纊當是此玉也又有却寒鳥者唐懿宗朝賜公主出降簾云是此鳥骨織簾紫色而斑若玳瑁懸簾則暖物類相感志史叙事晉張輔曰司馬遷叙三千年事五十萬言班固叙二百年事乃八十萬言自昔史氏所書兩人一事則曰語在某人傳晉書載王隱諫祖約奕棊一段幾二百字兩傳俱出此為文煩矣孔氏雜說䭅餅人呼胡餅為鶻餅胡骨切又呼為䭅餅户烏切然䭅字從食從固王乂注曰䭅餅也今所謂䭅餅者即此義此字也釋名曰餅并也搜掇麵使合并也胡餅言以胡麻著之也崔鴻前趙録曰石季龍諱胡改胡餅曰麻餅晉書曰王長文在市中囓胡餅肅宗實録曰楊國忠自入市衣袖中盛胡餅緗素雜記曰張公所論有鬻胡餅者不曉名之所謂易其名為爐餅以為胡餅者胡人所啖故曰胡餅也趙毅大業雜記曰隋髙祖意在忌胡器物涉胡言者咸令改之胡床曰交床胡荽曰香荽胡瓜曰黃瓜然江都執帝者乃令狐行達也滕王蛺蝶圖王建宫詞內中數日無呼喚寫得滕王蛺蝶圖酉陽雜俎曰滕王畫蝶圖有數名江夏班大海眼小海眼村裏來菜花子唐藝文志有滕王蛺蝶圖二卷滕王名元嬰髙祖子又有嗣滕王湛然畫蜂蟬燕雀能巧之外曲盡情理唐名畫録後山賦宗室畫詩滕王蛺蝶江都馬一紙千金不當價用事精也七入書府徐堅多識典故七入書府大唐遺事應璩百一詩問我何功德三入承明廬蘇頲詩最榮三入地還美再來時宋之問詩三入文史林再拜神仙署此用承明三入事耳况七入書府乎馬融以通博三入東觀亦非可及也爾雅爾雅注今所傳者郭璞孫炎耳所謂樊光爾雅注李巡爾雅注沈璇爾雅集注已不可復見郭璞有爾雅圖江灌有爾雅圖贊皆奇書是亦不減山海經圖也張揖既作博雅劉伯莊又有續爾雅草木蟲魚該括略盡選中惟郭璞特注上林賦張揖又注之他人不及其精確也其他所謂孝經爾雅石經爾雅蜀爾雅蕃爾雅小爾雅皆自成一書也滕六降雪晉州刺史蕭至忠將以臘日畋游有樵者于霍山見一長人俄有彪兕鹿豕狐兔駢匝長人曰余𤣥冥使者奉北帝命臘日有蕭使君畋獵汝等若干合鷹死若干合箭死有老麋屈膝求救使者曰東谷嚴四善謀羣獸從行薪者隨覘之茅堂中有黃冠一人老麋哀請黃冠曰若令滕六降雪巽二起風即蕭使君不復獵矣薪者回未明風雪蕭使君果不出此雪中故事之奇詭也夫有所謂豐隆屏翳則滕六巽二固為神矣以巽二為神尤曉然神仙感遇傳曰葉仙韶遇雷神授以墨篆曰行之可以致雷立功救人吾兄弟五人要聞雷聲但喚雷大雷二此曰雷大雷二則雪可滕六風可巽二矣答客難東方朔答客難揚雄解嘲班固賓戲崔駰達㫖崔實答議蔡雍釋誨陳琳應議皆出于客難而作然其雄放豪特皆不能及也紅靺鞨文與可朱櫻歌金衣珍禽弄深樾禁籞朱櫻斑若纈上幸離宫促薦新藤籃寶籠貂璫發凝霞作丸珠尚軟滴露成津蜜初割君王日午坐猗蘭翡翠一盤紅靺鞨此歌最稱奇絶然靺鞨二字人少用按唐寶記曰紅靺鞨大如巨栗赤爛如朱櫻視之如不可觸觸之甚堅不可破施此事于櫻桃尤為奇切不讀寶記未知文公用事之妙也王元之櫻桃詩磊落火齊珠參差珊瑚叢便不及南史曰天竺國出火齊狀如雲母色如紫金有光耀别之則如蟬翼積之則如紗縠之重沓王子年拾遺記曰董偃常卧延清之室設火齊屏風張衡西京賦曰翡翠火齊絡以美玉集韻曰琉璃火齊珠說文曰火齊玫瑰也乾坤一彈丸蔣潁叔觀太史局銅渾儀詩日月雙連璧乾坤一彈丸彈丸字出孔頴達曰天包地外猶雞卵之裹黃圓如彈丸然漢書曰日月如連璧耳連璧二字出易坤靈圖曰至德之明日月若合璧余愚見用日月雙旋蟻對之亦佳旋蟻二字出抱朴子曰天圓如蓋地方如棊局天闕文七字蟻行磨上磨左旋蟻右去磨行速蟻不得已闕文五字對彈丸尤妙水精如意李商隱詩水精如意玉連環下蔡城危莫破顔吳孫和悅鄧夫人常置膝上弄水精如意誤傷夫人頰醫和白獺髓雜玉琥珀屑為粉傅之瘡滅頰上猶有赤㸃如痣視之益妍媚商隱詩正用此東坡梅花詩檀心已作龍涎吐玉頰何勞獺髓醫亦用此也北風圖漢桓帝時劉褒畫雲漢圖見者皆熱又畫北風圖見者復寒博物志隋朝官本有衛協畫北風圖一卷不復有漢人之筆矣然古人多好以詩為圖陸探微有新臺圖衛協又有黍離圖司馬昭又有豳風七月圖戴安道作南都賦圖人尚以為有益而况以詩為圖乎藝臺傅亮詩柔荔迎時萋芳藝應節馥庾信詩藝香上筵閣碑石向鴻都崔備詩舊帙藝香在空奩藥氣餘周朴詩金馬門前馬藝香閣上香按魚豢典略曰藝香草也辟紙蠧魚藏書臺稱藝臺藏書閣稱藝閣已上四詩皆言香也許慎說文曰藝似苜蓿雜禮圖曰藝即蒿也葉似邪蒿香美可食今江東人茹為生菜甚香古之祕閣以辟書魚徐陵謝饌啓陳徐陵謝敕賜祀三皇五帝饌餘啓曰井泉之殿舊禮羲軒長樂之宮本圖堯舜東京晚世曠代無聞西漢盛儀復覩今日金壺流十旬之氣玉案備千品之羞昔絳羅為薦既延王母紫蓋為壇允招太乙同斯美號理致衆皇臣以餘年預陪清祀如登瑶席遂飲瓊漿如陵啓所云則武帝井泉之祀不止太乙文帝時詔繪古帝王名臣像於殿壁又漢明帝好畫别立畫官詔博洽之士班固賈逵輩取經史事畫之起伏羲凡五十謂之畫贊此所謂長樂之宮本圖堯舜也金仙氏楊文公龍泉金沙塔院記曰金仙氏之教有自來矣身毒之國紀于山經竺乾之師聞于柱史西京名將得休屠祭天之神東漢諸王為蒲塞桑門之供道之行也源逺乎哉此可謂善用事最是山海經老子二事古今人皆不曾用昭華玉帝堯見舜于二宫而問政試以五典舜遂舉八凱使佐后土以揆八事八元使布五教于四方舜有大功二十堯乃賜舜以昭華之玉老而命舜代以攝政昭華玉者律琯也又曰昭華管秦府庫中玉笛也長二尺三寸六孔吹之則見車馬山林隱鱗相次息並不復見其上銘曰昭華之管博物志庾信詩更愛昭華玉還披蘭葉圖胡文恭詩仙致昭華玉神來弱水香唯夏英公詩延喜靈圭上昭華瑞琯中乃用琯字也車渠碗魏文帝車渠碗賦曰料珍怪之上美無兹碗之獨靈包華文之光麗發符采而揚榮王粲車渠碗賦曰挺英才於山嶽含隂陽之淑貞光清朗以內曜澤溫潤而外津曹植車渠碗賦曰惟斯碗之所生于涼風之峻湄隱神璞于西野擬朝陽而發暉應瑒車渠碗賦曰惟斯碗之奇瑋誕靈嶽而奇生䕃碧條以納曜朝霞而發榮潘尼琉璃碗賦曰覽方貢之彼珍瑋兹碗之獨奇濟流沙之絶險越葱嶺之峻危江總瑪瑙碗賦曰出崑崙之仙阜觴𤣥洲之玉酒皆奇語流蘇流蘇是四角所繫盤線繪繡之毬五色同心而下垂者流蘇帳者古人繫帳之四隅以為飾耳張師正倦遊録江總詩銀床金屋挂流蘇寶鏡玉叉橫珊瑚劉孝威詩機頂挂流蘇機傍垂結綵徐陵詩流蘇金帳挂香囊織成羅幔隱燈光溫庭筠詞油壁車輕金犢肥流蘇帳曉春雞早若下水吳録曰長城若下酒張協七命曰荆南烏程豫北竹葉即此酒也輿地志曰南岸曰上若北岸曰下若村人取若下水釀酒醇美勝于雲陽又曰霅水亦若下之異名七命所云荆南烏程豫北竹葉說者以荆南為荆州然烏程縣在今湖州與荆州相去甚逺縣南五十步有若溪夾溪悉生箭箬南岸曰上箬北岸曰下箬居人取下箬水釀酒醇美俗稱箬下酒劉夢得駱駝橋下蘋風起鸚鵡杯中箬下春即此也荆溪在縣南六十里以其水為荆山出因名之張𤣥之山墟名云昔漢荆王賈登此山因以為名所謂荆南烏程即荆溪之南耳若以為荆州則烏程去荆州三千餘里封壤大不相接矣以湖州圖經考之烏程縣以古有烏氏程氏居此能醖酒因此名焉其荆溪别在長興縣西南六十里此溪出荆山張協七命所云酒則荆南烏程所謂荆南者荆溪之南也李賀詩樽有烏程酒為君千里壽即此也宋景文公送張說赴吳興幕詩政餘底處邀真賞洲上風箬下杯神氣神者氣之子氣者神之母形者神之室氣清則神暢氣濁則神昏氣亂則神勞氣衰則神去室空則形腐人以神為道以道為生生道兩存故長生久視出修真祕訣欲養神先須養氣養氣先須養腦養腦先須養精養精先須養血養血先須養唾養唾先須養水而九還七返者大而論之一年小而論之一日北斗一日一夜一周天天降地騰從寅至申為七返却到坤為九還修真祕訣八公有言食草者力食肉者勇食穀者智食氣者神吐納經欲為道者口常吐死氣取生氣慎笑節語常思其形陶𢎞景真誥東坡論文選文選編次無法去取失當齊梁文字衰陋蕭統尤為卑弱如李陵五言皆僞今日觀淵明集可喜者甚多而獨取數篇淵明作間情賦正所謂國風好色而不淫正使不及周南與屈宋所陳何異而統大譏之此小兒強解事也豫固不敢妄議如楚詞九歌凡十有一孰為可取孰為可刪而文選僅取其半耳至若李龍眠作九歌圖則國殤禮魂便不能畫矣然畫又非文選之比屬車隋志曰昔諸侯二車九乘秦滅九國兼其車服故為八十一乘漢猶不改武帝祠太一甘泉則盡用之明帝上原陵又用之法駕三十六乘小駕十二乘隋開皇中大駕十二乘法駕減半大業初屬車備八十一乘煬帝問於閻毗毗曰此起于秦故張衡賦曰屬車九九是也龜礎吳王射堂柱礎皆如伏龜徐鉉述記袁宏宮賦曰海龜之礎宋景文公作燕肅簡挽詩七兵榮贈册沈礎賁龜趺用龜礎二字白字本草滕元發云一善醫者惟取本草白字藥用之多驗蘇子容云黑者是漢人益之東坡本草一書豈可不熟如權德輿詩中邦均禹貢上藥驗桐君李羣玉詩注藥陶貞白尋山許逺游王績詩行披葛公注坐驗農皇帙杜甫詩藥纂西極名兵流指諸掌李益詩草木分千品方書問六陳皆留意于此者寒具桓𤣥愛重圖書每以示賓客有不好事者正食寒具以手捉書畫大㸃汚𤣥惋惜移時自後每出法書輒令洗手張彥逺名畫記所謂上有晉人寒具油者是也寒具二字出周禮籩人注曰清朝未食先進寒具口實之籩齊民要術食經曰寒具今之鐶餅也宋景文公詩客詠南窗蒲齒勝食無寒具畫厨開然則劉禹錫佳話有寒具詩云纎手搓來玉數尋碧油輕醮嫩黃深夜來春睡濃於酒壓匾佳人纒臂金乃以捻頭為寒具也即饊子也東坡集有此詩言佳話謂之捻頭古硯唐人詩偶忘姓名癖性愛古物終歲求不得昨朝得古硯蘭河灘之側波濤所擊觸背面生隟隙質狀朴且醜令人作不得讀此詩可謂好事之至硯之瓌古可想矣劉禹錫詩闕君灘頭揀石硯白帝城邊尋野蔬瘞鶴銘歐公曰瘞鶴銘題云華陽真逸撰刻于焦山之足按潤州圖經云王羲之書然筆法不類羲之而類顏魯公華陽真逸顧况道號碑無年月疑前後有人同斯號者杜子美詩山隂不見換鵝經京口空傳瘞鶴銘真作右軍書矣按陶隱居畫傳曰隱居號華陽真人晚號華陽真逸則瘞鶴銘為隱居不疑及日休悼羽士詩大椿枯後新為記仙鶴亡來始有銘且言前朝文集未有悼道士碑銘其用鶴銘可謂神奇范蠡遊五湖圖陳恭公判亳州遇生日親族多獻老人星圖姪世修獨獻范蠡遊五湖圖且贊曰賢哉陶朱霸越平吳名遂身退扁舟五湖公即日納印明日致仕魏泰雜録隗囂傳曰范蠡收責勾踐乘舟于五湖注曰計然云范蠡乘舟於五湖逰五湖見此韓魏公初罷相出鎮長安或獻詩曰是非莫問門前客得失須憑塞上翁引取碧油紅斾去鄴王臺畔醉春風公以為然請守相州畢仲詢幕府燕閒録列女圖此圖自密康公母至趙括母凡十五考之劉向傳乃仁智一卷世傳龍眠李公麟所作然按隋朝官本有衛協畫列女圖一卷隋王廣有列女仁智圖一卷陳公恩有列女貞節圖仁智圖李氏之筆固當祖述于此又按後漢順烈梁皇后常以列女畫于左右以自監戒本紀又後漢宋𢎞常燕見御座新屛風圖畫列女帝顧視之𢎞正容言曰未見好德如好色者光武即命撤之觀此則列女圖又始於漢矣養生太祖召華山陳摶問養生之術摶曰得便宜處再莫去上大喜胡訥見聞録任惠公晚年康強或問養生之術公曰讀文選而有悟耳所謂石韞玉而山輝水含珠而川媚是也春明退朝録宅經凡宅東下西髙富貴雄豪前髙後下絶無門户後髙前下多足牛馬凡宅地欲坦平名曰梁土後髙前下名曰晉土居之並吉西髙東下名曰魯土居之富貴當出賢人前髙後下名曰楚土居之凶四面髙中央下名曰衛土居之先富後貧碧落碑絳有碑篆千餘字李陽冰愛之其中有碧落二字謂之碧落碑後有識者云有唐十三祀龍集敦牂孝子李訓等為母造道門尊像唐潘逺記聞談其一曰絳州碧落觀龍朔中刺史李諶為母太妃追薦所造神人所篆洛中紀異沈羲飛升有白鹿青龍車羽衣持節以青玉界丹版拜羲為碧落侍郎碧落天也列仙傳唐翟楚賢有碧落賦多奇語今録於此散幽情于曩昔凝浩思于典墳太初與其太始髙下混其未分將視之而不見欲聽之而不聞爰及寥廓其猶槖籥輕清為天而氤氲重濁為地而盤礴爾其動也風雨如晦雷電共作爾其靜也體象皎鏡是開碧落其色清瑩其狀冥寞雖離婁明目兮未能窮其形其體浩瀚其勢瀰漫縱夸父逐日兮不能窮其畔浮滄海兮氣渾映青山兮色亂為萬物之羣首作衆才之妙觀至妙至極至神至虛莫能測其末未能定其初五石難補九野環舒星辰麗之而照曜日月憑之而居諸非吾人之所仰實列仙之攸居爾乃遺塵俗務遐躅養空棲無懲忿窒欲凌清髙而自逺振羽衣以相屬七日王君永别緱山之上千年丁令暫下遼水之曲别有懷真俗外流念仙家撫龜鶴而增感顧蜉蝣而自嗟乃鍊心清志洗煩蕩邪凝魂于祕府馳妙于飱霞雲梯非逺天路還賒情恆寄于綿邈願有託于靈槎分風送船荆州記曰洞庭湖神一曰宫庭湖遇客祈禱能分風送南北船拾遺記漢曹毗詩分風為二擘流成兩劉剛詩回艫乘𣲖水舉櫂逐分風正謂此也漢鄭𢎞少時採薪得一遺箭頃之有人覓箭問𢎞何所欲𢎞識其神人也答曰常患若耶溪載薪為難願朝南風暮北風後果然世號樵風水經曰鄭𢎞少以清節自居恆躬採伐用貿糧膳每出入溪津常感神風送之村人貪藉風勢常依隨往還有淹留者徒輩相謂曰汝不欲及鄭公風耶其感致如此宋之問詩歸舟何路逺日暮便樵風秦系題鏡湖野老所居詩湖裏尋君去樵風送往返孟浩然詩帆得樵風送春逢榖雨晴皮日休詩海月為京信樵風送酒船胡文恭公詩雨别荆臺夢風回越水樵錢公輔詩仙客常因一箭贈樵風長到五雲間允初徴鏡湖故事詩將尋煉藥井更逐賣樵風楊億送越僧詩花雨六時飄講席樵風千里送浮杯齊唐詩濯足樵風波振衣禹穴巔吳奎詩樵風漾歸舟飄然一葉輕分風南北蓋不止若耶溪也賀雪賀雪之禮起于唐李洞詩賀雪已成金殿夢看濤終負石樓期劉庭琦詩姑射山中符聖壽芙蓉闕下降神車李嶠詩大周天闕路今日降神車韋應物詩厠跡鵷鷺末蹈舞豐年期正是賀雪時所作也然唐故事雪中多宴羣臣宗楚客詩太乙天為水蓬萊雪作山徐彥伯詩瓊樹留宸矚璇花入睿詞張說詩含花雪告豐李適詩寫曜銜天藻呈祥拂御衣此皆是雪中侍宴應制也唐類表有賀雨雪表一卷賀表亦始于此五夜漢舊儀曰中黃門待五夜謂甲乙丙丁戊也唐太宗所謂甲夜理事乙夜觀書者本此顔氏家訓曰或問一夜五更何所訓答曰漢魏以來謂甲夜乙夜丙夜丁夜戊夜又謂之五更皆以五為節西都賦曰衛以嚴更之署必以五為節者言自夕至旦經涉五時雖冬夏之晷長短參差而盈不盡六縮不至四進退五時之間故曰五更也唐韋珣嘗問劉禹錫曰五夜者甲乙丙丁戊相更迭耳而又有子夜何耶晉時有子夜者善歌子夜女子名也故李義山云鶯能歌子夜又云心酸子夜歌太白亦有子夜歌行韋珣以子夜為五更之數非也又有所謂午夜者為半夜時如日之午也李長吉七夕詩羅幃午夜愁杜少陵所謂午夜漏聲催曉箭是也獨更㸃之制無所著見韓愈詩雞三號更五㸃李郢詩江風徹曙不成睡二十五㸃秋夜長李商隱詩金殿銷香閉綺籠玉壺傳㸃咽銅龍惟此三詩言㸃也陳伏知道從軍五更轉詩曰一更刁斗鳴校尉逴連城遙聞射鵰騎懸憚將軍名二更愁未央髙城寒夜長試將弓學月聊持劍比霜三更夜警新橫吹獨吟春強聽梅花落誤憶栁園人四更星漢低落月與雲齊依稀北風裏胡笳雜馬嘶五更催送籌曉色映山頭城烏初起堞更人悄下樓禁城鐘鼓五更已竟而外間刻漏方交五更殺五更後禁城不復更擊鐘需平明漏下二刻方椎鼓數十聲門開唐王建詞每夜停燈尉御衣銀熏籠底火霏霏遙聽帳裏君王覺上直鐘聲始得歸本朝王岐公宫詞焚香先尉赭黃衣恐怕陽臺進御遲禁鼓六更交早直歸來還是立班時質之二詞禁中更鼓不究平曉者蓋交更之際翼日當直宫女須以未曉前先表受事則凡應奉早朝皆可夙辦若候正交五更始來則不及事矣王建所謂上直鐘聲者禁中五更曉鐘也岐公所謂六更者明宫殿五更之外更有一更也其實宫中以外間四更促為五更耳至如郊祀大祀車駕宿齊青城則齊殿門外內五更均促使短如宫中常節至青城門外則五更平分須曉乃竟故奉常禮皆於宫漏之外圓覺書說命厥德修罔覺只一覺字孟子以先知覺後知以先覺覺後覺豫將以斯道覺斯民也凡兩言之亦十字圓覺經中說覺字及圓覺菩薩號共一百八十覺字是何言之之切悟之之艱也如華嚴經梵行品一連用三十七耶字又二耶字在前不連文此一品連用耶字之勢甚衮衮是蓋譯潤之功也青硯古人多用青硯蓋端歙始著乎唐耳庾肩吾謝銅硯筆格啓曰煙磨青石已踐孔子之壇管插銅龍還笑王生之壁硯譜曰淄川金雀石色紺青聲如金玉又曰李後主青石硯墨池中黃石如彈丸水常滿終日不耗後歸朝陶穀見而異之硯大不可持乃取石彈丸去後主曰惟此石彈丸能生水索之良苦陶碎之石破中有小魚跳地上即死自是硯無復潤澤東坡雜說曰陸道士蓄一硯圓首斧形色正青皆有斜月紋甚能光墨而宜筆今山川記載蔡子池青石可為硯正此之類也翠粲陸放翁嘗問余曰比在成都市時見綵帛鋪榜曰翠色真紅殊不曉所謂紅而曰翠何也余曰嵇康琴賦曰新衣翠粲纓徽流芳班婕妤自悼賦曰紛翠粲兮紈素聲翠粲取其鮮明也東坡牡丹詩一朵妖紅翠欲流蓋取鄉語放翁擊節大喜少卿章岵嘗官于蜀持吳羅朔綾至官與川帛同染紅後還京師經海潤吳朔之帛色皆渝變惟蜀者如舊後詢蜀人之由乃云蜀之蓄蠶與他邦異當其眠將起時以桑灰餵之故其色然世之重川紅多以染之良蓋不知由蠶所致也卷什沈約宋書謝靈運傳曰紛披風什五臣注曰十篇同卷謂之什今之詩家作一篇遽曰什非也栁子厚答沈起書云今乃五十篇之贈其數相什宋景文公詩棲遲自樂周人什偃息終非魏國藩此方用得是緯略卷十
