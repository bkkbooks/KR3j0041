body:
  text: 緯略卷七宋髙似孫撰流黃素張載四愁詩美人贈我筒中布何以報之流黃素梁簡文帝詩思婦流黃素溫姬玉鏡臺張柬之詩將軍占太白少婦怨流黃喬知之詩雲日曉微微愁思流黃機王筠詩箱中取刀尺機上斷流黃蕭淳詩猶有望歸心流黃未剪截顧野王詩薊門寒未歇為斷流黃機環濟要略曰間色有五紺紅縹紫流黃也按論語疏曰五方正色青赤白黑黃五方間色者緑為青之間紅為赤之間碧為白之間紫為黑之間流黃為黃之間故不用紅紫言是間色也所以為間者潁子嚴曰東方木木色青青加黃為緑緑為東方之間色南方火火色赤赤加白為紅紅為南方之間色西方金金色白白加青為碧碧為西方之間色北方水水色黑黑加赤為紫紫為北方之間色中央土土色黃黃加黑為流黃流黃為中央之間色又一法木尅土戊以妹已嫁於甲是黃入青為緑火尅金庚以妹辛嫁于丙是白入赤為紅金尅木甲以妹乙嫁於庚是青入白為碧水尅火丙以妹丁嫁於壬是赤入黑為紫土剋水壬以妹癸嫁於戊是黑入黃為流黃余謂考工記畫繪之事青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡此非間色乎罨畫墨客揮犀曰罨畫今之生色也余嘗謂五采彰施於五服此固生色之始也秦韜玉詩花明驛路胭脂暖山入江亭罨畫開李西臺詩晴山雲罨畫孤嶼水含稜盧贊元詩花外小樓新罨畫杏波晴葉退微紅劉商隱愛義興罨畫溪者亦以其如畫也茗一車權紓茗贊曰窮春秋演河圖不如載茗一車此言漢儒圖緯之書讀之令人憒憒所謂窮春秋者如演孔圖元命苞文耀鉤運斗樞感精符含神霧之類演河圖者如古龍圖河圖傳孝經河圖之類也雪茶陸羽第水雪水品二十以雪水滯而太冷也晉羊孚雪贊曰資清以化乘氣以霏遇象能鮮即潔成輝雪蓋取其精潔也安可謂之冷滯耶喻鳬詩煮雪問茶味當風看鴈門白居易詩吟詠霜毛筆閒嘗雪水茶丁晉公茶詩痛惜留書篋堅藏待雪天胡文恭公詩雪溜雲腴試早芽皆是雪水瀹茶也曹松詩讀易明髙燭煎茶取折氷姚合詩研露題詩潔銷氷煮茗香則又以氷瀹茶也逸人王休居太白山下冬至取溪氷敲其精瑩者煮茗共客飲之王仁裕開元天寶遺事無非取其潔清也羊裘嚴光變姓名隱光武思其賢訪之齊國上言有男子披羊裘釣澤中馬援嘆曰殖貨財者貴其施賑也不然則守錢虜耳乃散頒昆弟故舊身服羊裘皮袴羊裘始于此素丞相論衡曰孔子不王素王之業在於春秋桓君山素丞相之迹在於新論者也君山名談著書言當世事二十九篇梁以陶𢎞景為山中宰相亦兹類致拳拳古樂府定情篇言婦人不能以禮從人而自相悅媚乃解衣服玩好致之用致綢繆若臂環致拳拳指環致殷勤耳珠致區區香囊致和合條脫致契濶佩玉結恩情而期於山陽山北終以不答乃以傷悔焉種瓜邵平秦東陵侯之後為布衣種瓜于長安瓜美俗謂之東陵瓜漢施延沛人種瓜自給姚俊常種瓜灌園吳録步隲與衛旌同年相善俱種瓜自給郭平原以種瓜為業沈約宋書韓珍種瓜營葬孫鍾富春人種瓜為業劉義慶幽明記以上十人可謂瓜隱矣楊炯詩亭逢李廣尉門接邵平瓜許渾詩白社貧思橘青門老種瓜東陵在青門外也襲六為七相如封禪書曰袚飭厥文作春秋一藝將襲舊六為七攄之無窮揚雄劇秦美新文曰宜命賢哲作帝典一篇奮三為一襲以示來人摛之罔極二文甚相類左太冲作三都賦初成時人互有譏訾思意不愜後示張公張曰此二京可三庾仲初作揚都賦成以呈庾亮亮以親族之懷大為其名價曰可三二京四三都易聖唐衛大經邃於易人謂之易聖唐昭宗時有闕文五字筮人謂之易聖耳目記劉臻精於兩漢書時人稱為漢聖嚴子卿馬綏卿善圍棋號碁聖衛協張墨號畫聖張衡馬忠號木聖抱朴子李白嗜酒然沈酣中所撰文章未嘗錯誤時號醉聖開元天寶遺事賣文丁隱君歌前度相逢正賣文一錢不直虛云云今來利作採山斧可以拋身麋鹿羣杜詩故人南郡去去索作碑錢本賣文為活翻令室倒懸厯日楊泉物理論曰疇昔神農始治農功正節氣審寒溫以為早晚之候故立厯日堯典一篇唯載厯象一事則厯象一事至堯備矣孔氏書傳曰厯象其分節敬紀天時以授人也離騷傳淮南王安入朝獻所作內篇上愛祕之使為離騷傳只以大山小山觀之安深于騷矣然王逸所注絶不引此書八百碑唐人說李雍前後撰碑八百首按雍傳雍尤長碑頌中朝衣冠及天下寺觀多賫金帛求其文杜詩曰干謁滿其門碑版照四裔豐屋珊瑚鈎麒麟織成罽紫騮隨劍几義取無虛歲蓋謂雍也雍碑今尚遺者左羽林將軍臧懷亮碑在耀州開元寺碑淄州嶽寺大照和尚普叔碑西京李府君碑西京普光寺碑泗州娑羅木碑楚州大雲禪寺碑老子孔子顔回贊海州秦望山法華寺碑越州嶽麓山寺記大律故懷道闍黎碑福州石室記端州有道先生葉公碑東林寺碑江州左武衛尉闕將軍李思訓碑雲麾將軍李秀碑鄂州刺史盧府君碑三本書栁氏家訓曰余家升平里西堂藏書經史子集皆有三本一本紙墨籖卷華麗者鎮庫一本次者供覽又一本次者後生子弟為業我祖宗時內則太清樓藏書龍圖閣藏書玉宸殿藏書外則三館祕閣凡四處藏書如咸平八年榮王宫火延及三館於是出禁中本付館閣傳寫則書本豈可無其副其後官書往往侵竊士大夫家得之嘉祐中置編校官八員雜讐四館書給吏百人悉以黃紙為大冊書之自此私家不敢輒藏元豐中三館併歸省中書亦隨徙元祐中重寫御前書籍又置校對黃本以館職資淺者為之宣和初置補御前書籍所再訪天下異書侍臣十人為參詳官進士白衣充檢閲者數人及年命以官然以崇文總目言之李善注文選固在五臣之前此乃云因五臣而為注非也三茅君內傳曰唐李遵撰遵非唐人也固有差舛如此者中興館閣書殊為簡略余在館時日以校對猶是郡國民間所上本館閣不曾再行繕書又止有一本一篇借出竟成失落故闕書亦多又祕閣所藏書亦無書目真贋無辨殊闕典也承平時士大夫家藏書如常山宋氏南都戚氏厯陽沈氏廬山李氏九江陳氏鄱陽吳氏中興初如三山余氏臨川吳氏會稽陸氏諸葛氏今皆散逸矣况有三本乎四愁詩張衡不得志為四愁詩依屈原以美人為君子以珍寶為仁義以水深雪氛為小人衡作四愁詩曰我所思兮在太山欲往從之梁甫艱側身東望涕霑翰美人贈我金錯刀何以報之英瓊瑶路逺莫致倚逍遙何為懷愁心煩勞我所望兮在桂林欲往從之湘水深側身南望涕沾襟美人贈我翠琅玕何以報之雙玉盤我所思兮在漢陽欲往從之隴坂長側身西望涕沾裳美人贈我貂襜褕何以報之明月珠我所思兮在鴈門欲往從之雪紛紛側身北望涕沾巾美人贈我錦繡假何以報之青玉案又張載詩我所思兮在南巢欲往從之巫山髙佳人遺我筒中布何以報之流黃素我所思兮在朔湄欲往從之白雪霏佳人遺我雲中翮何以贈之連城璧我所思兮在隴原欲往從之隔太山佳人遺我雙角端何以贈之雕玉環我所思兮在營州欲往從之路阻修佳人遺我緑綺琴何以贈之雙南金傅𤣥歌詩有所思兮在天一方何以贈之玉佩珠璜又有四愁詩曰美人贈我明月珠何以報之比目魚美人贈我蘇合香何以報之翠鴛鴦貫休歌詩欲贈之紫玉尺白銀鐺蓋效四愁體李嘉祐詩宋玉怨三秋張衡復四愁蓋以四愁比騷也可謂善言詩矣崔筒詩平子四愁今莫比休文八詠自同時便不及嘉祐也古學桓談博學多通遍治五經尤好古學從劉歆揚雄問疑異盧植上書臣少通儒從南郡太守馬融受古學頗知今古禮記研眼硯録曰端石有活眼死眼圓暈相重黃黑相間黳精在內晶瑩可愛謂之活眼四旁浸漬不甚鮮明謂之淚眼形體略具內外皆白殊無光彩謂之死眼活眼勝淚眼淚眼勝死眼死眼勝無眼然古人賦詩中殊不言眼也惟唐彥猷曰端石有眼者最貴謂之鸜鵒眼石文精美如木有節不知者以為石病石有上下巖惟上巖有眼眼之美者青緑黃三色相重多者自外至心凡九重其大者尤為稀有其生於墨池之外者曰髙眼生於內者曰低眼髙眼尤可尚不為墨漬常可睹也誤筆成畫曹不興善畫孫權使畫屏風誤落筆㸃素因就畫為蠅吳王以為生蠅舉手彈拂之吳録王獻之為大司馬畫扇題筆誤落扇上即㸃畫作烏駮牛孫暢之畫術王維詩屏風誤㸃惑孫郎團扇草書輕內史盧綸詩䑛筆求書扇張屏看畫蠅各用此二事托遺載唐戴嵩畫牛因筆墮為烏亦此意卧雪圖卧雪圖巨然所作漢時雪丈餘洛陽令至袁安門無行路令人探雪見安僵卧令舉為孝亷典録又有焦先出於漢末冬雪大至袒卧不移皇甫嵩髙士傳又有胡定光潁川人雪覆其室令遣排雪遺乾糗事亦大略相類人用雪中事但言袁安丁晉公鎮金陵重建賞心亭取家藏袁安卧雪圖以張於亭之屏乃唐周昉筆經十四守雖極愛不敢取後一帥竊去易以蘆鴈王琪君玉留詩曰闕文六字壺江山清麗壯吳都昔人已化遼天鶴舊畫難尋卧雪圖苒苒流年去京國蕭蕭華髮老江湖殘蟬不會登臨意又噪西風入座隅文瑩野録三十六玉皇李賀詩為君持此凌蒼蒼上朝三十六玉皇李白詩三十六帝欲相迎仙人飄翩下雲軿此也泰階六符經東方朔願陳泰階六符以觀天變藝文志有泰階六符經一卷漢書泰階六符上階天子中階公卿下階庶人凡三階所謂泰階六符經者應劭以為黃帝所作也其經曰泰階者天之三階也上階為天子中階為諸侯公卿與大夫下階為士庶人上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為元士下星為庶人三階平則隂陽和風雨時社稷神祗各獲其宜天下大安是為太平三階不平則五神乏祀日有食之水潤不浸稼穡不成冬雷夏霜百姓不寧故治道傾天子行暴令好興甲兵修宫榭廣苑囿則上階為之奄奄疏濶也以孝武皆有此事故朔為陳之皇甫冉詩綵雲天仗合𤣥象泰階平司空圖詩鼎飫和方濟台階潤欲平此言泰階欲其平也權德輿詩六符既昭晰萬象隨陶鈞此言六符欲其明也䃱磹太平廣記曰月支獻猛獸兩目如天䃱磹之炎光䃱磹電光也䃱先念切磹徒念切納音子為陽之始午為隂之始以甲加子數至午加丑數至未午上得庚未上得辛謂之隂索隂又以甲加午數至子加未數至丑亦得庚辛謂之隂匹陽此納干數也從甲至庚凡七七為西素皇之氣故甲子乙丑皆為金而三為火九為木一為土五為水此所謂納音也但數其干不數其支其源蓋出於六十律旋宫法也一律含五音十二律含六十音沈存中筆談曰六十甲子有納音鮮原其意蓋六十律旋相為宫法也一律含五音十二律納六十音也凡氣始於東方而右行音起於西方而左行隂陽相錯而生變化所謂氣始於東方者四時始於木右行傳於火火傳於土土傳於金金傳於水所謂西始於西方者五音始於金左旋傳於火火傳於木木傳於水水傳於土納音與易納甲同法乾納甲而坤納癸始於乾而終於坤納音始於金金乾也終於土土坤也納音之法同類娶妻隔八生子此漢志語也此律吕相生之法也五行先仲而後孟孟而後季此遁甲三元之紀也甲子金之仲黃鍾之商同位娶乙丑大吕之商同位謂甲與乙丙與丁之類下皆倣此隔八下生壬申金之孟夷則之商隔八謂大吕下生夷則也下皆倣此壬申同位娶癸酉南吕之商隔八上生金之季姑洗之商此金三元終若只以陽辰言之則依遁甲逆傳仲孟季若兼妻言之則順傳孟仲季也庚辰同位娶辛巳仲吕之商隔八下生戊子火之仲黃鍾之徴金三元終則左行傳南方火也戊子娶己丑大吕之徴生丙申火之孟夷則之徴丙申娶丁酉南吕之徴生甲辰火之季姑洗之徴甲辰娶乙巳中吕之徴生壬子木之仲黃鍾之角火三元終則左行傳於東方木如是左行至於丁巳中吕之宫五音一終復自甲午金之仲娶乙未隔八生壬寅一如甲子之法終於癸亥謂㽔賓娶林鍾上生太簇之類至於己為陽故自黃鍾至於仲吕皆下生自午至於亥為隂故自林鍾至於應鍾皆上生豫於樂論叙之甚詳此不復紀甲子乙丑金與甲午乙未金雖同然甲子乙丑為陽律陽律皆下生甲午乙未為陽吕陽吕皆上生六十律相反所以分為一紀也氷丸霜散朝野僉載曰立夏日服六壬六癸符或𤣥氷丸飛霜散暑不能侵抱朴子曰不熱之道服𤣥氷之丸飛霜之散此用蕭丘上木皮及五日北行黑蛇血故少得合之也漢武內傳西王母曰仙之上藥闕文六字詩採取神藥山端白兔搗蝦蟇丸奉上陛下一玉柈梁武帝詩紫霜耀絳雪追還轉復飛陸龜蒙詩桂父舊歌依絳雪桐孫遺詠倚𤣥雲鹽生秦記曰會稽王道子為符朗設盛饌朗曰鹽味少生𤣥晏春秋曰衛倫稱劉子陽食餅而知鹽生精味之至師曠善識味平公賜之食師曠曰此勞薪為㸑平公試問之宰人曰用故車腳炊飯晉武帝賜荀朂食進飯即謂座人曰此勞薪炊飯也座者未之信密遣問之果是車腳炊也蓋此之謂沈香山火隋主除夜設火山數十盡用沈香木根火山暗則以甲煎沃之香聞十里江淹詩金爐絶沈燎綺席生浮埃則沈燎始於梁矣李商隱詩沈香甲煎為沈燎玉液瓊酥作夀杯當用前事李白詩博山爐中沈香火雙咽一氣凌紫霞李賀詩沈香火暖茱萸煙酒觥綰帶新承歡王建詩院院燒燈如白日沈香火底坐吹笙三詩皆用沈香火即所謂沈燎也三儺論語疏曰儺逐疫鬼也為隂陽之氣不節厲鬼隨而作禍故天子使方相氏黃金為四目熊皮為帽口作儺儺之聲以驅疫鬼一年三度為之按月令季春命國儺季秋天子乃儺至冬又曰命有司大儺旁磔出土牛以送寒氣張衡東京賦曰卒歲大儺驅除羣厲方相秉鉞巫覡操茢侲子萬童丹首𤣥製桃弧棘矢所發無臬飛礫雨散剛疸畢斃煌火馳而星流逐赤疫于四裔亷品大儺賦曰於吉日之上戊將大蠟于臘蒸乃班有司聚衆大儺天子坐華殿臨朱軒憑玉几席文旃率百𨽻之侲子羣鼓噪于宫垣二賦只言冬儺耳春秋之儺蓋少見唯唐孫頠有春儺賦曰是月也建斗于辰日交長至有司方陳大禮展時事達九門以磔攘協四靈而滌器匪歲之卒乃春之季令隂氣以下降使陽和而上利順三時而不忒協諸福而畢萃然則此禮唐時猶行之所謂順三時而不忒者三儺也小雨由山張士伯禱雨於􅦾山忽聞空中語曰大雨由天小雨由山神仙盛遇有人叩其祈雨神告之曰雨禁絶重沃焦𤣥中記曰天下之大者東海之沃焦石焉在東海南方三萬里海水灌之隨盡故水東流而不盈物類相感志曰沃焦山東海之外荒海中有山焦炎而峙髙深莫測蓋稟至陽之為質也海水激浪投其上吸焉而盡計其晝夜吸攝無極若熬鼎受其灑汗耳此道家之說無是山也四海受百川之漲必然洶湧而溢也吳融沃焦山賦曰域中公子問於方外先生曰蓋聞水之大也下環乎地上浮于空無象無邊夷猶洪濛百派千流皆歸于東何巨溟之深也萬古能容何九州之髙也不淪其中先生曰混沌死乾坤始東南傾川澤委帝乃慮海旁溢彼山中峙復孕以火用銷其水此焦沃之為義真宰之元㫖者也請言其狀也巉乎崒乎赫曦乎翕赩乎隂陽熾炭天地開爐景風鼓吹赤帝規模成於妙有拔彼虛無處冷能熱雖燔且濡於律則黃鍾取法在易則既濟相符岥𡊇兮壓海萬里鴻洞兮烘天一隅掖馮夷軋天吳鱗介既難以潛伏草木安得其芬敷巨靈不能擘畏其爛手愚公不能移憚其焚軀靈漲疑竭大室若枯爾其水之來也浩浩爭奔淹淹不住蹴嶽摧阜跳天沃霧暘谷無地扶桑失樹雷奔潮走雪飛沫聚吞吐造化浮沈朝暮一歸塘歸塘一作歸墟之積積既久而還盈一尾閭之泄泄不供而旋注茍彼不為煎熬何物當其委輸沓潮番禺記曰早潮下晚潮上兩水相合謂之沓潮劉禹錫沓潮歌曰屯門積日無回飈海波不歸成沓潮轟如鞭石屹且搖亘空欲駕黿鼉橋驚湍蹙縮悍而驕大陵髙岸失岧嶤四邊無阻音響調背負元氣掀重霄介鯨得性方逍遙仰鼻噓吸揚朱翹海人狂顧迭相招罽衣髽首聲嘵嘵征南將軍登麗譙赤旌指揮不敢囂翼日風回沴氣消歸濤納納景昭昭烏泥白沙復滿海海色不動如青瑶叙曰元和十年夏五月大風駕潮南海泛溢南人云沓潮也率三歲一有之入閣歐公五代史李琪傳曰唐末喪亂禮壞天子未嘗視朝入閣之制亦廢常參之官日至正衙者傳聞不坐即退獨大臣奏事日一見便殿而侍從內諸司日弄朝而已明宗即位詔羣臣五日一隨宰相入見內殿謂之起居唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之入閣其不御前殿而御紫宸也乃自正衙喚仗由閣門而入百官俟朝于衙者因隨以入見故謂之入閣然衙正朝也其禮尊閣燕見也其事殺自乾符已後因亂禮闕天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閣有仗其後習見遂以入閣為重至出御前殿猶謂之入閣其後亦廢至是而復然有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閣之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閣琪皆不能正也按貞觀元年制自今中書門下三品以上入閣議事命諫官隨之有失輒諫則入閣已見于貞觀中不止開元間退御紫宸受朝乃云入閣也德宗貞元制自今後五日一御宣政殿與羣臣相見則是不行入閣之禮矣𤣥宗時優人有求賜魚者𤣥宗曰五品以上入閣以魚袋合符汝不可得如武后時崔承慶上疏曰五品以上佩龜者后改魚用龜别敕宣召恐有詐妄故內出龜合然後應命六典曰魚符以備别敕宣召此其制也宋元憲公曰唐制每遇坐朝日即為入閣及其叔世務從簡易正衙立仗遂廢其後或有行者人所罕見乃復謂之盛禮宋公乃于御殿亦曰入閣何也按唐含元殿至宣政殿紫宸殿皆在大明宫中大明宫者東內也其喚仗入閣與歐公同西內太極殿即朔望受朝之所亦正殿也太極之北有兩儀殿即常日視朝之所也太極殿兩廡東西二閣二閣有門當又轉北而入兩儀一如東內之制鄭谷入閣詩祕殿臨軒日和鸞返正年兩班文武盛百辟羽儀全霜漏清中禁風旗拂曙天門嚴新契勘仗入乍承宣玉几當紅旭金爐縱碧煙對揚稱法吏贊引出宫鈿言動揮毫疾威容報簿専夀山晴靄黛皓氣暖連延禮有鵷鸞集恩無雨露偏小臣叨備位歌詠泰階前數行俱下應奉字世叔讀書數行俱下續漢書宋武帝才思朗捷省書奏五行俱下梁昭明太子讀書數行俱下過目皆臆通五經后蒼東海人事夏侯始昌通五經蔡𤣥汝南人學通五經帝徴拜議郎講論五經異同井丹扶風人受業太學通五經魯丕字叔陵兼通五經為當世大儒見東觀漢記張霸博覽五經孫琳劉固等並慕之漢人往往以通五經為重其曰五經無雙許叔重許慎也五經縱橫周宣光周舉也五經紛綸井大春井丹也五經復興魯叔陵魯丕也皆得通五經論石渠歐陽地餘為太子中庶子以尚書授太子後為博士論石渠張山拊事小夏侯建為博士論石渠戴聖號小戴以博士論石渠聞人通漢以太子舍人論石渠薛廣德以魯詩教授蕭望之數與論議器之充論石渠周堪與孔霸俱事大戴夏侯勝霸為博士堪譯官令論石渠施讐為博士論同異于石渠林尊事歐陽髙為博士論石渠韋𤣥成以淮陽中尉論石渠張長安論石渠至淮陽中尉論石渠之選其靳如此待詔金馬門公孫𢎞徴賢良文學擢對第一拜博士待詔金馬門賈捐之上疏言得失待詔金馬門東方朔主父偃嚴安徐樂皆待詔金馬門三輔黃圖宣帝時修武帝故事講論六藝羣書博盡奇異之好徴能為楚辭被公召見讀誦益召髙才劉向張子僑華龍栁褒待詔金馬門元帝時鄭朋上疏言許史子弟章視周堪堪白令待詔金馬門馮商長安人成帝時以能屬文待詔金馬門如淳曰班固目録待詔金馬門漢盛選也以漢之久而膺此選者僅若此耳殊不輕畀也李白詩晨趨紫禁中夕待金門詔劉禹錫詩籍通金馬門身在銅駝陌李端詩漢主金門正召才馬卿多病自遲回鄭谷詩貴為金馬客雅稱水曹郎酒法月令仲冬曰是月也乃命有司秫稻必齊麯蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之無有差忒釀酒之事盡在此矣茍能精之豈不佳哉人顧未精于此耳月令注曰有司謂煮酒之官煮酒二字蓋出於此歐陽公醉翁亭記曰釀泉為酒泉香而酒冽蓋取諸此狽狼狽是兩物狽前足絶短每行常駕兩狼失狼則不能動髙后紀曰計猶豫師古曰猶獸名也爾雅曰猶如麂善登木此獸性多疑慮常居山中忽聞有聲即恐有人來每豫上樹久之無人然後敢下須臾又上如此非一故不決者稱猶豫焉說文曰猶玃屬一曰隴西犬子謂之猶猶余救切鴈子漢書太液池中鳬雛鴈子布滿充積用鴈子甚佳王維詩蘆笋穿荷葉菱花罥鴈兒此用鴈兒甚新易林曰鳳有十子同巢共歡以相保晉王獻之詩客從北方來言欲到交趾逺行無他貨唯有鳳皇子百金不我鬻千金難為市山海經曰流沙之西丹山之南有鳳之圓圓古卵字狒狒讃狒狒讃曰狒狒怪萌被髮操竹獲人則笑唇蔽其目終亦號咷反為我戮物類相感志曰狒狒出西南蠻宋建武中安昌縣進雌雄二頭帝曰吾聞狒狒能負千斤既力若此何能致之對曰狒狒見人喜笑笑則下唇掩其額故可以釘之髮可為髲血可染衣手似彌猴人面而紅作人言鳥聲善知人生死飲其血使人見鬼帝命工圖之元稹詩狒狒穿筒格猩猩置屐馴狒房沸切珧郭璞江賦曰玉珧海月土肉石華晉安海物異名記曰肉柱膚寸美如珧玉臨海異物志曰玉珧柱厥甲美如珧玉趙德麟侯鯖集韓退之詩所云馬甲柱正謂此字書曰珧唇甲可飭物爾雅釋弓曰弓有緣以金為之謂之銑以玉為之謂之珧今人但用瑶字固自有珧字也東坡詩金虀玉鱠飯炊雪海鼇江柱初脫泉但有柱字李商老詩江瑶初脫柱蠔山憐疊嶂却用瑶字也三嚴唐續時令儀曰唐制日未明七刻捶一鼓為一嚴侍中奏開宫殿門及城門未明五刻捶二鼓為再嚴侍中奏請中嚴羣臣五品以上俱集朝堂未明二刻捶三鼓為三嚴侍中中書令以下俱詣西閣奉迎鑾駕出宫詣太極殿西都賦曰衛以嚴更之署注曰嚴更督夜行鼓唐制所謂嚴者亦以鼓也相經鋭頭赤帝樂叶圖徵宋均注鋭頭象朱鳥大頭黑帝上長頭湯長頭而寡髮晏子陳遵漢書賈逵頭長一尺三寸出東觀漢記頭小鋭趙景真世說方面蒼帝圓面赤帝廣面白帝深面黑帝並河圖龍顔舜援神契漢髙祖管寧列傳日角伏羲孝經援神契子産管子子夏子張論語摘輔象始皇河圖長頸禹尸子修頸黑帝河圖月角晏平仲管子尾生犀角尾生管子曾子摘輔象頂角匿犀李固伏犀貫石枕袁天綱相竇軌伏犀貫腦馬周魚角栁下惠管子珠衡曾子伊尹仲由並摘輔象又援神契曰伏羲珠連衡山庭顔淵論語摘輔象又子貢顔路額有三理老子額有三理抱朴子龍額黃帝廣顙龍額河圖折額周燮欽頥折額醜貌駭人汝南先賢傳額有五柱頂隋髙祖貌如婦人張良史記學堂袁天綱相岑文本學堂瑩夷重瞳舜項羽漢書吕光載記沈約梁書目瞳方李泌梁湘王分明武安君嚴尤三將論趙景真世說目有精光孫權江表傳眸子如電裴楷眸子閃閃如巖下電世說目視日不眩王戎晉書又竹林七賢傳曰戎眸子洞徹視日而眼照不虧大目老子金笥內經子夏摘輔象子張同上長目始皇史記目如懸珠東方朔深目康僧淵世說踈目霍光目光外射隋髙祖隋書目如秋水李泌眉白毫伏羲王子年拾遺記馬良眉有白毫眉八采堯眉八采直兩眉甚堅似八字眉抱璞子又尚書大傳虎眉文王帝王世紀秀眉管寧列傳通眉李賀鬚目如畫馬援東觀漢記王規于寶晉紀隋元暉鬚眉如畫梁禇翔梁書眉間一尺伍員吳越春秋莫邪子干將子並列仙傳虎鼻伏羲禹虎鼻孝經援神契髙鼻康僧淵世說曰鼻者面之山目者面之淵山不髙則不靈淵不深則不清鼻有伏藏太公摘輔象大鼻陳遵漢書山凖伏羲禹並虎鼻山凖摘輔象隆凖始皇漢髙祖史記大口舜孝經援神契太公論語摘輔象光武東觀漢記孫權江表傳方頥大口虎口始皇河圖海口孔子海口言如含澤摘輔象斗星繞口子貢論語摘輔象方口老子金笥內經漢明德皇后烏喙禹尸子越王越世家始皇鷙喙史記齒如編貝東方朔踈齒老君神仙傳駢齒武王元命苞夫子孝經勾命訣耳三門老子瀨鄉記長耳老子神仙傳方頥帝嚳帝系孫權江表傳兌頥黃帝河圖斂頥蔡澤史記岐頥后稷春秋元命苞鳳頸主通中說手握裒文舜援神契手握十文老子神仙傳展手過尺李達前凉録手文曰武武帝梁書文在手仲子左傳手過膝尹喜關令內傳裴秀王隱晉書劉曜載記劉備三國志慕容垂後燕録李祖升北齊書猿臂李廣鳶肩盧敖淮南子梁冀冀别傳駢脅重耳吕氏春秋汙膺文王淮南子許慎注曰胯盧也腰十圍尹繹晉書朱泚江安王元祥龜背仲尼孔叢子王通中說倨身伊尹晏子春秋背若有負馬周豺聲越椒左傳商臣史記又秦始皇王世充隋書王敦晉書陶𢎞景相經序曰相者蓋性命之著乎形骨吉凶之表乎氣貌亦猶事先謀而後動心先動而後應表裏相感莫知其所以然且富貴夀夭各值其數劉孝標相經序曰命之與相猶聲之與響聲動乎幾響窮乎應二公之言皆名言也孝標又云日角月偃之奇龍樓彪踞之美地靜鎮干城纏天闕運於掌䇿金槌玉枕磊落相望伏犀起蓋隱鱗交映井宅既兼食匱已實抑亦帝王卿相之明效也茶爐筆床天隨子每于寒暑得體中無事時乘小舟設蓬席齎一䇿書茶爐筆床釣具擢船鳴榔而已所詣小不㑹意徑還不留笠澤叢書香井任昉述異記曰魏武陵中有泉謂之香水古詩云安得香水泉濯郎衣上塵一說香水在并州香山其水潔香浴之去病吳故宫亦有香水溪俗云西施浴處又呼為脂粉塘吳王宫人濯粧於此溪上源至今馨香香水二字尤佳然石曼卿荷花詩洛渚微波長映步漢宫香水不濡肌乃以為漢宫也只此分香一事亦魏武也唯陸機喜用陸機弔魏武文曰余為著作郎逰祕閣見魏武令曰餘香可分與諸夫人諸舍中無所為學作履組賣也弔曰紆佳人于履組清塵慮于餘香下一句奇絶緯略卷七
